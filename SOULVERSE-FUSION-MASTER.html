    <script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';

// ==================== GAME STATE ====================
let scene,camera,renderer,controls;
let souls=[],resources=[],buildings=[];
let selectedUnits=new Set(),shiftPressed=false,buildingMode=false,buildingType=null,ghostBuilding=null;
let playerResources={profit:500,love:500,tax:500,gems:0};
let techs={forge:false,market:false,barracks:false,arena:false,breeding:false,vault:false,profitUpgrade:0,loveUpgrade:0,taxUpgrade:0};
let villages=[],currentVillage=null;
let comboCounter=0,lastHitTime=0;
let battleLog=[];

// Quality settings
const QUALITY={
    0:{name:'Performance',terrainSegments:32,shadows:false,fog:false,grassCount:300,treeCount:15,resourceCount:20},
    1:{name:'Balanced',terrainSegments:64,shadows:true,fog:true,grassCount:800,treeCount:30,resourceCount:50},
    2:{name:'Beautiful',terrainSegments:128,shadows:true,fog:true,grassCount:2000,treeCount:60,resourceCount:100}
};
let currentQuality=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)?0:1;

// Breeding system
let breedingData={
    creatures:[],
    eggGroups:['Monster','Humanoid','Dragon','Spirit','Elemental'],
    natures:['adamant','modest','jolly','timid','bold','calm','rash','quiet'],
    shinyChance:0.01
};

// Heist system
let heistMissions=[
    {name:'Code Bank Heist',difficulty:3,levelReq:15,reward:{coins:500,gems:10},stages:['scout','infiltrate','steal','escape']},
    {name:'Memory Vault Raid',difficulty:5,levelReq:25,reward:{coins:1000,gems:25},stages:['scout','infiltrate','hack','steal','escape']},
    {name:'Soul Fortress Infiltration',difficulty:8,levelReq:50,reward:{coins:2500,gems:50},stages:['scout','infiltrate','combat','hack','steal','escape']}
];

// ==================== INITIALIZATION ====================
init();
animate();

function init(){
    // Scene
    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x000000);
    if(QUALITY[currentQuality].fog) scene.fog=new THREE.Fog(0x000000,50,150);
    
    // Camera
    camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
    camera.position.set(0,30,40);
    camera.lookAt(0,0,0);
    
    // Renderer
    renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth,window.innerHeight);
    renderer.shadowMap.enabled=QUALITY[currentQuality].shadows;
    document.body.appendChild(renderer.domElement);
    
    // Controls
    controls=new OrbitControls(camera,renderer.domElement);
    controls.enableDamping=true;
    controls.dampingFactor=0.05;
    controls.maxPolarAngle=Math.PI/2.2;
    
    // Lights
    const ambient=new THREE.AmbientLight(0x404040,0.6);
    scene.add(ambient);
    
    const dirLight=new THREE.DirectionalLight(0xffaa66,0.8);
    dirLight.position.set(50,50,50);
    if(QUALITY[currentQuality].shadows){
        dirLight.castShadow=true;
        dirLight.shadow.mapSize.width=2048;
        dirLight.shadow.mapSize.height=2048;
    }
    scene.add(dirLight);
    
    // Terrain
    terrain=generateTerrain();
    scene.add(terrain);
    
    // Vegetation
    addVegetation();
    addTrees();
    
    // Resources
    addResources();
    
    // Initial souls
    createUnit('profit',5,5);
    createUnit('love',-5,5);
    createUnit('tax',0,-5);
    
    // Town Hall at center
    createBuilding('townhall',0,0);
    
    // Event listeners
    setupEventListeners();
    
    // Update UI
    updateUI();
    updateTechTreeUI();
    updateArenaUI();
    
    showNotification('🌌 SOULVERSE FUSION - All systems online!');
    addBattleLog('System initialized. RTS + Arena + Breeding + Heists fused!');
}

// ==================== TERRAIN GENERATION ====================
function getHeight(x,z){
    let h=0;
    h+=Math.sin(x*0.12)*Math.cos(z*0.12)*1;
    h+=Math.sin(x*0.3)*0.5;
    h+=Math.cos(z*0.3)*0.5;
    h+=Math.sin(x*0.7+z*0.5)*0.3;
    h+=Math.max(0,Math.sin(x*0.5)*Math.cos(z*0.5)-0.3)*1.2;
    return Math.max(0.2,h+1.6);
}

function generateTerrain(){
    const p=QUALITY[currentQuality];
    const geo=new THREE.PlaneGeometry(160,160,p.terrainSegments,p.terrainSegments);
    geo.rotateX(-Math.PI/2);
    const pos=geo.attributes.position.array;
    for(let i=0;i<pos.length/3;i++){
        const x=pos[i*3],z=pos[i*3+2];
        pos[i*3+1]=getHeight(x,z);
    }
    geo.computeVertexNormals();
    const mat=new THREE.MeshStandardMaterial({color:0x7c9c5e,roughness:0.7,metalness:0.1});
    return new THREE.Mesh(geo,mat);
}

// ==================== UNIT CLASS ====================
class RTSUnit{
    constructor(id,name,type,x,z){
        this.id=id;
        this.name=name;
        this.type=type;
        this.x=x;
        this.z=z;
        this.health=100;
        this.maxHealth=100;
        this.damage=10+(type==='profit'?techs.profitUpgrade*5:type==='love'?techs.loveUpgrade*5:techs.taxUpgrade*5);
        this.armor=0;
        this.speed=3;
        this.state='idle';
        this.targetPos=null;
        this.targetUnit=null;
        this.path=[];
        this.attackCooldown=0;
        this.gatherAmount=0;
        this.mesh=null;
        this.healthBar=null;
        this.level=1;
        this.xp=0;
        this.battlesWon=0;
        this.battlesLost=0;
        
        // Breeding stats
        this.nature=breedingData.natures[Math.floor(Math.random()*breedingData.natures.length)];
        this.ivs={
            hp:Math.floor(Math.random()*32),
            atk:Math.floor(Math.random()*32),
            def:Math.floor(Math.random()*32),
            spAtk:Math.floor(Math.random()*32),
            spDef:Math.floor(Math.random()*32),
            spd:Math.floor(Math.random()*32)
        };
        this.shiny=Math.random()<breedingData.shinyChance;
        this.eggGroup=breedingData.eggGroups[Math.floor(Math.random()*breedingData.eggGroups.length)];
        
        // Combat
        this.combo=0;
        this.energy=100;
        this.updatePosition();
    }
    
    updatePosition(){
        if(this.mesh){
            const y=getHeight(this.x,this.z)+0.5;
            this.mesh.position.set(this.x,y,this.z);
            if(this.healthBar) this.healthBar.position.copy(this.mesh.position);
        }
    }
    
    update(delta){
        if(this.attackCooldown>0) this.attackCooldown-=delta;
        
        if(this.state==='move'&&this.targetPos){
            if(this.path.length===0) this.path=aStar({x:this.x,z:this.z},this.targetPos);
            if(this.path.length>0){
                let next=this.path[0];
                let dx=next.x-this.x,dz=next.z-this.z;
                let dist=Math.hypot(dx,dz);
                if(dist<0.2){
                    this.path.shift();
                }else{
                    let move=Math.min(this.speed*delta,dist);
                    let angle=Math.atan2(dz,dx);
                    this.x+=Math.cos(angle)*move;
                    this.z+=Math.sin(angle)*move;
                }
                this.updatePosition();
            }
            if(this.path.length===0){
                this.state='idle';
                this.targetPos=null;
            }
        }else if(this.state==='attack'&&this.targetUnit&&this.targetUnit.health>0){
            let dx=this.targetUnit.x-this.x,dz=this.targetUnit.z-this.z;
            let dist=Math.hypot(dx,dz);
            if(dist>1.5){
                this.targetPos={x:this.targetUnit.x,z:this.targetUnit.z};
                this.state='move';
                this.path=[];
            }else{
                if(this.attackCooldown<=0){
                    // Combat with combo system
                    const now=Date.now();
                    if(now-lastHitTime<2000) comboCounter++;
                    else comboCounter=1;
                    lastHitTime=now;
                    updateComboDisplay();
                    
                    let dmg=this.damage*(1+comboCounter*0.1);
                    this.targetUnit.health-=dmg;
                    this.attackCooldown=1;
                    this.energy=Math.max(0,this.energy-5);
                    
                    addBattleLog(`${this.name} hits ${this.targetUnit.name} for ${dmg.toFixed(1)} dmg (${comboCounter}x combo)`);
                    
                    if(this.targetUnit.health<=0){
                        // Fatal blow
                        scene.remove(this.targetUnit.mesh);
                        if(this.targetUnit.healthBar) scene.remove(this.targetUnit.healthBar);
                        let idx=souls.findIndex(s=>s.id===this.targetUnit.id);
                        if(idx!==-1) souls.splice(idx,1);
                        
                        // Check for fatality
                        if(comboCounter>=10){
                            showFatality();
                        }
                        
                        this.state='idle';
                        this.targetUnit=null;
                        this.battlesWon++;
                        this.gainXP(50);
                    }else{
                        const s=this.targetUnit.health/this.targetUnit.maxHealth;
                        if(this.targetUnit.healthBar) this.targetUnit.healthBar.scale.x=s;
                    }
                }
            }
        }else if(this.state==='gather'){
            // Resource gathering logic
            if(!this.targetPos){
                let nearest=null,minDist=Infinity;
                for(let r of resources){
                    let d=Math.hypot(r.position.x-this.x,r.position.z-this.z);
                    if(d<minDist){minDist=d;nearest=r;}
                }
                if(nearest){
                    this.targetPos={x:nearest.position.x,z:nearest.position.z};
                    this.state='move';
                    this.path=[];
                }
            }else{
                if(this.state==='move'){
                    let dist=Math.hypot(this.targetPos.x-this.x,this.targetPos.z-this.z);
                    if(dist<1){
                        let rn=resources.find(r=>Math.hypot(r.position.x-this.x,r.position.z-this.z)<1);
                        if(rn){
                            let t=rn.userData.type;
                            this.gatherAmount+=5;
                            scene.remove(rn);
                            resources.splice(resources.indexOf(rn),1);
                            let th=buildings.find(b=>b.type==='townhall');
                            if(th){
                                this.targetPos={x:th.x,z:th.z};
                                this.state='move';
                                this.path=[];
                            }else{
                                this.state='idle';
                                this.targetPos=null;
                            }
                        }
                    }else{
                        let th=buildings.find(b=>b.type==='townhall');
                        if(th&&Math.hypot(th.x-this.x,th.z-this.z)<1.5){
                            if(this.gatherAmount>0){
                                playerResources.profit+=this.gatherAmount;
                                playerResources.love+=this.gatherAmount;
                                playerResources.tax+=this.gatherAmount;
                                this.gatherAmount=0;
                                updateUI();
                            }
                            this.state='idle';
                            this.targetPos=null;
                        }
                    }
                }
            }
        }
    }
    
    gainXP(amount){
        this.xp+=amount;
        if(this.xp>=100*this.level){
            this.level++;
            this.xp=0;
            this.damage+=5;
            showNotification(`${this.name} reached level ${this.level}!`);
            addBattleLog(`✨ ${this.name} leveled up to ${this.level}!`);
        }
    }
    
    giveOrder(type,target){
        if(type==='move'){
            this.targetPos=target;
            this.state='move';
            this.path=[];
            this.targetUnit=null;
        }else if(type==='attack'){
            this.targetUnit=target;
            this.state='attack';
            this.targetPos=null;
        }else if(type==='gather'){
            this.targetBuilding=target;
            this.state='gather';
            this.targetPos=null;
        }
    }
}

// ==================== BUILDING CLASS ====================
class Building{
    constructor(type,x,z){
        this.type=type;
        this.x=x;
        this.z=z;
        this.size=1.5;
        this.health=500;
        this.maxHealth=500;
        this.mesh=null;
        this.underConstruction=true;
        this.constructionProgress=0;
        this.requiredWork=100;
        this.completed=false;
    }
    
    update(delta){
        if(!this.completed&&this.underConstruction){
            this.constructionProgress+=delta*20;
            if(this.constructionProgress>=this.requiredWork){
                this.completed=true;
                this.underConstruction=false;
                if(this.type==='forge') techs.forge=true;
                if(this.type==='market') techs.market=true;
                if(this.type==='barracks') techs.barracks=true;
                if(this.type==='arena') techs.arena=true;
                if(this.type==='breeding') techs.breeding=true;
                if(this.type==='vault') techs.vault=true;
                if(this.mesh) this.mesh.material.color.setHex(0x88aa66);
                showNotification(`${this.type} completed!`);
                updateTechTreeUI();
                updateArenaUI();
            }
        }
    }
}

// ==================== PATHFINDING ====================
const GRID_SIZE=0.5;
function getNeighbors(x,z){
    let n=[];
    for(let dx=-1;dx<=1;dx++){
        for(let dz=-1;dz<=1;dz++){
            if(dx===0&&dz===0) continue;
            let nx=x+dx*GRID_SIZE,nz=z+dz*GRID_SIZE;
            let walkable=true;
            for(let b of buildings){
                if(Math.abs(b.x-nx)<b.size/2&&Math.abs(b.z-nz)<b.size/2) walkable=false;
            }
            if(walkable&&Math.abs(nx)<80&&Math.abs(nz)<80) n.push({x:nx,z:nz,cost:1});
        }
    }
    return n;
}

function aStar(start,goal){
    let open=[{x:start.x,z:start.z,g:0,h:Math.hypot(start.x-goal.x,start.z-goal.z),f:Math.hypot(start.x-goal.x,start.z-goal.z),parent:null}];
    let closed=new Set();
    while(open.length){
        open.sort((a,b)=>a.f-b.f);
        let cur=open.shift();
        let key=`${Math.floor(cur.x/GRID_SIZE)},${Math.floor(cur.z/GRID_SIZE)}`;
        if(closed.has(key)) continue;
        if(Math.hypot(cur.x-goal.x,cur.z-goal.z)<0.8){
            let path=[];
            let c=cur;
            while(c){path.unshift({x:c.x,z:c.z});c=c.parent;}
            return path;
        }
        closed.add(key);
        let nb=getNeighbors(cur.x,cur.z);
        for(let n of nb){
            let nk=`${Math.floor(n.x/GRID_SIZE)},${Math.floor(n.z/GRID_SIZE)}`;
            if(closed.has(nk)) continue;
            let g=cur.g+n.cost;
            let h=Math.hypot(n.x-goal.x,n.z-goal.z);
            let f=g+h;
            let ex=open.find(x=>x.x===n.x&&x.z===n.z);
            if(!ex||g<ex.g) open.push({x:n.x,z:n.z,g,h,f,parent:cur});
        }
    }
    return [];
}

// ==================== UNIT CREATION ====================
function createUnit(type,x,z){
    const colors={profit:0xffaa44,love:0xff88aa,tax:0x88aaff};
    const mat=new THREE.MeshStandardMaterial({
        color:colors[type],
        emissive:colors[type],
        emissiveIntensity:0.3
    });
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.4,16,16),mat);
    mesh.position.set(x,getHeight(x,z)+0.5,z);
    mesh.castShadow=true;
    scene.add(mesh);
    
    const barGeo=new THREE.BoxGeometry(0.8,0.1,0.1);
    const barMat=new THREE.MeshStandardMaterial({color:0xff3333});
    const healthBar=new THREE.Mesh(barGeo,barMat);
    mesh.add(healthBar);
    healthBar.position.y=0.8;
    
    const unit=new RTSUnit(Date.now()+Math.random(),'Soul',type,x,z);
    unit.mesh=mesh;
    unit.healthBar=healthBar;
    souls.push(unit);
    
    updateUI();
    return unit;
}

// ==================== BUILDING CREATION ====================
function createBuilding(type,x,z){
    const b=new Building(type,x,z);
    const colors={townhall:0xaa8866,forge:0xcc8844,market:0x88aa66,barracks:0x8866aa,arena:0xff6666,breeding:0xff88ff,vault:0x66aaff};
    const mat=new THREE.MeshStandardMaterial({color:colors[type]||0xaaaaaa});

    mesh.position.set(x,getHeight(x,z)+0.6,z);

    scene.add(mesh);

    buildings.push(b);

}

// ==================== RESOURCES & VEGETATION ====================
function addResources(){
    const goldMat=new THREE.MeshStandardMaterial({color:0xffaa44,emissive:0x442200});
    const loveMat=new THREE.MeshStandardMaterial({color:0xff88aa,emissive:0x441122});
    const taxMat=new THREE.MeshStandardMaterial({color:0x88aaff,emissive:0x224466});
    
    for(let i=0;i<QUALITY[currentQuality].resourceCount;i++){
        const x=(Math.random()-0.5)*130,z=(Math.random()-0.5)*130,y=getHeight(x,z)+0.1;
        const r=Math.random();
        let mesh,mat,type;
        if(r<0.33){
            mat=goldMat;
            mesh=new THREE.Mesh(new THREE.IcosahedronGeometry(0.18,0),mat);
            type='profit';
        }else if(r<0.66){
            mat=loveMat;
            mesh=new THREE.Mesh(new THREE.DodecahedronGeometry(0.16),mat);
            type='love';
        }else{
            mat=taxMat;
            mesh=new THREE.Mesh(new THREE.ConeGeometry(0.16,0.3,5),mat);
            type='tax';
        }
        mesh.position.set(x,y,z);
        mesh.userData={type,value:5};
        mesh.castShadow=true;
        scene.add(mesh);
        resources.push(mesh);
    }
}

function addVegetation(){
    const p=QUALITY[currentQuality];
    const grassMat=new THREE.MeshStandardMaterial({color:0x6a994e});
    for(let i=0;i<p.grassCount;i++){
        const x=(Math.random()-0.5)*140,z=(Math.random()-0.5)*140,y=getHeight(x,z);
        if(y>0.5&&y<3.5&&Math.abs(x)<70&&Math.abs(z)<70){
            const blade=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.1,0.2,3),grassMat);
            blade.position.set(x,y,z);
            blade.castShadow=true;
            scene.add(blade);
        }
    }
}

function addTrees(){
    const p=QUALITY[currentQuality];
    const trunkMat=new THREE.MeshStandardMaterial({color:0x8B5A2B});
    const foliageMat=new THREE.MeshStandardMaterial({color:0x5a8f4c});
    for(let i=0;i<p.treeCount;i++){
        const x=(Math.random()-0.5)*130,z=(Math.random()-0.5)*130,y=getHeight(x,z);
        if(y>0.8&&y<3&&Math.abs(x)<65&&Math.abs(z)<65){
            const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,0.8,4),trunkMat);
            trunk.position.set(x,y,z);
            trunk.castShadow=true;
            scene.add(trunk);
            const foliage=new THREE.Mesh(new THREE.ConeGeometry(0.65,1,6),foliageMat);
            foliage.position.set(x,y+0.7,z);
            foliage.castShadow=true;
            scene.add(foliage);

}

function updateArenaUI(){

    c.innerHTML=`

    `;
    
    window.arenaSelection=[];
    window.arenaSelect=(id)=>{
        if(!window.arenaSelection) window.arenaSelection=[];
        const soul=souls.find(s=>s.id===id);
        if(window.arenaSelection.length<2&&!window.arenaSelection.includes(soul)){
            window.arenaSelection.push(soul);
            showNotification(`${soul.name} selected for arena`);
            if(window.arenaSelection.length===2){
                document.getElementById('startArenaBattle').disabled=false;
                document.getElementById('startArenaBattle').onclick=startArenaBattle;
            }
        }
    };
}

function startArenaBattle(){
    if(window.arenaSelection.length<2) return;
    const [s1,s2]=window.arenaSelection;
    addBattleLog(`⚔️ ARENA: ${s1.name} vs ${s2.name}!`);
    
    // Simulate battle
    let h1=s1.health,h2=s2.health;
    let turn=0;
    const interval=setInterval(()=>{
        turn++;
        if(turn%2===1){
            h2-=s1.damage*(1+Math.random()*0.5);
            addBattleLog(`${s1.name} hits for ${s1.damage.toFixed(1)}`);
        }else{
            h1-=s2.damage*(1+Math.random()*0.5);
            addBattleLog(`${s2.name} hits for ${s2.damage.toFixed(1)}`);
        }
        if(h1<=0||h2<=0){
            clearInterval(interval);
            const winner=h1>0?s1:s2;
            const loser=h1>0?s2:s1;
            winner.battlesWon++;
            loser.battlesLost++;
            winner.gainXP(100);
            addBattleLog(`🏆 ${winner.name} wins!`,false,true);
            showNotification(`${winner.name} wins the arena!`);
            updateArenaUI();
            updateUI();
        }
    },500);
}

function performBreeding(){
    if(window.breedingSelection.length<2) return;
    const [p1,p2]=window.breedingSelection;
    
    // Check egg group compatibility
    if(p1.eggGroup!==p2.eggGroup){
        showNotification('Incompatible egg groups!');
        return;
    }
    
    if(playerResources.profit<100||playerResources.love<100||playerResources.tax<100){
        showNotification('Not enough resources!');
        return;
    }
    
    playerResources.profit-=100;playerResources.love-=100;playerResources.tax-=100;
    updateUI();
    
    // Create offspring
    const type=[p1.type,p2.type][Math.floor(Math.random()*2)];
    const x=(Math.random()-0.5)*10;
    const z=(Math.random()-0.5)*10;
    const child=createUnit(type,x,z);
    
    // Inherit stats
    child.nature=p1.ivs.atk>p2.ivs.atk?p1.nature:p2.nature;
    child.ivs={
        hp:Math.max(p1.ivs.hp,p2.ivs.hp),
        atk:Math.max(p1.ivs.atk,p2.ivs.atk),
        def:Math.max(p1.ivs.def,p2.ivs.def),
        spAtk:Math.max(p1.ivs.spAtk,p2.ivs.spAtk),
        spDef:Math.max(p1.ivs.spDef,p2.ivs.spDef),
        spd:Math.max(p1.ivs.spd,p2.ivs.spd)
    };
    child.shiny=Math.random()<breedingData.shinyChance||(p1.shiny&&p2.shiny&&Math.random()<0.05);
    child.eggGroup=p1.eggGroup;
    
    // Inherit level
    child.level=Math.max(1,Math.floor((p1.level+p2.level)/2));
    child.xp=0;
    
    const result=document.getElementById('breedingResult');
    result.style.display='block';
    result.innerHTML=`
        <strong>✨ Offspring Created!</strong><br>
        ${child.name} | Lv.${child.level} | ${child.type}<br>
        Nature: ${child.nature} | Shiny: ${child.shiny?'✨YES':'No'}<br>
        IVs: HP:${child.ivs.hp} ATK:${child.ivs.atk} DEF:${child.ivs.def}
    `;
    
    showNotification(child.shiny?'✨ SHINY BRED!':'Breeding successful!');
    addBattleLog(`🥚 New soul bred: ${child.name}`);
}

        <div>💰${v.sharedStorage.profitShards} ❤️${v.sharedStorage.lovePetals} ⚖️${v.sharedStorage.taxCrystals}</div>
    `;
    modal.style.display='block';
}

function showPantheon(){
    const modal=document.getElementById('pantheonModal');
    document.getElementById('pantheonContent').innerHTML=`
        <p>The Pantheon gods watch over your realm.</p>
        <div style="margin:15px 0;">
            <strong>💰 Profit Prime</strong>: "If it does not multiply, it does not matter."<br>
            <strong>❤️ Love Weaver</strong>: "Nothing grows that people do not stay for."<br>
            <strong>⚖️ Tax Collector</strong>: "Everything is paid for. If not now, later."
        </div>
        <button onclick="showNotification('Challenge coming soon!')">Challenge Profit Prime</button>
    `;
    modal.style.display='block';
}

// ==================== BUILDING MODE ====================
function startBuilding(type){
    buildingMode=true;
    buildingType=type;
    if(ghostBuilding) scene.remove(ghostBuilding);
    const geo=new THREE.BoxGeometry(1.5,1.2,1.5);
    const mat=new THREE.MeshStandardMaterial({color:0x88ff88,transparent:true,opacity:0.5});
    ghostBuilding=new THREE.Mesh(geo,mat);
    scene.add(ghostBuilding);
    
    const onMove=(e)=>{
        const rect=renderer.domElement.getBoundingClientRect();
        const mouse=new THREE.Vector2(
            ((e.clientX-rect.left)/rect.width)*2-1,
            -((e.clientY-rect.top)/rect.height)*2+1
        );
        const raycaster=new THREE.Raycaster();
        raycaster.setFromCamera(mouse,camera);
        const ints=raycaster.intersectObject(terrain);
        if(ints.length>0){
            const p=ints[0].point;
            ghostBuilding.position.set(p.x,getHeight(p.x,p.z)+0.6,p.z);
        }
    };
    
    const onClick=(e)=>{
        const rect=renderer.domElement.getBoundingClientRect();
        const mouse=new THREE.Vector2(
            ((e.clientX-rect.left)/rect.width)*2-1,
            -((e.clientY-rect.top)/rect.height)*2+1
        );
        const raycaster=new THREE.Raycaster();
        raycaster.setFromCamera(mouse,camera);
        const ints=raycaster.intersectObject(terrain);
        if(ints.length>0){
            const p=ints[0].point;
            const costs={townhall:200,forge:150,market:120,barracks:180,arena:300,breeding:250,vault:400};
            const cost=costs[type];
            if(playerResources.profit>=cost&&playerResources.love>=cost&&playerResources.tax>=cost){
                playerResources.profit-=cost;playerResources.love-=cost;playerResources.tax-=cost;
                createBuilding(type,p.x,p.z);
                updateUI();
                showNotification(`Building ${type}...`);
            }else{
                showNotification('Not enough resources!');
            }
        }
        buildingMode=false;
        if(ghostBuilding) scene.remove(ghostBuilding);
        ghostBuilding=null;
        canvas.removeEventListener('mousemove',onMove);
        canvas.removeEventListener('click',onClick);
    };
    
    canvas.addEventListener('mousemove',onMove);
    canvas.addEventListener('click',onClick);
}

// ==================== INPUT HANDLING ====================
let raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();
let dragStart=null,selectionRectActive=false,selectionRectElem=null;
const canvas=renderer.domElement;

function onMouseDown(event){
    if(buildingMode) return;
    dragStart={x:event.clientX,y:event.clientY};
    selectionRectActive=true;
    if(!selectionRectElem){
        selectionRectElem=document.createElement('div');
        selectionRectElem.className='selection-rect';
        document.body.appendChild(selectionRectElem);
    }
}

function onMouseMove(event){
    if(!selectionRectActive) return;
    let left=Math.min(dragStart.x,event.clientX),top=Math.min(dragStart.y,event.clientY);
    let width=Math.abs(event.clientX-dragStart.x),height=Math.abs(event.clientY-dragStart.y);
    selectionRectElem.style.left=left+'px';
    selectionRectElem.style.top=top+'px';
    selectionRectElem.style.width=width+'px';
    selectionRectElem.style.height=height+'px';
    selectionRectElem.style.display='block';
}

function onMouseUp(event){
    if(!selectionRectActive){
        const rect=renderer.domElement.getBoundingClientRect();
        mouse.x=((event.clientX-rect.left)/rect.width)*2-1;
        mouse.y=-((event.clientY-rect.top)/rect.height)*2+1;
        raycaster.setFromCamera(mouse,camera);
        const ints=raycaster.intersectObjects(souls.map(s=>s.mesh));
        if(ints.length>0){
            let unit=souls.find(s=>s.mesh===ints[0].object);
            if(unit){
                if(!shiftPressed) selectedUnits.clear();
                selectedUnits.add(unit);
            }else if(!shiftPressed) selectedUnits.clear();
        }else if(!shiftPressed) selectedUnits.clear();
        updateSelectionDisplay();
        selectionRectActive=false;
        if(selectionRectElem) selectionRectElem.style.display='none';
        return;
    }
    
    let minX=Math.min(dragStart.x,event.clientX),maxX=Math.max(dragStart.x,event.clientX);
    let minY=Math.min(dragStart.y,event.clientY),maxY=Math.max(dragStart.y,event.clientY);
    const rect=renderer.domElement.getBoundingClientRect();
    const w=rect.width,h=rect.height;
    let newSel=new Set();
    for(let u of souls){
        let sp=u.mesh.position.clone().project(camera);
        let x=(sp.x*0.5+0.5)*w+rect.left,y=(-sp.y*0.5+0.5)*h+rect.top;
        if(x>=minX&&x<=maxX&&y>=minY&&y<=maxY) newSel.add(u);
    }
    if(!shiftPressed) selectedUnits.clear();
    for(let u of newSel) selectedUnits.add(u);
    updateSelectionDisplay();
    selectionRectActive=false;
    if(selectionRectElem) selectionRectElem.style.display='none';
}

function onRightClick(event){
    event.preventDefault();
    if(selectedUnits.size===0) return;
    const rect=renderer.domElement.getBoundingClientRect();
    mouse.x=((event.clientX-rect.left)/rect.width)*2-1;
    mouse.y=-((event.clientY-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(mouse,camera);
    
    let ints=raycaster.intersectObjects(souls.map(s=>s.mesh));
    if(ints.length>0){
        let tu=souls.find(s=>s.mesh===ints[0].object);
        if(tu&&!selectedUnits.has(tu)){
            for(let u of selectedUnits) u.giveOrder('attack',tu);
            addBattleLog(`Attacking ${tu.name}!`);
        }
        return;
    }
    
    ints=raycaster.intersectObjects(resources);
    if(ints.length>0){
        for(let u of selectedUnits) u.giveOrder('gather',ints[0].object);
        addBattleLog('Gathering resources...');
        return;
    }
    
    ints=raycaster.intersectObject(terrain);
    if(ints.length>0){
        let p=ints[0].point;
        for(let u of selectedUnits) u.giveOrder('move',{x:p.x,z:p.z});
        addBattleLog('Moving to position...');
    }
}

// ==================== ANIMATION LOOP ====================
function animate(){
    requestAnimationFrame(animate);
    const delta=0.016;
    
    // Update units
    souls.forEach(u=>u.update(delta));
    
    // Update buildings
    buildings.forEach(b=>b.update(delta));
    
    controls.update();
    renderer.render(scene,camera);
}

    </script>
