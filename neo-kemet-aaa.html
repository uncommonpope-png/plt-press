<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏛️ NEO-KEMET | Creature Collection</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
        body { background:#000; overflow:hidden; font-family:'Courier New', monospace; touch-action: none; }
        canvas { display:block; width:100vw; height:100vh; position:fixed; top:0; left:0; }
        #ui { position:fixed; inset:0; pointer-events:none; z-index:100; }
        #ui > * { pointer-events:auto; }
        #joystick { position:fixed; bottom:30px; left:30px; width:160px; height:160px; background:radial-gradient(circle, rgba(255,170,102,0.25) 0%, rgba(255,100,50,0.05) 70%); border:4px solid rgba(255,170,102,0.6); border-radius:50%; pointer-events:auto; z-index:150; display:none; }
        .joystick-knob { position:absolute; width:70px; height:70px; background:radial-gradient(circle, #ffaa66 0%, #ff6633 100%); border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; border:4px solid #ffaa66; }
        #lookJoystick { position:fixed; bottom:30px; right:30px; width:140px; height:140px; background:radial-gradient(circle, rgba(100,200,255,0.2) 0%, rgba(50,100,200,0.05) 70%); border:4px solid rgba(100,200,255,0.5); border-radius:50%; pointer-events:auto; z-index:150; display:none; }
        #lookJoystick .joystick-knob { background:radial-gradient(circle, #64c8ff 0%, #3288cc 100%); border-color: #64c8ff; }
        #mobileActions { position:fixed; right:20px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:15px; pointer-events:auto; z-index:150; display:none; }
        .action-btn { width:70px; height:70px; background:linear-gradient(135deg, #ffaa66 0%, #ff6633 100%); border:3px solid #ffaa66; border-radius:50%; color:#000; font-weight:bold; font-size:24px; cursor:pointer; }
        .action-btn:active { transform:scale(0.85); }
        @media (max-width: 768px) { #joystick, #lookJoystick, #mobileActions { display:flex !important; } #desktopControls, #topBar { display:none !important; } }
        #regionInfo { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.85); backdrop-filter:blur(12px); border-radius:16px; padding:12px 16px; color:#ffaa66; font-size:12px; z-index:10; border:2px solid rgba(255,170,102,0.5); min-width:200px; }
        #regionName { font-size:16px; font-weight:bold; margin-bottom:6px; }
        .stat-row { display:flex; justify-content:space-between; margin:4px 0; font-size:11px; }
        #coords { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.85); backdrop-filter:blur(12px); border-radius:12px; padding:10px; color:#64c8ff; font-size:10px; z-index:10; border:2px solid rgba(100,200,255,0.4); text-align:right; }
        #topBar { position:absolute; top:10px; left:0; right:0; display:flex; justify-content:center; gap:10px; z-index:30; flex-wrap:wrap; }
        .top-btn { background:linear-gradient(135deg, #ffaa66 0%, #ff6633 100%); border:none; color:#000; font-weight:bold; padding:8px 16px; border-radius:20px; cursor:pointer; font-family:monospace; font-size:11px; }
        .top-btn:active { transform:scale(0.95); }
        #loading { position:fixed; inset:0; background:#000; z-index:1000; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        #loading h1 { color:#ffaa66; font-size:36px; margin-bottom:20px; }
        .loader { width:60px; height:60px; border:4px solid rgba(255,170,102,0.2); border-top-color:#ffaa66; border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #loading p { color:#666; margin-top:15px; font-size:11px; }
        .modal { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.95); border:2px solid rgba(255,170,102,0.6); border-radius:20px; padding:20px; z-index:200; min-width:320px; max-width:85vw; display:none; max-height:70vh; overflow-y:auto; }
        .modal.active { display:block; }
        .modal h3 { color:#ffaa66; margin-bottom:15px; text-align:center; }
        .close-modal { float:right; background:none; border:none; color:#ffaa66; font-size:20px; cursor:pointer; }
        .creature-entry { background:rgba(255,170,102,0.1); border:1px solid rgba(255,170,102,0.4); border-radius:10px; padding:10px; margin:8px 0; font-size:11px; }
        #desktopControls { position:absolute; bottom:10px; left:10px; background:rgba(0,0,0,0.85); border-radius:12px; padding:10px; color:#888; font-size:9px; z-index:10; border:2px solid rgba(255,255,255,0.1); }
        #fpsDisplay { position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.85); border-radius:10px; padding:8px; color:#00ff00; font-size:10px; z-index:10; }
        #creatureDex { position:absolute; bottom:60px; right:10px; background:rgba(0,0,0,0.85); border-radius:12px; padding:10px; color:#ff8844; font-size:10px; z-index:10; border:2px solid rgba(255,136,68,0.4); display:none; }
        footer { position:absolute; bottom:5px; left:0; right:0; text-align:center; font-size:8px; color:#444; pointer-events:none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="joystick"><div class="joystick-knob"></div></div>
        <div id="lookJoystick"><div class="joystick-knob"></div></div>
        <div id="mobileActions">
            <button class="action-btn" id="flyUpBtn">▲</button>
            <button class="action-btn" id="flyDownBtn">▼</button>
        </div>
        <div id="topBar">
            <button class="top-btn" onclick="toggleCreatureDex()">🦎 Dex</button>
            <button class="top-btn" onclick="teleportToSpawn()">🔄 Spawn</button>
        </div>
        <div id="regionInfo">
            <div id="regionName">🏛️ Delta Sprawl</div>
            <div class="stat-row"><span>Biome:</span><span id="biomeDisplay">Flooded Urban</span></div>
            <div class="stat-row"><span>Creatures:</span><span id="creatureCount">0</span></div>
            <div class="stat-row"><span>Seen:</span><span id="seenCount">0</span>/20</div>
        </div>
        <div id="coords">
            <div>X: <span id="posX">0</span></div>
            <div>Y: <span id="posY">30</span></div>
            <div>Z: <span id="posZ">0</span></div>
        </div>
        <div id="desktopControls"><div>WASD: Move | Mouse: Look (click) | Space: Up | Shift: Down</div></div>
        <div id="fpsDisplay">FPS: <span id="fpsValue">60</span></div>
        <div id="creatureDex"><div id="dexList"></div></div>
    </div>
    <div id="loading">
        <h1>🏛️ NEO-KEMET</h1>
        <div class="loader"></div>
        <p>Loading Creatures...</p>
    </div>

    <script>
        // === CREATURE DATABASE (Pokemon/Digimon Inspired) ===
        const CREATURE_DATABASE = [
            // Fire Types
            { id:1, name:"Pyrodrake", type:"fire", hp:80, attack:65, defense:50, speed:70, color:"#ff6644", secondary:"#ffcc00", description:"Dragon-like creature with flaming tail", size:35, habitat:["core", "exclusion"] },
            { id:2, name:"Infernox", type:"fire", hp:90, attack:75, defense:60, speed:55, color:"#ff3300", secondary:"#ff9900", description:"Bipedal beast with fire mane", size:40, habitat:["exclusion"] },
            { id:3, name:"Flameowl", type:"fire", hp:60, attack:55, defense:40, speed:85, color:"#ff8844", secondary:"#ffff66", description:"Owl with fiery feathers", size:25, habitat:["core", "dunes"] },
            
            // Water Types
            { id:4, name:"Aquatort", type:"water", hp:100, attack:50, defense:90, speed:40, color:"#4488ff", secondary:"#66ccff", description:"Turtle with water shell", size:38, habitat:["delta"] },
            { id:5, name:"Tidalon", type:"water", hp:75, attack:70, defense:55, speed:75, color:"#0066cc", secondary:"#00ccff", description:"Dolphin-like sky swimmer", size:30, habitat:["delta", "aether"] },
            { id:6, name:"Krakken", type:"water", hp:85, attack:80, defense:65, speed:50, color:"#004488", secondary:"#0088cc", description:"Octopus creature with tentacles", size:45, habitat:["delta"] },
            
            // Grass Types
            { id:7, name:"Verdantaur", type:"grass", hp:95, attack:60, defense:80, speed:45, color:"#22cc44", secondary:"#66ff88", description:"Bull with plant horns", size:42, habitat:["delta", "dunes"] },
            { id:8, name:"Leafwing", type:"grass", hp:65, attack:55, defense:45, speed:90, color:"#44dd66", secondary:"#88ffaa", description:"Butterfly with leaf patterns", size:28, habitat:["delta"] },
            { id:9, name:"Treantle", type:"grass", hp:110, attack:65, defense:85, speed:35, color:"#338844", secondary:"#66aa77", description:"Walking tree creature", size:50, habitat:["delta"] },
            
            // Electric Types
            { id:10, name:"Voltiger", type:"electric", hp:70, attack:75, defense:50, speed:95, color:"#ffdd00", secondary:"#ff8800", description:"Tiger with electric stripes", size:38, habitat:["core"] },
            { id:11, name:"Sparkit", type:"electric", hp:55, attack:60, defense:40, speed:100, color:"#ffff44", secondary:"#ffcc00", description:"Small cat with charged fur", size:22, habitat:["core", "aether"] },
            { id:12, name:"Thunderoc", type:"electric", hp:80, attack:85, defense:60, speed:70, color:"#ffaa00", secondary:"#ffff00", description:"Bird that rides lightning", size:35, habitat:["aether"] },
            
            // Psychic Types
            { id:13, name:"Mindrake", type:"psychic", hp:65, attack:90, defense:45, speed:80, color:"#cc66ff", secondary:"#ff66cc", description:"Dragon with psychic powers", size:40, habitat:["aether"] },
            { id:14, name:"Nebulox", type:"psychic", hp:75, attack:70, defense:55, speed:75, color:"#9966ff", secondary:"#cc99ff", description:"Fox with cosmic aura", size:32, habitat:["aether", "core"] },
            { id:15, name:"Oracleye", type:"psychic", hp:60, attack:65, defense:50, speed:70, color:"#aa88ff", secondary:"#ddaaff", description:"Floating eye that sees future", size:25, habitat:["aether"] },
            
            // Dark Types
            { id:16, name:"Shadowfang", type:"dark", hp:75, attack:85, defense:55, speed:80, color:"#442266", secondary:"#8844aa", description:"Wolf with shadow cloak", size:38, habitat:["exclusion", "core"] },
            { id:17, name:"Grimmaw", type:"dark", hp:85, attack:80, defense:65, speed:60, color:"#331144", secondary:"#663377", description:"Crow-like predator", size:30, habitat:["exclusion"] },
            { id:18, name:"Phantomime", type:"dark", hp:70, attack:75, defense:50, speed:85, color:"#552266", secondary:"#9955aa", description:"Mimic creature of shadows", size:35, habitat:["core", "exclusion"] },
            
            // Dragon Types
            { id:19, name:"Apexwyrm", type:"dragon", hp:120, attack:95, defense:85, speed:65, color:"#ff6688", secondary:"#ffccdd", description:"Ancient dragon king", size:55, habitat:["aether"] },
            { id:20, name:"Seraphyne", type:"dragon", hp:90, attack:80, defense:70, speed:85, color:"#ffffff", secondary:"#ffaaaa", description:"Angel dragon hybrid", size:45, habitat:["aether", "core"] }
        ];
        
        // === WORLD DATA ===
        const REGIONS = [
            { id:'delta', name:'🏛️ Delta Sprawl', cx:0, cz:0, w:8000, d:8000, biome:'Flooded Urban', ground:'#1a2a3a', fog:'#504060' },
            { id:'core', name:'🌆 Neo-Kemet Core', cx:10000, cz:0, w:12000, d:12000, biome:'Urban Core', ground:'#2a2a3a', fog:'#403545' },
            { id:'dunes', name:'🏜️ Corporate Dunes', cx:-10000, cz:0, w:10000, d:10000, biome:'Desert', ground:'#8b7355', fog:'#c4a574' },
            { id:'exclusion', name:'☢️ Exclusion Zone', cx:0, cz:-15000, w:8000, d:8000, biome:'Volcanic', ground:'#3a2a2a', fog:'#5a4a3a' },
            { id:'aether', name:'🌌 The Aether', cx:0, cz:15000, w:10000, d:10000, biome:'Orbital Void', ground:'#0a0a1a', fog:'#1a1a3a' }
        ];
        
        // === GAME STATE ===
        let canvas, ctx;
        let camera = { x: 0, y: 30, z: 0, yaw: 0, pitch: -0.15 };
        let creatures = [];
        let currentRegion = REGIONS[0];
        let moveState = { fwd:false, bwd:false, left:false, right:false, up:false, down:false };
        let touchMove = { x:0, y:0 };
        let lastTime = 0;
        let fps = 60, frameCount = 0, lastFpsTime = 0;
        let gameRunning = false;
        let renderDistance = 600;
        let maxCreatures = 20;
        let seenCreatures = new Set();
        let creatureImages = {};
        
        // === INIT ===
        window.addEventListener('load', () => {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            resize();
            window.addEventListener('resize', resize);
            setupControls();
            createCreatureSprites();
            
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                gameRunning = true;
                lastTime = performance.now();
                lastFpsTime = lastTime;
                requestAnimationFrame(gameLoop);
                
                // Spawn creatures
                setInterval(() => {
                    if(gameRunning && creatures.length < maxCreatures) spawnCreature();
                }, 2500);
            }, 2000);
        });
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        function setupControls() {
            document.addEventListener('keydown', e => {
                if(e.code==='KeyW' || e.code==='ArrowUp') moveState.fwd=true;
                if(e.code==='KeyS' || e.code==='ArrowDown') moveState.bwd=true;
                if(e.code==='KeyA' || e.code==='ArrowLeft') moveState.left=true;
                if(e.code==='KeyD' || e.code==='ArrowRight') moveState.right=true;
                if(e.code==='Space') moveState.up=true;
                if(e.code==='ShiftLeft') moveState.down=true;
            });
            document.addEventListener('keyup', e => {
                if(e.code==='KeyW' || e.code==='ArrowUp') moveState.fwd=false;
                if(e.code==='KeyS' || e.code==='ArrowDown') moveState.bwd=false;
                if(e.code==='KeyA' || e.code==='ArrowLeft') moveState.left=false;
                if(e.code==='KeyD' || e.code==='ArrowRight') moveState.right=false;
                if(e.code==='Space') moveState.up=false;
                if(e.code==='ShiftLeft') moveState.down=false;
            });
            
            document.addEventListener('mousemove', e => {
                if(document.pointerLockElement === canvas) {
                    camera.yaw -= e.movementX * 0.002;
                    camera.pitch -= e.movementY * 0.002;
                    camera.pitch = Math.max(-0.4, Math.min(0.3, camera.pitch));
                }
            });
            canvas.addEventListener('click', () => {
                if(window.innerWidth > 768) canvas.requestPointerLock();
            });
            
            setupJoystick('joystick', true);
            setupJoystick('lookJoystick', false);
            
            document.getElementById('flyUpBtn').addEventListener('touchstart', e => { e.preventDefault(); moveState.up=true; });
            document.getElementById('flyUpBtn').addEventListener('touchend', e => { e.preventDefault(); moveState.up=false; });
            document.getElementById('flyDownBtn').addEventListener('touchstart', e => { e.preventDefault(); moveState.down=true; });
            document.getElementById('flyDownBtn').addEventListener('touchend', e => { e.preventDefault(); moveState.down=false; });
        }
        
        function setupJoystick(id, isMove) {
            const joy = document.getElementById(id);
            const knob = joy.querySelector('.joystick-knob');
            const maxDist = 50;
            let active = false;
            
            joy.addEventListener('touchstart', e => {
                e.preventDefault();
                active = true;
                handleJoystick(e, joy, knob, maxDist, isMove);
            }, {passive:false});
            
            joy.addEventListener('touchmove', e => {
                e.preventDefault();
                if(active) handleJoystick(e, joy, knob, maxDist, isMove);
            }, {passive:false});
            
            joy.addEventListener('touchend', e => {
                e.preventDefault();
                active = false;
                knob.style.transform = 'translate(-50%, -50%)';
                if(isMove) { touchMove.x = 0; touchMove.y = 0; moveState.fwd = moveState.bwd = moveState.left = moveState.right = false; }
            });
        }
        
        function handleJoystick(e, joy, knob, maxDist, isMove) {
            const touch = e.changedTouches[0];
            const rect = joy.getBoundingClientRect();
            const cx = rect.left + rect.width/2;
            const cy = rect.top + rect.height/2;
            
            let dx = touch.clientX - cx;
            let dy = touch.clientY - cy;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if(dist > maxDist) { dx = (dx/dist) * maxDist; dy = (dy/dist) * maxDist; }
            
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            
            const nx = dx/maxDist, ny = dy/maxDist;
            
            if(isMove) {
                touchMove.x = nx; touchMove.y = ny;
                moveState.fwd = ny < -0.3; moveState.bwd = ny > 0.3;
                moveState.left = nx < -0.3; moveState.right = nx > 0.3;
            } else {
                camera.yaw -= nx * 0.03;
                camera.pitch -= ny * 0.03;
                camera.pitch = Math.max(-0.4, Math.min(0.3, camera.pitch));
            }
        }
        
        // === CREATE CREATURE SPRITES ===
        function createCreatureSprites() {
            CREATURE_DATABASE.forEach(creature => {
                const spriteCanvas = document.createElement('canvas');
                spriteCanvas.width = 128;
                spriteCanvas.height = 128;
                const sctx = spriteCanvas.getContext('2d');
                
                // Draw creature based on type
                drawCreatureSprite(sctx, creature);
                
                creatureImages[creature.id] = spriteCanvas;
            });
        }
        
        function drawCreatureSprite(ctx, creature) {
            const cx = 64, cy = 64;
            const size = creature.size;
            
            ctx.save();
            ctx.translate(cx, cy);
            
            // Glow effect
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 1.5);
            gradient.addColorStop(0, creature.color + '88');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(0, 0, size * 1.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Body
            ctx.fillStyle = creature.color;
            
            if(creature.type === 'fire') {
                // Dragon-like body
                ctx.beginPath();
                ctx.ellipse(0, 10, size * 0.6, size * 0.8, 0, 0, Math.PI * 2);
                ctx.fill();
                // Head
                ctx.beginPath();
                ctx.arc(0, -size * 0.5, size * 0.4, 0, Math.PI * 2);
                ctx.fill();
                // Wings
                ctx.fillStyle = creature.secondary;
                ctx.beginPath();
                ctx.moveTo(-size * 0.3, 0);
                ctx.lineTo(-size * 0.8, -size * 0.3);
                ctx.lineTo(-size * 0.5, size * 0.3);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(size * 0.3, 0);
                ctx.lineTo(size * 0.8, -size * 0.3);
                ctx.lineTo(size * 0.5, size * 0.3);
                ctx.fill();
                // Flame tail
                ctx.fillStyle = creature.secondary;
                ctx.beginPath();
                ctx.moveTo(0, size * 0.7);
                ctx.quadraticCurveTo(-size * 0.3, size * 1.2, -size * 0.2, size * 1.5);
                ctx.quadraticCurveTo(0, size * 1.3, size * 0.2, size * 1.5);
                ctx.quadraticCurveTo(size * 0.3, size * 1.2, 0, size * 0.7);
                ctx.fill();
            } else if(creature.type === 'water') {
                // Aquatic body
                ctx.beginPath();
                ctx.ellipse(0, 0, size * 0.7, size * 0.5, 0, 0, Math.PI * 2);
                ctx.fill();
                // Shell/fin
                ctx.fillStyle = creature.secondary;
                ctx.beginPath();
                ctx.arc(0, -size * 0.2, size * 0.5, Math.PI, 0);
                ctx.fill();
                // Flippers
                ctx.fillStyle = creature.color;
                ctx.beginPath();
                ctx.ellipse(-size * 0.6, 0, size * 0.3, size * 0.2, -0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(size * 0.6, 0, size * 0.3, size * 0.2, 0.3, 0, Math.PI * 2);
                ctx.fill();
            } else if(creature.type === 'grass') {
                // Plant-like body
                ctx.beginPath();
                ctx.ellipse(0, 15, size * 0.5, size * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
                // Leaves
                ctx.fillStyle = creature.secondary;
                for(let i = 0; i < 5; i++) {
                    const angle = (i / 5) * Math.PI - Math.PI / 2;
                    ctx.save();
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.ellipse(0, -size * 0.6, size * 0.2, size * 0.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            } else if(creature.type === 'electric') {
                // Feline body
                ctx.beginPath();
                ctx.ellipse(0, 10, size * 0.6, size * 0.5, 0, 0, Math.PI * 2);
                ctx.fill();
                // Head
                ctx.beginPath();
                ctx.arc(0, -size * 0.3, size * 0.35, 0, Math.PI * 2);
                ctx.fill();
                // Ears
                ctx.beginPath();
                ctx.moveTo(-size * 0.2, -size * 0.5);
                ctx.lineTo(-size * 0.3, -size * 0.8);
                ctx.lineTo(-size * 0.1, -size * 0.6);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(size * 0.2, -size * 0.5);
                ctx.lineTo(size * 0.3, -size * 0.8);
                ctx.lineTo(size * 0.1, -size * 0.6);
                ctx.fill();
                // Lightning tail
                ctx.fillStyle = creature.secondary;
                ctx.beginPath();
                ctx.moveTo(0, size * 0.4);
                ctx.lineTo(-size * 0.2, size * 0.8);
                ctx.lineTo(size * 0.1, size * 0.7);
                ctx.lineTo(-size * 0.1, size * 1.1);
                ctx.lineTo(size * 0.2, size * 0.9);
                ctx.lineTo(size * 0.1, size * 0.5);
                ctx.closePath();
                ctx.fill();
            } else if(creature.type === 'psychic') {
                // Floating body
                ctx.beginPath();
                ctx.arc(0, 0, size * 0.5, 0, Math.PI * 2);
                ctx.fill();
                // Psychic ring
                ctx.strokeStyle = creature.secondary;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.ellipse(0, 0, size * 0.8, size * 0.3, 0, 0, Math.PI * 2);
                ctx.stroke();
                // Orbiting orbs
                ctx.fillStyle = creature.secondary;
                for(let i = 0; i < 3; i++) {
                    const angle = (Date.now() * 0.002 + (i / 3) * Math.PI * 2);
                    const ox = Math.cos(angle) * size * 0.8;
                    const oy = Math.sin(angle) * size * 0.3;
                    ctx.beginPath();
                    ctx.arc(ox, oy, size * 0.15, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if(creature.type === 'dark') {
                // Shadowy body
                ctx.beginPath();
                ctx.ellipse(0, 10, size * 0.5, size * 0.7, 0, 0, Math.PI * 2);
                ctx.fill();
                // Cloak
                ctx.fillStyle = creature.secondary + 'cc';
                ctx.beginPath();
                ctx.moveTo(-size * 0.4, -size * 0.3);
                ctx.quadraticCurveTo(-size * 0.6, size * 0.5, -size * 0.5, size * 0.8);
                ctx.quadraticCurveTo(0, size * 0.6, size * 0.5, size * 0.8);
                ctx.quadraticCurveTo(size * 0.6, size * 0.5, size * 0.4, -size * 0.3);
                ctx.quadraticCurveTo(0, -size * 0.5, -size * 0.4, -size * 0.3);
                ctx.fill();
                // Glowing eyes
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(-size * 0.15, -size * 0.2, size * 0.1, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(size * 0.15, -size * 0.2, size * 0.1, 0, Math.PI * 2);
                ctx.fill();
            } else if(creature.type === 'dragon') {
                // Majestic dragon body
                ctx.beginPath();
                ctx.ellipse(0, 15, size * 0.7, size * 0.9, 0, 0, Math.PI * 2);
                ctx.fill();
                // Head
                ctx.beginPath();
                ctx.arc(0, -size * 0.6, size * 0.45, 0, Math.PI * 2);
                ctx.fill();
                // Horns
                ctx.fillStyle = creature.secondary;
                ctx.beginPath();
                ctx.moveTo(-size * 0.2, -size * 0.8);
                ctx.lineTo(-size * 0.4, -size * 1.2);
                ctx.lineTo(-size * 0.15, -size * 0.9);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(size * 0.2, -size * 0.8);
                ctx.lineTo(size * 0.4, -size * 1.2);
                ctx.lineTo(size * 0.15, -size * 0.9);
                ctx.fill();
                // Large wings
                ctx.fillStyle = creature.color + 'aa';
                ctx.beginPath();
                ctx.moveTo(-size * 0.4, 0);
                ctx.quadraticCurveTo(-size * 1.2, -size * 0.5, -size * 1.0, size * 0.5);
                ctx.lineTo(-size * 0.3, size * 0.3);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(size * 0.4, 0);
                ctx.quadraticCurveTo(size * 1.2, -size * 0.5, size * 1.0, size * 0.5);
                ctx.lineTo(size * 0.3, size * 0.3);
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        function spawnCreature() {
            const available = CREATURE_DATABASE.filter(c => c.habitat.includes(currentRegion.id));
            if(available.length === 0) return;
            
            const template = available[Math.floor(Math.random() * available.length)];
            creatures.push({
                ...template,
                x: camera.x + (Math.random() - 0.5) * 400,
                y: 5 + Math.random() * 30,
                z: camera.z + (Math.random() - 0.5) * 400,
                vx: (Math.random() - 0.5) * 20,
                vz: (Math.random() - 0.5) * 20,
                vy: (Math.random() - 0.5) * 10,
                age: 0,
                rotation: Math.random() * Math.PI * 2,
                animPhase: Math.random() * Math.PI * 2
            });
            document.getElementById('creatureCount').textContent = creatures.length;
        }
        
        function project(x, y, z) {
            const dx = x - camera.x;
            const dy = y - camera.y;
            const dz = z - camera.z;
            
            const rx = dx * Math.cos(camera.yaw) - dz * Math.sin(camera.yaw);
            const rz = dx * Math.sin(camera.yaw) + dz * Math.cos(camera.yaw);
            const ry = dy * Math.cos(camera.pitch) - rz * Math.sin(camera.pitch);
            const rz2 = dy * Math.sin(camera.pitch) + rz * Math.cos(camera.pitch);
            
            if(rz2 <= 2) return null;
            
            const fov = 500;
            const scale = fov / rz2;
            
            return { x: canvas.width/2 + rx * scale, y: canvas.height/2 - ry * scale, scale: scale, z: rz2 };
        }
        
        function drawCreature(c) {
            const p = project(c.x, c.y, c.z);
            if(!p || p.scale < 0.008 || p.z > renderDistance) return;
            
            // Mark as seen
            if(!seenCreatures.has(c.id)) {
                seenCreatures.add(c.id);
                document.getElementById('seenCount').textContent = seenCreatures.size;
            }
            
            const s = c.size * p.scale * 0.35;
            const sprite = creatureImages[c.id];
            
            if(sprite) {
                // Draw animated sprite
                c.animPhase += 0.05;
                const bounce = Math.sin(c.animPhase) * 5;
                
                ctx.save();
                ctx.translate(p.x, p.y + bounce);
                
                // Face camera
                const flip = Math.sin(camera.yaw - Math.atan2(c.z - camera.z, c.x - camera.x)) > 0;
                ctx.scale(flip ? -1 : 1, 1);
                
                ctx.drawImage(sprite, -s, -s, s * 2, s * 2);
                ctx.restore();
            }
            
            // Name tag
            if(p.z < 200) {
                ctx.fillStyle = '#fff';
                ctx.font = '10px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(c.name, p.x, p.y - s - 5);
            }
        }
        
        function drawGround() {
            const horizon = canvas.height / 2 - camera.pitch * 150;
            const gradient = ctx.createLinearGradient(0, horizon, 0, canvas.height);
            gradient.addColorStop(0, currentRegion.fog);
            gradient.addColorStop(1, currentRegion.ground);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, horizon, canvas.width, canvas.height - horizon);
        }
        
        function drawSky() {
            const horizon = canvas.height / 2 - camera.pitch * 150;
            const gradient = ctx.createLinearGradient(0, 0, 0, horizon);
            gradient.addColorStop(0, '#050510');
            gradient.addColorStop(1, currentRegion.fog);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, horizon);
            
            // Stars
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.6;
            for(let i = 0; i < 30; i++) {
                const sx = ((i * 137.5) % canvas.width);
                const sy = ((i * 97.3) % (horizon * 0.8));
                ctx.beginPath();
                ctx.arc(sx, sy, 1, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
        
        function checkRegionChange() {
            for(const region of REGIONS) {
                const hw = region.w / 2, hd = region.d / 2;
                if(camera.x >= region.cx - hw && camera.x <= region.cx + hw &&
                   camera.z >= region.cz - hd && camera.z <= region.cz + hd) {
                    if(currentRegion.id !== region.id) {
                        currentRegion = region;
                        document.getElementById('regionName').textContent = region.name;
                        document.getElementById('biomeDisplay').textContent = region.biome;
                        creatures = [];
                        break;
                    }
                }
            }
        }
        
        window.toggleCreatureDex = () => {
            const dex = document.getElementById('creatureDex');
            const list = document.getElementById('dexList');
            
            if(dex.style.display === 'block') {
                dex.style.display = 'none';
            } else {
                let html = '<b style="color:#ffaa66">CREATURE DEX</b><br><br>';
                CREATURE_DATABASE.forEach(c => {
                    const seen = seenCreatures.has(c.id);
                    html += `<div class="creature-entry" style="${seen ? '' : 'opacity:0.5'}">
                        <b style="color:${c.color}">${c.name}</b> ${seen ? '✓' : '🔒'}<br>
                        <span style="color:#888">${c.type} | HP:${c.hp} ATK:${c.attack}</span><br>
                        <span style="color:#666; font-size:9px">${seen ? c.description : '???'}</span>
                    </div>`;
                });
                list.innerHTML = html;
                dex.style.display = 'block';
            }
        };
        
        window.teleportToSpawn = () => {
            camera.x = 0; camera.y = 30; camera.z = 0; camera.yaw = 0; camera.pitch = -0.15;
        };
        
        function gameLoop(timestamp) {
            if(!gameRunning) return;
            requestAnimationFrame(gameLoop);
            
            frameCount++;
            if(timestamp - lastFpsTime >= 500) {
                fps = Math.round(frameCount * 1000 / (timestamp - lastFpsTime));
                frameCount = 0;
                lastFpsTime = timestamp;
                document.getElementById('fpsValue').textContent = fps;
            }
            
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawSky();
            
            const speed = 60;
            const dirX = Math.sin(camera.yaw), dirZ = Math.cos(camera.yaw);
            const rightX = Math.sin(camera.yaw - Math.PI/2), rightZ = Math.cos(camera.yaw - Math.PI/2);
            
            let dx = 0, dz = 0, dy = 0;
            if(moveState.fwd) { dx += dirX; dz += dirZ; }
            if(moveState.bwd) { dx -= dirX; dz -= dirZ; }
            if(moveState.left) { dx += rightX; dz += rightZ; }
            if(moveState.right) { dx -= rightX; dz -= rightZ; }
            if(moveState.up) dy += speed * dt;
            if(moveState.down) dy -= speed * dt;
            
            if(touchMove.x || touchMove.y) {
                dx += dirX * -touchMove.y + rightX * touchMove.x;
                dz += dirZ * -touchMove.y + rightZ * touchMove.x;
            }
            
            camera.x += dx * speed * dt;
            camera.z += dz * speed * dt;
            camera.y += dy;
            
            if(camera.y < 5) camera.y = 5;
            if(camera.y > 400) camera.y = 400;
            
            checkRegionChange();
            
            creatures.forEach((c, i) => {
                c.x += c.vx * dt;
                c.z += c.vz * dt;
                c.y += Math.sin(c.animPhase) * 0.3;
                c.age++;
                if(c.age > 3000 || Math.sqrt((c.x-camera.x)**2 + (c.z-camera.z)**2) > 500) {
                    creatures.splice(i, 1);
                }
            });
            document.getElementById('creatureCount').textContent = creatures.length;
            
            document.getElementById('posX').textContent = Math.round(camera.x);
            document.getElementById('posY').textContent = Math.round(camera.y);
            document.getElementById('posZ').textContent = Math.round(camera.z);
            
            drawGround();
            
            const visible = creatures.filter(c => Math.sqrt((c.x-camera.x)**2 + (c.z-camera.z)**2) < renderDistance);
            visible.sort((a, b) => {
                const da = Math.sqrt((a.x-camera.x)**2 + (a.z-camera.z)**2);
                const db = Math.sqrt((b.x-camera.x)**2 + (b.z-camera.z)**2);
                return db - da;
            });
            visible.forEach(c => drawCreature(c));
        }
    </script>
    <footer>🏛️ NEO-KEMET | 20 Unique Creatures | Collect Them All!</footer>
</body>
