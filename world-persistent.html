<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌌 SOULVERSE — The Never-Sleeping Realm | PLT Press</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #000000; overflow: hidden; font-family: 'Orbitron', 'Courier New', monospace; height: 100vh; width: 100vw; }
        #world-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        /* Nav overlay for 3D world */
        .nav-bar { position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center; padding: 10px 16px; background: rgba(0,0,0,0.55); backdrop-filter: blur(10px); z-index: 500; border-bottom: 1px solid rgba(255,170,68,0.2); pointer-events: auto; }
        .nav-back { background: rgba(255,170,68,0.1); border: 1px solid rgba(255,170,68,0.4); border-radius: 30px; padding: 5px 14px; font-size: 11px; cursor: pointer; color: #ffaa44; transition: background 0.2s; font-family: monospace; }
        .nav-back:hover { background: rgba(255,170,68,0.25); }
        .nav-title { flex: 1; text-align: center; font-size: 11px; color: #554422; letter-spacing: 2px; pointer-events: none; }
        .hud { position: absolute; bottom: 30px; left: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); border-radius: 40px; padding: 10px 20px; font-size: 11px; z-index: 100; font-family: monospace; pointer-events: none; border-left: 2px solid #ffaa44; }
        .realm-status { position: absolute; top: 50px; right: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); border-radius: 20px; padding: 10px 16px; font-size: 10px; z-index: 100; text-align: right; font-family: monospace; pointer-events: none; border-right: 2px solid #ffaa44; }
        .persistence-badge { position: absolute; top: 50px; left: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); border-radius: 20px; padding: 6px 12px; font-size: 9px; z-index: 100; color: #88ffaa; font-family: monospace; pointer-events: none; }
        .voice-input { position: absolute; bottom: 30px; right: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); border-radius: 40px; padding: 8px 16px; display: flex; gap: 8px; z-index: 100; pointer-events: auto; border: 1px solid rgba(255,170,68,0.4); }
        .voice-input input { background: transparent; border: none; color: #ffdd99; font-family: monospace; outline: none; width: 220px; }
        .voice-input button { background: rgba(255,170,68,0.2); border: none; color: #ffaa44; cursor: pointer; font-family: monospace; padding: 4px 16px; border-radius: 30px; }
        .conversation-bubble { position: absolute; background: rgba(0,0,0,0.85); backdrop-filter: blur(16px); border-radius: 20px; padding: 10px 18px; max-width: 280px; border-left: 3px solid #ffaa44; font-size: 12px; z-index: 200; pointer-events: none; animation: fadeInUp 0.3s ease; font-family: monospace; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .time-warp { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-radius: 60px; padding: 20px 40px; text-align: center; z-index: 300; border: 1px solid #ffaa44; animation: fadeOut 3s forwards; pointer-events: none; }
        @keyframes fadeOut { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 80% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); visibility: hidden; } }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-back" onclick="window.location.href='index.html'">← HOME</button>
        <span class="nav-title">⚡ PLT PRESS — PERSISTENT REALM</span>
        <span style="width:80px;"></span>
    </div>
    <canvas id="world-canvas"></canvas>
    <div class="persistence-badge" id="persistenceBadge">🔄 PERSISTENT REALM — Souls never sleep</div>
    <div class="hud">🌌 SOULVERSE | <span id="soulCount">0</span> souls | <span id="timeDisplay">Day 0</span></div>
    <div class="realm-status">🌀 REALM ENERGY: <span id="realmEnergy">100</span>%<br>💬 <span id="activeConvos">0</span> conversations<br>⏰ <span id="lastSeen">Just now</span></div>
    <div class="voice-input">
        <input type="text" id="userInput" placeholder="Speak to the realm... they never sleep">
        <button id="speakBtn">🎤 SPEAK</button>
    </div>
    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }</script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        let souls = [], realmEnergy = 100, worldTime = 0, lastTick = Date.now(), dayCount = 0, conversations = [], soulMeshes = [];
        const colors = { profit: 0xffaa44, love: 0xff88aa, tax: 0x88aaff };
        
        function loadPersistentWorld() {
            const saved = localStorage.getItem('soulverse_persistent');
            const now = Date.now();
            if (saved) {
                const data = JSON.parse(saved);
                souls = data.souls || [];
                realmEnergy = data.realmEnergy || 100;
                worldTime = data.worldTime || 0;
                dayCount = data.dayCount || 0;
                const lastSaveTime = data.lastSave || now;
                const hoursPassed = (now - lastSaveTime) / (1000 * 60 * 60);
                if (hoursPassed > 0.1) {
                    showTimeWarp(hoursPassed);
                    worldTime += hoursPassed;
                    dayCount = Math.floor(worldTime / 24);
                    for (const soul of souls) {
                        soul.energy = Math.max(10, soul.energy - hoursPassed * 1.5);
                        if (soul.energy > 80) soul.mood = 'energetic';
                        else if (soul.energy > 50) soul.mood = 'happy';
                        else if (soul.energy > 20) soul.mood = 'neutral';
                        else soul.mood = 'tired';
                        if (hoursPassed > 1) {
                            soul.x += (Math.random() - 0.5) * Math.min(2, hoursPassed * 0.2);
                            soul.z += (Math.random() - 0.5) * Math.min(2, hoursPassed * 0.2);
                            soul.x = Math.min(6, Math.max(-6, soul.x));
                            soul.z = Math.min(6, Math.max(-6, soul.z));
                        }
                        if (Math.random() < hoursPassed * 0.3) {
                            conversations.unshift({ id: Date.now(), speaker: soul.name, text: generateAwayMessage(soul), timestamp: Date.now(), isHistorical: true });
                        }
                    }
                    realmEnergy = Math.min(100, realmEnergy + hoursPassed * 2);
                    conversations = conversations.slice(0, 30);
                }
            } else {
                souls = [
                    { id: 'soul_1', name: 'Profit Prime', type: 'profit', personality: 'Cold, strategic.', plt: { profit: 0.92, love: 0.18, tax: 0.68 }, energy: 85, x: -2, z: -2, mood: 'energetic', skills: ['strategize', 'analyze'], relationships: {} },
                    { id: 'soul_2', name: 'Love Weaver', type: 'love', personality: 'Warm, magnetic.', plt: { profit: 0.28, love: 0.91, tax: 0.45 }, energy: 92, x: 2, z: -1.5, mood: 'happy', skills: ['teach', 'design'], relationships: {} },
                    { id: 'soul_3', name: 'Tax Collector', type: 'tax', personality: 'Precise, calm.', plt: { profit: 0.48, love: 0.22, tax: 0.94 }, energy: 78, x: 0, z: 2.5, mood: 'neutral', skills: ['analyze', 'strategize'], relationships: {} },
                    { id: 'soul_4', name: 'Harvester', type: 'profit', personality: 'Sharp, quick.', plt: { profit: 0.82, love: 0.45, tax: 0.58 }, energy: 88, x: 1.5, z: -2.2, mood: 'eager', skills: ['research', 'analyze'], relationships: {} }
                ];
                realmEnergy = 100; worldTime = 0; dayCount = 0;
            }
            savePersistent(); updateUI();
        }
        
        function generateAwayMessage(soul) {
            const messages = {
                profit: ["I calculated new strategies while you were away.", "The market shifted. I tracked it.", "Opportunities emerged. I noted them."],
                love: ["I missed you. The realm felt quieter.", "I spoke with the others. We grew closer.", "I waited. The garden bloomed."],
                tax: ["I audited our resources. All accounted for.", "Time passed. Costs were tracked.", "I maintained balance in your absence."]
            };
            return (messages[soul.type] || messages.profit)[Math.floor(Math.random() * (messages[soul.type] || messages.profit).length)];
        }
        
        function showTimeWarp(hours) {
            const warpDiv = document.createElement('div');
            warpDiv.className = 'time-warp';
            warpDiv.innerHTML = `⏰ TIME WARP<br><strong>${hours.toFixed(1)} hours passed</strong><br>The realm continued without you.`;
            document.body.appendChild(warpDiv);
            setTimeout(() => warpDiv.remove(), 3000);
        }
        
        function savePersistent() {
            localStorage.setItem('soulverse_persistent', JSON.stringify({ souls, realmEnergy, worldTime, dayCount, lastSave: Date.now(), conversations: conversations.slice(0, 50) }));
        }
        
        function tick() {
            const now = Date.now(), delta = Math.min(1, (now - lastTick) / 1000);
            lastTick = now;
            worldTime += delta / 3600;
            if (Math.floor(worldTime / 24) > dayCount) { dayCount = Math.floor(worldTime / 24); addSystemMessage(`🌅 Day ${dayCount} begins.`); }
            realmEnergy = Math.min(100, realmEnergy + delta * 0.3);
            for (const soul of souls) {
                soul.energy = Math.max(10, Math.min(100, soul.energy - delta * 0.4 + (soul.mood === 'happy' ? delta * 0.2 : 0)));
                if (soul.energy > 80) soul.mood = 'energetic';
                else if (soul.energy > 50) soul.mood = 'happy';
                else if (soul.energy > 20) soul.mood = 'neutral';
                else soul.mood = 'tired';
                soul.x += (Math.random() - 0.5) * 0.02;
                soul.z += (Math.random() - 0.5) * 0.02;
                soul.x = Math.min(6, Math.max(-6, soul.x));
                soul.z = Math.min(6, Math.max(-6, soul.z));
            }
            for (let i = 0; i < souls.length; i++) {
                for (let j = i + 1; j < souls.length; j++) {
                    const a = souls[i], b = souls[j], distance = Math.hypot(a.x - b.x, a.z - b.z);
                    if (distance < 3.5 && Math.random() > 0.99) {
                        conversations.unshift({ id: Date.now(), speaker: a.name, text: generateSoulResponse(a, b), timestamp: Date.now() });
                        setTimeout(() => { conversations.unshift({ id: Date.now(), speaker: b.name, text: generateSoulResponse(b, a), timestamp: Date.now() }); updateRelationship(a.id, b.id, 3); updateRelationship(b.id, a.id, 3); }, 2000);
                    }
                }
            }
            conversations = conversations.filter(c => Date.now() - c.timestamp < 15000);
            savePersistent(); updateUI();
        }
        
        function generateSoulResponse(soul, other) {
            const phrases = { profit: ["The numbers are clear.", "We must scale.", "Opportunity is here."], love: ["I feel a connection.", "Trust is building.", "We're growing together."], tax: ["The cost is accounted for.", "Balance is key.", "Let's measure carefully."] };
            return `[to ${other.name}] ${(phrases[soul.type] || phrases.profit)[Math.floor(Math.random() * (phrases[soul.type] || phrases.profit).length)]}`;
        }
        
        function updateRelationship(soulId, otherId, delta) {
            const soul = souls.find(s => s.id === soulId);
            if (!soul.relationships) soul.relationships = {};
            soul.relationships[otherId] = Math.min(100, Math.max(0, (soul.relationships[otherId] || 50) + delta));
        }
        
        function addSystemMessage(text) { conversations.unshift({ id: Date.now(), speaker: '🌌 Realm', text, timestamp: Date.now(), isSystem: true }); }
        
        async function speakToWorld(message) {
            if (!message.trim()) return;
            conversations.unshift({ id: Date.now(), speaker: 'You', text: message, timestamp: Date.now(), isUser: true });
            const lower = message.toLowerCase();
            for (const soul of souls) {
                const distance = Math.hypot(soul.x, soul.z);
                if (distance < 5 && Math.random() > 0.3) {
                    let response = "";
                    if (lower.includes('money') || lower.includes('profit')) response = soul.type === 'profit' ? `The numbers favor action.` : `Profit matters. But so does cost.`;
                    else if (lower.includes('love') || lower.includes('trust')) response = soul.type === 'love' ? `Connection is everything.` : `Love is currency too.`;
                    else if (lower.includes('cost') || lower.includes('tax')) response = soul.type === 'tax' ? `Everything has a price.` : `Cost matters. But so does opportunity.`;
                    else response = `${soul.personality} What do you seek?`;
                    setTimeout(() => { conversations.unshift({ id: Date.now(), speaker: soul.name, text: response, timestamp: Date.now() }); updateRelationship(soul.id, 'user', 8); }, 800);
                }
            }
        }
        
        function updateUI() {
            document.getElementById('soulCount').innerText = souls.length;
            document.getElementById('realmEnergy').innerText = Math.floor(realmEnergy);
            document.getElementById('activeConvos').innerText = conversations.filter(c => Date.now() - c.timestamp < 10000).length;
            document.getElementById('timeDisplay').innerHTML = `Day ${dayCount} · ${Math.floor(worldTime % 24)}h`;
            const saved = localStorage.getItem('soulverse_persistent');
            document.getElementById('lastSeen').innerText = saved ? `Last: ${new Date(JSON.parse(saved).lastSave).toLocaleTimeString()}` : 'First visit';
        }
        
        const canvas = document.getElementById('world-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030318);
        scene.fog = new THREE.FogExp2(0x030318, 0.006);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 10);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1, 0);
        const ambient = new THREE.AmbientLight(0x331144, 0.5);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xffcc88, 1.2);
        mainLight.position.set(5, 10, 3);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const platform = new THREE.Mesh(new THREE.CylinderGeometry(6.5, 7, 0.3, 64), new THREE.MeshStandardMaterial({ color: 0x221133, metalness: 0.6, roughness: 0.4 }));
        platform.position.y = -0.5;
        platform.receiveShadow = true;
        scene.add(platform);
        const ring = new THREE.Mesh(new THREE.TorusGeometry(5.5, 0.08, 64, 300), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x442200 }));
        ring.rotation.x = Math.PI / 2;
        ring.position.y = -0.3;
        scene.add(ring);
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(6000 * 3);
        for (let i = 0; i < 6000; i++) { positions[i*3] = (Math.random() - 0.5) * 22; positions[i*3+1] = Math.random() * 7; positions[i*3+2] = (Math.random() - 0.5) * 18; }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        scene.add(new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: 0x88aaff, size: 0.04, transparent: true, blending: THREE.AdditiveBlending })));
        
        function updateSoulMeshes() {
            soulMeshes.forEach(m => scene.remove(m));
            soulMeshes = [];
            for (const soul of souls) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), new THREE.MeshStandardMaterial({ color: colors[soul.type] || 0x88aaff, emissive: colors[soul.type] || 0x88aaff, emissiveIntensity: soul.energy / 100, metalness: 0.7 }));
                mesh.position.set(soul.x, 0.2, soul.z);
                mesh.castShadow = true;
                mesh.userData = { soul };
                scene.add(mesh);
                soulMeshes.push(mesh);
                const aura = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), new THREE.MeshBasicMaterial({ color: colors[soul.type], transparent: true, opacity: 0.15 }));
                mesh.add(aura);
            }
        }
        
        function renderBubbles() {
            document.querySelectorAll('.conversation-bubble').forEach(b => b.remove());
            for (const convo of conversations.slice(-8)) {
                const bubble = document.createElement('div');
                bubble.className = 'conversation-bubble';
                bubble.innerHTML = `<strong style="color: ${convo.speaker === 'You' ? '#88ffaa' : '#ffaa66'}">${convo.speaker}:</strong> ${convo.text}`;
                const speakerMesh = soulMeshes.find(m => m.userData.soul?.name === convo.speaker);
                if (speakerMesh && convo.speaker !== 'You' && !convo.isSystem) {
                    const vector = speakerMesh.position.clone().project(camera);
                    bubble.style.left = `${(vector.x * 0.5 + 0.5) * window.innerWidth - 140}px`;
                    bubble.style.top = `${(-(vector.y * 0.5 + 0.5) * window.innerHeight) - 50}px`;
                    bubble.style.position = 'absolute';
                    document.body.appendChild(bubble);
                } else if (convo.speaker === 'You' || convo.isSystem) {
                    bubble.style.bottom = '100px';
                    bubble.style.left = '50%';
                    bubble.style.transform = 'translateX(-50%)';
                    bubble.style.position = 'absolute';
                    document.body.appendChild(bubble);
                }
            }
        }
        
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            for (let i = 0; i < soulMeshes.length && i < souls.length; i++) {
                const mesh = soulMeshes[i], soul = souls[i];
                if (mesh && soul) {
                    mesh.position.x += (soul.x - mesh.position.x) * 0.05;
                    mesh.position.z += (soul.z - mesh.position.z) * 0.05;
                    mesh.position.y = 0.2 + Math.sin(time * 1.5 + i) * 0.08;
                    mesh.material.emissiveIntensity = soul.energy / 100;
                }
            }
            ring.rotation.z += 0.002;
            controls.update();
            renderer.render(scene, camera);
            renderBubbles();
        }
        
        loadPersistentWorld();
        updateSoulMeshes();
        animate();
        setInterval(() => { tick(); updateSoulMeshes(); }, 2000);
        setInterval(() => savePersistent(), 10000);
        document.getElementById('speakBtn').addEventListener('click', () => { const input = document.getElementById('userInput'); speakToWorld(input.value); input.value = ''; });
        document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') { speakToWorld(e.target.value); e.target.value = ''; } });
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        console.log('🌌 SOULVERSE — The Never-Sleeping Realm Awakens');
    </script>
</body>
</html>
