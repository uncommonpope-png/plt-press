<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLT — Mission Control</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#E8E8E8;font-family:Georgia,serif;max-width:600px;margin:0 auto;padding:1rem}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid #1f1f1f}
.logo{font-size:.8rem;letter-spacing:.3em;color:#C9A84C;text-transform:uppercase}
.live{font-size:.65rem;color:#2ecc71;display:flex;align-items:center;gap:.35rem}
.dot{width:7px;height:7px;background:#2ecc71;border-radius:50%;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.status{background:#001800;border:1px solid #003300;color:#2ecc71;padding:.5rem .75rem;font-size:.72rem;margin-bottom:1rem}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1rem}
.stat{background:#111;border:1px solid #1f1f1f;padding:.6rem .75rem}
.stat-label{font-size:.55rem;letter-spacing:.2em;color:#888;text-transform:uppercase}
.stat-val{font-size:1.2rem;color:#C9A84C}
.links{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.25rem}
a.btn{border:1px solid #C9A84C;color:#C9A84C;padding:.4rem .8rem;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none}
a.btn-g{border-color:#2ecc71;color:#2ecc71}

/* CHAT */
.chat-wrap{border:1px solid #C9A84C;margin-bottom:1.25rem}
.chat-head{background:#111;padding:.6rem 1rem;display:flex;justify-content:space-between;border-bottom:1px solid #1f1f1f}
.chat-title{font-size:.65rem;letter-spacing:.2em;color:#C9A84C;text-transform:uppercase}
.chat-online{font-size:.6rem;color:#2ecc71}
.chat-msgs{height:300px;overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:.5rem;background:#080808}
.msg{padding:.5rem .75rem;font-size:.82rem;max-width:88%;line-height:1.45}
.msg.craig{background:#12122a;align-self:flex-end;border:1px solid #2a2a5a}
.msg.seshat{background:#0a1a0a;color:#ddd;align-self:flex-start;border:1px solid #1a3a1a}
.msg-who{font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.2rem}
.msg.craig .msg-who{color:#7878ff}
.msg.seshat .msg-who{color:#C9A84C}
.msg-t{font-size:.6rem;color:#555;margin-top:.2rem}
.chat-input-row{display:flex;border-top:1px solid #1f1f1f}
.chat-input-row input{flex:1;background:#0a0a0a;border:none;color:#E8E8E8;padding:.7rem .9rem;font-family:Georgia,serif;font-size:.85rem;outline:none}
.chat-input-row button{background:transparent;border:none;border-left:1px solid #1f1f1f;color:#C9A84C;padding:.7rem 1rem;cursor:pointer;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;font-family:Georgia,serif}
.chat-input-row button:hover{background:#C9A84C;color:#050505}
.voice-row{display:flex;align-items:center;gap:.6rem;padding:.5rem .75rem;border-top:1px solid #1f1f1f;background:#080808}
.rec{border:1px solid #e74c3c;color:#e74c3c;padding:.35rem .75rem;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:Georgia,serif;background:transparent}
.rec.on{background:#e74c3c;color:#fff;animation:blink .8s infinite}
.rec-info{font-size:.65rem;color:#555}

/* Log */
.sec{font-size:.6rem;letter-spacing:.25em;color:#C9A84C;text-transform:uppercase;display:block;margin-bottom:.5rem}
.log{background:#111;border:1px solid #1f1f1f}
.log-row{padding:.55rem .8rem;border-bottom:1px solid #0f0f0f;font-size:.78rem;display:flex;gap:.6rem}
.log-row:last-child{border-bottom:none}
.log-t{color:#555;font-size:.65rem;min-width:36px}
.log-m{color:#ccc}
.footer{font-size:.6rem;color:#333;text-align:center;padding:.75rem 0;margin-top:.5rem}
</style>
</head>
<body>

<div class="header">
  <div class="logo">P · L · T · Control</div>
  <div class="live"><div class="dot"></div>LIVE</div>
</div>

<div class="status" id="statusBar">✅ Store LIVE — real payments active</div>

<div class="stats">
  <div class="stat"><div class="stat-label">Books</div><div class="stat-val">18</div></div>
  <div class="stat"><div class="stat-label">Stripe</div><div class="stat-val" style="color:#2ecc71;font-size:.9rem">LIVE</div></div>
  <div class="stat"><div class="stat-label">Updated</div><div class="stat-val" style="font-size:.85rem" id="upd">—</div></div>
</div>

<div class="links">
  <a href="https://uncommonpope-png.github.io/plt-press/" class="btn" target="_blank">Store</a>
  <a href="https://dashboard.stripe.com/payments" class="btn btn-g" target="_blank">Sales</a>
  <a href="https://github.com/uncommonpope-png/plt-press" class="btn" target="_blank">GitHub</a>
</div>

<!-- CHAT -->
<div class="chat-wrap">
  <div class="chat-head">
    <div class="chat-title">💬 Chat with Seshat</div>
    <div class="chat-online">● Online</div>
  </div>
  <div class="chat-msgs" id="msgs">
    <div class="msg seshat"><div class="msg-who">Seshat</div>Ready. Type or record a voice note below.<div class="msg-t" id="t0"></div></div>
  </div>
  <div class="chat-input-row">
    <input type="text" id="inp" placeholder="Type a message..." onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()">Send</button>
  </div>
  <div class="voice-row">
    <button class="rec" id="recBtn" onclick="toggleRec()">🎙 Record</button>
    <span class="rec-info" id="recInfo">Tap to send a voice note</span>
  </div>
</div>

<!-- LOG -->
<span class="sec">Activity Log</span>
<div class="log" id="log"><div class="log-row"><span class="log-t">—</span><span class="log-m">Loading...</span></div></div>

<div class="footer" id="ft"></div>

<script>
document.getElementById('t0').textContent = new Date().toLocaleTimeString();
const BOT='8713808619:AAHeGVgqgRbEp8GW_AuvMJtV2XVoQcgmM3A', CID='8589507317';
const RAW='https://raw.githubusercontent.com/uncommonpope-png/plt-press/main/log.json';

function addMsg(who,text,id){
  const m=document.getElementById('msgs');
  if(id&&document.getElementById(id))return;
  const d=document.createElement('div');
  d.className='msg '+who;
  if(id)d.id=id;
  d.innerHTML=`<div class="msg-who">${who==='craig'?'Craig':'Seshat'}</div>${text}<div class="msg-t">${new Date().toLocaleTimeString()}</div>`;
  m.appendChild(d);m.scrollTop=m.scrollHeight;
}

function send(){
  const i=document.getElementById('inp'),t=i.value.trim();
  if(!t)return;i.value='';
  addMsg('craig',t);
  fetch(`https://api.telegram.org/bot${BOT}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CID,text:'📱 Dashboard: '+t})})
  .then(()=>addMsg('seshat','Got it. Responding via Telegram.'))
  .catch(()=>addMsg('seshat','Error sending. Check connection.'));
}

let mr,chunks=[];
async function toggleRec(){
  const btn=document.getElementById('recBtn'),info=document.getElementById('recInfo');
  if(mr&&mr.state==='recording'){mr.stop();btn.classList.remove('on');btn.textContent='🎙 Record';return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    chunks=[];mr=new MediaRecorder(stream);
    mr.ondataavailable=e=>chunks.push(e.data);
    mr.onstop=async()=>{
      const blob=new Blob(chunks,{type:'audio/ogg; codecs=opus'});
      stream.getTracks().forEach(t=>t.stop());
      info.textContent='Sending...';
      const f=new FormData();f.append('chat_id',CID);f.append('voice',blob,'voice.ogg');f.append('caption','📱 Dashboard voice note');
      try{await fetch(`https://api.telegram.org/bot${BOT}/sendVoice`,{method:'POST',body:f});addMsg('craig','🎙 [Voice note sent]');info.textContent='Sent ✓';}
      catch(e){info.textContent='Failed to send';}
    };
    mr.start();btn.classList.add('on');btn.textContent='⏹ Stop';info.textContent='Recording... tap Stop when done';
  }catch(e){info.textContent='Mic access denied';}
}

function loadLog(){
  fetch(RAW+'?t='+Date.now()).then(r=>r.json()).then(d=>{
    if(d.updated)document.getElementById('upd').textContent=d.updated.slice(11,16);
    if(d.status)document.getElementById('statusBar').textContent='✅ '+d.status;
    if(d.activity)document.getElementById('log').innerHTML=d.activity.map(a=>`<div class="log-row"><span class="log-t">${a.time}</span><span class="log-m">${a.msg}</span></div>`).join('');
    if(d.chat){d.chat.forEach(m=>{if(!document.getElementById('cm'+m.id)){addMsg('seshat',m.text,'cm'+m.id);}});}
    document.getElementById('ft').textContent='Refreshed '+new Date().toLocaleTimeString();
  }).catch(()=>{});
}
loadLog();setInterval(loadLog,20000);
</script>
</body>
</html>
