<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLT Press — Mission Control</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#E8E8E8;font-family:Georgia,serif;padding:1rem}
.gold{color:#C9A84C}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #1a1a1a}
.logo{font-size:.85rem;letter-spacing:.3em;color:#C9A84C;text-transform:uppercase}
.live-badge{font-size:.7rem;color:#2ecc71;letter-spacing:.1em;display:flex;align-items:center;gap:.4rem}
.dot{width:8px;height:8px;background:#2ecc71;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.75rem;margin-bottom:1.5rem}
.card{background:#111;border:1px solid #1f1f1f;padding:1rem}
.card-label{font-size:.6rem;letter-spacing:.25em;color:#888;text-transform:uppercase;margin-bottom:.3rem}
.card-value{font-size:1.4rem;color:#C9A84C}
.card-sub{font-size:.7rem;color:#555;margin-top:.2rem}
.section{margin-bottom:1.5rem}
.sec-label{font-size:.6rem;letter-spacing:.25em;color:#C9A84C;text-transform:uppercase;margin-bottom:.75rem;display:block}
.activity-list{background:#111;border:1px solid #1f1f1f}
.activity-item{padding:.75rem 1rem;border-bottom:1px solid #0f0f0f;font-size:.8rem;display:flex;gap:.75rem}
.activity-item:last-child{border-bottom:none}
.activity-time{color:#555;font-size:.7rem;min-width:40px}
.activity-msg{color:#ccc}
.links{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
.btn{display:inline-block;border:1px solid #C9A84C;color:#C9A84C;padding:.5rem 1rem;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;text-decoration:none;font-family:Georgia,serif}
.btn:hover{background:#C9A84C;color:#050505}
.btn-blue{border-color:#3b82f6;color:#3b82f6}
.btn-blue:hover{background:#3b82f6;color:#fff}
.btn-green{border-color:#2ecc71;color:#2ecc71}
.btn-green:hover{background:#2ecc71;color:#050505}
.refresh{font-size:.65rem;color:#555;text-align:right;margin-top:.5rem}
.status-bar{background:#001a00;border:1px solid #003a00;color:#2ecc71;padding:.6rem 1rem;font-size:.75rem;margin-bottom:1.5rem;letter-spacing:.05em}
</style>
</head>
<body>

<header>
  <div class="logo">P · L · T · Mission Control</div>
  <div class="live-badge"><div class="dot"></div>LIVE</div>
</header>

<div class="status-bar" id="statusBar">✅ Store is LIVE — accepting real payments via Stripe</div>

<div class="grid">
  <div class="card">
    <div class="card-label">Books</div>
    <div class="card-value">18</div>
    <div class="card-sub">All live</div>
  </div>
  <div class="card">
    <div class="card-label">Payments</div>
    <div class="card-value" style="color:#2ecc71">LIVE</div>
    <div class="card-sub">Stripe active</div>
  </div>
  <div class="card">
    <div class="card-label">Last Update</div>
    <div class="card-value" style="font-size:.9rem" id="lastUpdate">—</div>
    <div class="card-sub">Auto-refreshes</div>
  </div>
</div>

<div class="section">
  <span class="sec-label">Quick Links</span>
  <div class="links">
    <a href="https://uncommonpope-png.github.io/plt-press/" class="btn" target="_blank">Store</a>
    <a href="https://dashboard.stripe.com/payments" class="btn btn-green" target="_blank">Stripe Sales</a>
    <a href="https://github.com/uncommonpope-png/plt-press" class="btn" target="_blank">GitHub</a>
    <a href="https://t.me/Profitlovetaxbot" class="btn btn-blue" target="_blank">Message Seshat</a>
  </div>
</div>

<div class="section">
  <span class="sec-label">Activity Log <span id="refreshNote" style="color:#555;font-weight:normal;letter-spacing:0;text-transform:none;font-size:.65rem">(refreshes every 30s)</span></span>
  <div class="activity-list" id="activityList">
    <div class="activity-item"><span class="activity-time">—</span><span class="activity-msg">Loading...</span></div>
  </div>
  <div class="refresh" id="lastFetch"></div>
</div>

<script>
const RAW = 'https://raw.githubusercontent.com/uncommonpope-png/plt-press/main/log.json';

function load() {
  fetch(RAW + '?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      document.getElementById('lastUpdate').textContent = data.updated ? data.updated.slice(11,16) + ' UTC' : '—';
      document.getElementById('statusBar').textContent = '✅ ' + (data.status || 'Store is LIVE');
      const list = document.getElementById('activityList');
      list.innerHTML = data.activity.map(a =>
        `<div class="activity-item"><span class="activity-time">${a.time}</span><span class="activity-msg">${a.msg}</span></div>`
      ).join('');
      document.getElementById('lastFetch').textContent = 'Last fetched: ' + new Date().toLocaleTimeString();
    })
    .catch(() => {
      document.getElementById('lastFetch').textContent = 'Could not refresh — ' + new Date().toLocaleTimeString();
    });
}

load();
setInterval(load, 30000);
</script>

</body>
</html>
