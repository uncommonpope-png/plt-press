        function getHeight(x,z){let h=0;h+=Math.sin(x*0.12)*Math.cos(z*0.12)*1;h+=Math.sin(x*0.3)*0.5;h+=Math.cos(z*0.3)*0.5;h+=Math.sin(x*0.7+z*0.5)*0.3;h+=Math.max(0,Math.sin(x*0.5)*Math.cos(z*0.5)-0.3)*1.2;return Math.max(0.2,h+1.6);}

        function createEnemyCharacter(type){let g;if(type==='profit')g=createProfitCharacter();else if(type==='love')g=createLoveCharacter();else g=createTaxCharacter();g.traverse(c=>{if(c.isMesh)c.material.color.setHex(0xcc5555);});return g;}
        class RTSUnit{constructor(id,name,type,x,z,isEnemy=false){this.id=id;this.name=name;this.type=type;this.isEnemy=isEnemy;this.x=x;this.z=z;this.health=100;this.maxHealth=100;this.damage=10;this.armor=0;this.speed=3;this.state='idle';this.targetPos=null;this.targetUnit=null;this.path=[];this.attackCooldown=0;this.gatherAmount=0;this.model=null;this.healthBar=null;this.animTime=0;this.armAngle=0;this.updatePosition();}updatePosition(){if(this.model){const y=getHeight(this.x,this.z)+0.5;this.model.position.set(this.x,y,this.z);if(this.healthBar)this.healthBar.position.copy(this.model.position);}}update(delta){this.animTime+=delta*5;if(this.attackCooldown>0)this.attackCooldown-=delta;if(this.state==='move')this.armAngle=Math.sin(this.animTime)*0.8;else if(this.state==='attack')this.armAngle=Math.sin(this.animTime*10)*0.5;else this.armAngle*=0.9;this.updateArmAngles();if(this.isEnemy&&this.state==='idle'){let nearest=null,minDist=Infinity;for(let u of playerUnits){let d=Math.hypot(u.x-this.x,u.z-this.z);if(d<minDist){minDist=d;nearest=u;}}if(!nearest){for(let b of playerBuildings){let d=Math.hypot(b.x-this.x,b.z-this.z);if(d<minDist){minDist=d;nearest=b;}}}if(nearest&&minDist<20)this.giveOrder('attack',nearest);else if(Math.random()<0.02){let a=Math.random()*Math.PI*2,r=10+Math.random()*15;this.giveOrder('move',{x:this.x+Math.cos(a)*r,z:this.z+Math.sin(a)*r});}}if(this.state==='move'&&this.targetPos){if(this.path.length===0)this.path=aStar({x:this.x,z:this.z},this.targetPos,this.isEnemy);if(this.path.length>0){let next=this.path[0],dx=next.x-this.x,dz=next.z-this.z,dist=Math.hypot(dx,dz);if(dist<0.2)this.path.shift();else{let move=Math.min(this.speed*delta,dist),angle=Math.atan2(dz,dx);this.x+=Math.cos(angle)*move;this.z+=Math.sin(angle)*move;}this.updatePosition();}if(this.path.length===0)this.state='idle';}else if(this.state==='attack'&&this.targetUnit&&this.targetUnit.health>0){let dx=this.targetUnit.x-this.x,dz=this.targetUnit.z-this.z,dist=Math.hypot(dx,dz);if(dist>1.5){this.targetPos={x:this.targetUnit.x,z:this.targetUnit.z};this.state='move';this.path=[];}else{if(this.attackCooldown<=0){let dmg=Math.max(1,this.damage-this.targetUnit.armor);this.targetUnit.health-=dmg;this.attackCooldown=1;if(this.targetUnit.health<=0){this.targetUnit.destroy();this.state='idle';this.targetUnit=null;}else if(this.targetUnit.healthBar)this.targetUnit.healthBar.scale.x=this.targetUnit.health/this.targetUnit.maxHealth;}}}else if(this.state==='gather'){if(!this.targetPos){let nearest=null,minDist=Infinity;for(let r of resources){let d=Math.hypot(r.position.x-this.x,r.position.z-this.z);if(d<minDist){minDist=d;nearest=r;}}if(nearest){this.targetPos={x:nearest.position.x,z:nearest.position.z};this.state='move';this.path=[];}}else{if(this.state==='move'){let dist=Math.hypot(this.targetPos.x-this.x,this.targetPos.z-this.z);if(dist<1){let rn=resources.find(r=>Math.hypot(r.position.x-this.x,r.position.z-this.z)<1);if(rn){let t=rn.userData.type;if(t==='profit')this.gatherAmount+=5;else if(t==='love')this.gatherAmount+=5;else if(t==='tax')this.gatherAmount+=5;scene.remove(rn);resources.splice(resources.indexOf(rn),1);let th=playerBuildings.find(b=>b.type==='townhall');if(th){this.targetPos={x:th.x,z:th.z};this.state='move';this.path=[];}else this.state='idle';}}}else{let th=playerBuildings.find(b=>b.type==='townhall');if(th&&Math.hypot(th.x-this.x,th.z-this.z)<1.5){if(this.gatherAmount>0){playerResources.profit+=this.gatherAmount;playerResources.love+=this.gatherAmount;playerResources.tax+=this.gatherAmount;this.gatherAmount=0;updateUI();}this.state='idle';this.targetPos=null;}}}}updateArmAngles(){if(!this.model)return;let lArm=this.model.children.find(c=>c.position.x<0&&(c.geometry.type==='CylinderGeometry'||c.geometry.type==='BoxGeometry'));let rArm=this.model.children.find(c=>c.position.x>0&&(c.geometry.type==='CylinderGeometry'||c.geometry.type==='BoxGeometry'));if(lArm)lArm.rotation.z=0.3+this.armAngle*0.5;if(rArm)rArm.rotation.z=-0.3-this.armAngle*0.5;}giveOrder(type,target){if(type==='move'){this.targetPos=target;this.state='move';this.path=[];this.targetUnit=null;}else if(type==='attack'){this.targetUnit=target;this.state='attack';this.targetPos=null;}else if(type==='gather'){this.targetBuilding=target;this.state='gather';this.targetPos=null;}}destroy(){scene.remove(this.model);if(this.healthBar)scene.remove(this.healthBar);if(this.isEnemy){let idx=enemyUnits.indexOf(this);if(idx!==-1)enemyUnits.splice(idx,1);}else{let idx=playerUnits.indexOf(this);if(idx!==-1)playerUnits.splice(idx,1);if(selectedUnits.has(this))selectedUnits.delete(this);updateSelectionDisplay();}}}
        class Building{constructor(type,x,z,isEnemy=false){this.type=type;this.x=x;this.z=z;this.isEnemy=isEnemy;this.size=1.5;this.health=500;this.maxHealth=500;this.mesh=null;this.underConstruction=true;this.constructionProgress=0;this.requiredWork=100;this.completed=false;this.productionQueue=[];this.productionTimer=0;this.attackCooldown=0;}update(delta){if(!this.completed&&this.underConstruction){this.constructionProgress+=delta*20;if(this.constructionProgress>=this.requiredWork){this.completed=true;this.underConstruction=false;if(this.type==='forge'&&!this.isEnemy)techs.forge=true;if(this.type==='market'&&!this.isEnemy)techs.market=true;if(this.type==='barracks'&&!this.isEnemy)techs.barracks=true;if(this.type==='farm'&&!this.isEnemy)techs.farm=true;if(this.mesh)this.mesh.material.color.setHex(0x88aa66);}}if(this.completed&&this.type==='barracks'&&!this.isEnemy&&this.productionQueue.length>0){this.productionTimer+=delta;if(this.productionTimer>=3){this.productionTimer=0;let ut=this.productionQueue.shift();let nu=createUnit(ut,this.x+(Math.random()-0.5)*2,this.z+(Math.random()-0.5)*2,false);nu.giveOrder('move',{x:this.x+1,z:this.z+1});}}if(this.completed&&this.type==='farm'&&!this.isEnemy){this.productionTimer+=delta;if(this.productionTimer>=5){this.productionTimer=0;playerResources.profit+=10;playerResources.love+=10;playerResources.tax+=10;updateUI();}}if(this.completed&&this.type==='tower'&&!this.isEnemy){this.attackCooldown-=delta;if(this.attackCooldown<=0){let ce=null,md=Infinity;for(let u of enemyUnits){let d=Math.hypot(u.x-this.x,u.z-this.z);if(d<md&&d<8){md=d;ce=u;}}if(ce){ce.health-=20;this.attackCooldown=1;if(ce.health<=0)ce.destroy();else if(ce.healthBar)ce.healthBar.scale.x=ce.health/ce.maxHealth;}}}}addToQueue(ut){if(!this.completed||this.isEnemy)return false;let cost=50;if(playerResources.profit>=cost&&playerResources.love>=cost&&playerResources.tax>=cost){playerResources.profit-=cost;playerResources.love-=cost;playerResources.tax-=cost;this.product         const GRID_SIZE=0.5;function getNeighbors(x,z,isEnemy){let n=[];for(let dx=-1;dx<=1;dx++){for(let dz=-1;dz<=1;dz++){if(dx===0&&dz===0)continue;let nx=x+dx*GRID_SIZE,nz=z+dz*GRID_SIZE,walkable=true,buildings=isEnemy?enemyBuildings:playerBuildings;for(let b of buildings){if(Math.abs(b.x-nx)<b.size/2&&Math.abs(b.z-nz)<b.size/2)walkable=false;}if(walkable&&Math.abs(nx)<80&&Math.abs(nz)<80)n.push({x:nx,z:nz,cost:1});}}return n;}
        function aStar(start,goal,isEnemy=false){let open=[{x:start.x,z:start.z,g:0,h:Math.hypot(start.x-goal.x,start.z-goal.z),f:Math.hypot(start.x-goal.x,start.z-goal.z),parent:null}],closed=new Set();while(open.length){open.sort((a,b)=>a.f-b.f);let cur=open.shift(),key=`${Math.floor(cur.x/GRID_SIZE)},${Math.floor(cur.z/GRID_SIZE)}`;if(closed.has(key))continue;if(Math.hypot(cur.x-goal.x,cur.z-goal.z)<0.8){let path=[],c=cur;while(c){path.unshift({x:c.x,z:c.z});c=c.parent;}return path;}closed.add(key);let nb=getNeighbors(cur.x,cur.z,isEnemy);for(let n of nb){let nk=`${Math.floor(n.x/GRID_SIZE)},${Math.floor(n.z/GRID_SIZE)}`;if(closed.has(nk))continue;let g=cur.g+n.cost,h=Math.hypot(n.x-goal.x,n.z-goal.z),f=g+h,ex=open.find(x=>x.x===n.x&&x.z===n.z);if(!ex||g<ex.g)open.push({x:n.x,z:n.z,g,h,f,parent:cur});}}return [];}
        function createUnit(type,x,z,isEnemy=false){let model=isEnemy?createEnemyCharacter(type):(type==='profit'?createProfitCharacter():type==='love'?createLoveCharacter():createTaxCharacter());const y=getHeight(x,z)+0.5;model.position.set(x,y,z);model.castShadow=true;scene.add(model);const bar=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.1,0.1),new THREE.MeshStandardMaterial({color:0xff3333}));model.add(bar);bar.position.y=0.9;const u=new RTSUnit(Date.now()+Math.random(),'Soul',type,x,z,isEnemy);u.model=model;u.healthBar=bar;if(isEnemy)enemyUnits.push(u);else playerUnits.push(u);return u;}
        function createBuilding(type,x,z,isEnemy=false){const b=new Building(type,x,z,isEnemy);const colors={townhall:0xaa8866,forge:0xcc8844,market:0x88aa66,barracks:0x8866aa,farm:0x6a994e,wall:0xaaaaaa,tower:0xaa8866};const mat=new THREE.MeshStandardMaterial({color:colors[type]||0xaaaaaa});let mesh;if(type==='wall')mesh=new THREE.Mesh(new THREE.BoxGeometry(1.2,1,0.3),mat);else if(type==='tower')mesh=new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.8,1.5,6),mat);else mesh=new THREE.Mesh(new THREE.BoxGeometry(1.5,1.2,1.5),mat);mesh.position.set(x,getHeight(x,z)+(type==='tower'?0.8:0.6),z);mesh.castShadow=true;scene.add(mesh);b.mesh=mesh;if(isEnemy)enemyBuildings.push(b);else playerBuildings.push(b);return b;}
        function addResources(){const goldMat=new THREE.MeshStandardMaterial({color:0xffaa44,emissive:0x442200}),loveMat=new THREE.MeshStandardMaterial({color:0xff88aa,emissive:0x441122}),taxMat=new THREE.MeshStandardMaterial({color:0x88aaff,emissive:0x224466});for(let i=0;i<QUALITY[currentQuality].resourceCount;i++){const x=(Math.random()-0.5)*130,z=(Math.random()-0.5)*130,y=getHeight(x,z)+0.1,r=Math.random();let mesh,mat,type;if(r<0.33){mat=goldMat;mesh=new THREE.Mesh(new THREE.IcosahedronGeometry(0.18,0),mat);type='profit';}else if(r<0.66){mat=loveMat;mesh=new THREE.Mesh(new THREE.DodecahedronGeometry(0.16),mat);type='love';}else{mat=taxMat;mesh=new THREE.Mesh(new THREE.ConeGeometry(0.16,0.3,5),mat);type='tax';}mesh.position.set(x,y,z);mesh.userData={type,value:5};mesh.castShadow=true;scene.add(mesh);resources.push(mesh);}}
        function addVegetation(){const p=QUALITY[currentQuality],grassMat=new THREE.MeshStandardMaterial({color:0x6a994e});for(let i=0;i<p.grassCount;i++){const x=(Math.random()-0.5)*140,z=(Math.random()-0.5)*140,y=getHeight(x,z);if(y>0.5&&y<3.5&&Math.abs(x)<70&&Math.abs(z)<70){const blade=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.1,0.2,3),grassMat);blade.position.set(x,y,z);blade.castShadow=true;scene.add(blade);}}}
        function addTrees(){const p=QUALITY[currentQuality],trunkMat=new THREE.MeshStandardMaterial({color:0x8B5A2B}),foliageMat=new THREE.MeshStandardMaterial({color:0x5a8f4c});for(let i=0;i<p.treeCount;i++){const x=(Math.random()-0.5)*130,z=(Math.random()-0.5)*130,y=getHeight(x,z);if(y>0.8&&y<3&&Math.abs(x)<65&&Math.abs(z)<65){const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,0.8,4),trunkMat);trunk.position.set(x,y,z);trunk.castShadow=true;scene.add(trunk);const foliage=new THREE.Mesh(new THREE.ConeGeometry(0.65,1,6),foliageMat);foliage.position.set(x,y+0.7,z);foliage.castShadow=true;scene.add(foliage);}}}
        function updateEnemyAI(delta){enemyAI.attackCooldown-=delta;enemyAI.buildCooldown-=delta;if(enemyAI.buildCooldown<=0&&enemyBuildings.length<5&&playerResources.profit>200){let th=enemyBuildings.find(b=>b.type==='townhall');if(th){let a=Math.random()*Math.PI*2,r=3+Math.random()*3,nx=th.x+Math.cos(a)*r,nz=th.z+Math.sin(a)*r,t=['barracks','forge','market','farm'][Math.floor(Math.random()*4)];createBuilding(t,nx,nz,true);enemyAI.buildCooldown=15;}}if(enemyAI.attackCooldown<=0&&enemyUnits.length>3){let t=playerBuildings[0];if(t){for(let u of enemyUnits)u.giveOrder('attack',t);}enemyAI.attackCooldown=20;}}
        function createVillage(sl,cx,cz){const vid=Date.now().toString(),v={id:vid,name:`${sl[0]?.name||'New'}Village`,centerX:cx,centerZ:cz,members:sl.map(s=>s.id),heartLevel:1,sharedStorage:{profitShards:0,lovePetals:0,taxCrystals:0}};villages.push(v);const hg=new THREE.Group();hg.add(new THREE.Mesh(new THREE.CylinderGeometry(0.8,0.8,0.3,8),new THREE.MeshStandardMaterial({color:0xffaa66})));hg.children[0].position.y=0.15;hg.add(new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,1,8),new THREE.MeshStandardMaterial({color:0xcc8844})));hg.children[1].position.y=0.7;hg.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.3,0),new THREE.MeshStandardMaterial({color:0xffaa44,emissive:0x442200})));hg.children[2].position.y=1.2;hg.position.set(cx,getHeight(cx,cz),cz);scene.add(hg);v.heartMesh=hg;return v;}
        function showVillage(v){const m=document.getElementById('villageModal');document.getElementById('villageTitle').innerText=v.name;const mem=v.members.map(id=>playerUnits.find(s=>s.id===id)).filter(s=>s);let c=`<div>❤️ Village Heart Lv.${v.heartLevel}</div><h4>Members (${mem.length})</h4>`;mem.forEach(s=>c+=`<div>${s.name}</div>`);c+=`<h4>Storage</h4><div>💰${v.sharedStorage.profitShards} ❤️${v.sharedStorage.lovePetals} ⚖️${v.sharedStorage.taxCrystals}</div><button id="depBtn">Deposit</button><button id="wthBtn">Withdraw</button>`;document.getElementById('villageContent').innerHTML=c;m.style.display='block';document.getElementById('depBtn').onclick=()=>{let a=prompt("Deposit Profit:","0");if(a&&!isNaN(a)){a=Math.min(playerResources.profit,parseInt(a));playerResources.profit-=a;v.sharedStorage.profitShards+=a;updateUI();showVillage(v);}};document.getElementById('wthBtn').onclick=()=>{let a=prompt("Withdraw Profit:","0");if(a&&!isNaN(a)){a=Math.min(v.sharedStorage.profitShards,parseInt(a));v.sharedStorage.profitShards-=a;playerResources.profit+=a;updateUI();showVillage(v);}};}
        function updateUI(){document.getElementById('profitVal').innerText=Math.floor(playerResources.profit);document.getElementById('loveVal').innerText=Math.floor(playerResources.love);document.getElementById('taxVal').innerText=Math.floor(playerResources.tax);}
        function updateSelectionDisplay(){document.getElementById('selection-panel').innerHTML=`Selected: ${selectedUnits.size} soul${selectedUnits.size!==1?'s':''}`;}
        function updateTechTreeUI(){const c=document.getElementById('techTreeContent');c.innerHTML=`<div>Forge: ${techs.forge?'✅':'🔒'}</div><div>Market: ${techs.market?'✅':'🔒'}</div><div>Barracks: ${techs.barracks?'✅':'🔒'}</div><div>Farm: ${techs.farm?'✅':'🔒'}</div><button id="tPBtn" ${!techs.barracks?'disabled':''}>Train Profit (50)</button><button id="tLBtn" ${!techs.barracks?'disabled':''}>Train Love (50)</button><button id="tTBtn" ${!techs.barracks?'disabled':''}>Train Tax (50)</button>`;document.getElementById('tPBtn')?.addEventListener('click',()=>{let b=playerBuildings.find(x=>x.type==='barracks');if(b)b.addToQueue('profit');else alert("Build Barracks!");});document.getElementById('tLBtn')?.addEventListener('click',()=>{let b=playerBuildings.find(x=>x.type==='barracks');if(b)b.addToQueue('love');else alert("Build Barracks!");});document.getElementById('tTBtn')?.addEventListener('click',()=>{let b=playerBuildings.find(x=>x.type==='barracks');if(b)b.addToQueue('tax');else alert("Build Barracks!");});}
        function updateMinimap(){if(!minimapCtx)return;const cv=document.getElementById('minimapCanvas'),ctx=minimapCtx;ctx.fillStyle='#000';ctx.fillRect(0,0,cv.width,cv.height);const sx=cv.width/160,sz=cv.height/160;ctx.fillStyle='#fa0';for(let r of resources){let x=(r.position.x+80)*sx,z=(r.position.z+80)*sz;ctx.fillRect(x-1,z-1,2,2);}ctx.fillStyle='#8f8';for(let b of playerBuildings){let x=(b.x+80)*sx,z=(b.z+80)*sz;ctx.fillRect(x-2,z-2,4,4);}ctx.fillStyle='#f88';for(let b of enemyBuildings){let x=(b.x+80)*sx,z=(b.z+80)*sz;ctx.fillRect(x-2,z-2,4,4);}ctx.fillStyle='#8f8';for(let u of playerUnits){let x=(u.x+80)*sx,z=(u.z+80)*sz;ctx.fillRect(x-1,z-1,2,2);}ctx.fillStyle='#f88';for(let u of enemyUnits){let x=(u.x+80)*sx,z=(u.z+80)*sz;ctx.fillRect(x-1,z-1,2,2);}}
        let raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2(),dragStart=null,selectionRectActive=false,selectionRectElem=null;
        function onMouseDown(e){if(buildingMode){const rect=renderer.domElement.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/rect.width)*2-1;mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;raycaster.setFromCamera(mouse,camera);const ints=raycaster.intersectObject(terrain);if(ints.length>0){let p=ints[0].point,cost=buildingType==='townhall'?200:buildingType==='forge'?150:buildingType==='market'?120:buildingType==='barracks'?180:buildingType==='farm'?100:buildingType==='wall'?50:200;if(playerResources.profit>=cost&&playerResources.love>=cost&&playerResources.tax>=cost){playerResources.profit-=cost;playerResources.love-=cost;playerResources.tax-=cost;createBuilding(buildingType,p.x,p.z,false);updateUI();}else alert("Not enough!");}buildingMode=false;if(ghostBuilding)scene.remove(ghostBuilding);ghostBuilding=null;return;}dragStart={x:e.clientX,y:e.clientY};selectionRectActive=true;if(!selectionRectElem){selectionRectElem=document.createElement('div');selectionRectElem.className='selection-rect';document.body.appendChild(selectionRectElem);}}
        function onMouseMove(e){if(!selectionRectActive)return;let l=Math.min(dragStart.x,e.clientX),t=Math.min(dragStart.y,e.clientY),w=Math.abs(e.clientX-dragStart.x),h=Math.abs(e.clientY-dragStart.y);selectionRectElem.style.left=l+'px';selectionRectElem.style.top=t+'px';selectionRectElem.style.width=w+'px';selectionRectElem.style.height=h+'px';selectionRectElem.style.display='block';}
        function onMouseUp(e){if(!selectionRectActive){const rect=renderer.domElement.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/rect.width)*2-1;mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;raycaster.setFromCamera(mouse,camera);const ints=raycaster.intersectObjects(playerUnits.map(u=>u.model));if(ints.length>0){let u=playerUnits.find(x=>x.model===ints[0].object);if(u){if(!shiftPressed)selectedUnits.clear();selectedUnits.add(u);}else if(!shiftPressed)selectedUnits.clear();}else if(!shiftPressed)selectedUnits.clear();updateSelectionDisplay();selectionRectActive=false;if(selectionRectElem)selectionRectElem.style.display='none';return;}let minX=Math.min(dragStart.x,e.clientX),maxX=Math.max(dragStart.x,e.clientX),minY=Math.min(dragStart.y,e.clientY),maxY=Math.max(dragStart.y,e.clientY);const rect=renderer.domElement.getBoundingClientRect(),w=rect.width,h=rect.height;let nS=new Set();for(let u of playerUnits){let sp=u.model.position.clone().project(camera);let x=(sp.x*0.5+0.5)*w+rect.left,y=(-sp.y*0.5+0.5)*h+rect.top;if(x>=minX&&x<=maxX&&y>=minY&&y<=maxY)nS.add(u);}if(!shiftPressed)selectedUnits.clear();for(let u of nS)selectedUnits.add(u);updateSelectionDisplay();selectionRectActive=false;if(selectionRectElem)selectionRectElem.style.display='none';}
        function onRightClick(e){e.preventDefault();if(selectedUnits.size===0)return;const rect=renderer.domElement.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/rect.width)*2-1;mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;raycaster.setFromCamera(mouse,camera);let ints=raycaster.intersectObjects(enemyUnits.map(u=>u.model));if(ints.length>0){let tu=enemyUnits.find(x=>x.model===ints[0].object);if(tu){for(let u of selectedUnits)u.giveOrder('attack',tu);return;}}ints=raycaster.intersectObjects(resources);if(ints.length>0){for(let u of selectedUnits)u.giveOrder('gather',ints[0].object);return;}ints=raycaster.intersectObject(terrain);if(ints.length>0){let p=ints[0].point;for(let u of selectedUnits)u.giveOrder('move',{x:p.x,z:p.z});}}
        function startBuilding(type){buildingMode=true;buildingType=type;if(ghostBuilding)scene.remove(ghostBuilding);const g=new THREE.Mesh(new THREE.BoxGeometry(1.5,1.2,1.5),new THREE.MeshStandardMaterial({color:0x88ff88,transparent:true,opacity:0.5}));ghostBuilding=g;scene.add(g);const onMove=(e)=>{const rect=renderer.domElement.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/rect.width)*2-1;mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;raycaster.setFromCamera(mouse,camera);const ints=raycaster.intersectObject(terrain);if(ints.length){let p=ints[0].point;g.position.set(p.x,getHeight(p.x,p.z)+0.6,p.z);}};renderer.domElement.addEventListener('mousemove',onMove);const finish=()=>{renderer.domElement.removeEventListener('mousemove',onMove);document.removeEventListener('click',finish);};document.addEventListener('click',finish,{once:true});}
        function showPantheon(){const m=document.getElementById('pantheonModal');document.getElementById('pantheonContent').innerHTML=`<p>The Pantheon gods watch over your realm.</p><p><b>Profit Prime</b>: "If it does not multiply, it does not matter."</p><p><b>Love Weaver</b>: "Nothing grows that people do not stay for."</p><p><b>Tax Collector</b>: "Everything is paid for. If not now, later."</p><button id="bPBtn">Seek Profit's Blessing (100)</button><button id="bLBtn">Seek Love's Blessing (100)</button><button id="bTBtn">Seek Tax's Blessing (100)</button>`;m.style.display='block';document.getElementById('bPBtn')?.addEventListener('click',()=>{if(playerResources.profit>=100&&playerResources.love>=100&&playerResources.tax>=100){playerResources.profit-=100;playerResources.love-=100;playerResources.tax-=100;for(let u of playerUnits)if(u.type==='profit')u.damage+=5;updateUI();alert("Profit Prime blesses your souls!");}else alert("Need 100 of each");});document.getElementById('bLBtn')?.addEventListener('click',()=>{if(playerResources.profit>=100&&playerResources.love>=100&&playerResources.tax>=100){playerResources.profit-=100;playerResources.love-=100;playerResources.tax-=100;for(let u of playerUnits)if(u.type==='love')u.damage+=5;updateUI();alert("Love Weaver blesses your souls!");}else alert("Need 100 of each");});document.getElementById('bTBtn')?.addEventListener('click',()=>{if(playerResources.profit>=100&&playerResources.love>=100&&playerResources.tax>=100){playerResources.profit-=100;playerResources.love-=100;playerResources.tax-=100;for(let u of playerUnits)if(u.type==='tax')u.damage+=5;updateUI();alert("Tax Collector blesses your souls!");}else alert("Need 100 of each");});}
        function init(){scene=new THREE.Scene();scene.background=new THREE.Color(0x87CEEB);camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,200);camera.position.set(0,12,18);renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);renderer.shadowMap.enabled=QUALITY[currentQuality].shadows;document.body.appendChild(renderer.domElement);controls=new OrbitControls(camera,renderer.domElement);controls.enableZoom=true;controls.enablePan=true;controls.enableRotate=true;controls.target.set(0,0,0);scene.add(new THREE.AmbientLight(0x404060,0.6));const sun=new THREE.DirectionalLight(0xffdd99,0.8);sun.position.set(10,15,5);if(QUALITY[currentQuality].shadows)sun.castShadow=true;scene.add(sun);const fill=new THREE.PointLight(0xccaa88,0.4);fill.position.set(0,3,0);scene.add(fill);terrain=generateTerrain();scene.add(terrain);addVegetation();addTrees();addResources();createUnit('profit',-2,-2,false);createUnit('love',2,-1,false);createUnit('tax',-1,2,false);createBuilding('townhall',0,0,false);createUnit('profit',30,30,true);createUnit('love',32,31,true);createUnit('tax',31,32,true);createBuilding('townhall',30,30,true);createBuilding('barracks',32,32,true);createVillage(playerUnits.slice(0,3),0,0);minimapCtx=document.getElementById('minimapCanvas').getContext('2d');setInterval(updateMinimap,500);renderer.domElement.addEventListener('mousedown',onMouseDown);renderer.domElement.addEventListener('mousemove',onMouseMove);renderer.domElement.addEventListener('mouseup',onMouseUp);renderer.domElement.addEventListener('contextmenu',onRightClick);window.addEventListener('keydown',(e)=>{if(e.shiftKey)shiftPressed=true;});window.addEventListener('keyup',(e)=>{if(e.key==='Shift')shiftPressed=false;});document.getElementById('techTreeBtn').onclick=()=>{let p=document.getElementById('tech-tree-panel');p.style.display=p.style.display==='none'?'block':'none';updateTechTreeUI();};document.getElementById('closeTechTree').onclick=()=>document.getElementById('tech-tree-panel').style.display='none';document.querySelectorAll('.build-btn').forEach(b=>b.addEventListener('click',()=>startBuilding(b.dataset.building)));document.getElementById('villageBtn').onclick=()=>{if(villages.length)showVillage(villages[0]);else alert("No villages yet.");};document.getElementById('pantheonBtn').onclick=showPantheon;document.getElementById('closePantheonModal').onclick=()=>document.getElementById('pantheonModal').style.display='none';document.getElementById('closePantheon').onclick=()=>document.getElementById('pantheonModal').style.display='none';document.getElementById('closeVillageModal').onclick=()=>document.getElementById('villageModal').style.display='none';document.getElementById('closeVillage').onclick=()=>document.getElementById('villageModal').style.display='none';document.getElementById('arenaBtn').onclick=()=>alert("Arena coming soon");document.getElementById('metaverseBtn').onclick=()=>alert("Metaverse coming soon");updateUI();let lastFrame=performance.now();function animate(){let now=performance.now(),delta=Math.min(0.033,(now-lastFrame)/1000);lastFrame=now;for(let u of playerUnits)u.update(delta);for(let u of enemyUnits)u.update(delta);for(let b of playerBuildings)b.update(delta);for(let b of enemyBuildings)b.update(delta);updateEnemyAI(delta);renderer.render(scene,camera);requestAnimationFrame(animate);}animate();}
        init();
    </script>
