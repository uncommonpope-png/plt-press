<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏆 SOULVERSE – Award‑Winning Graphics | PLT Press</title>
    <style>
        body { margin:0; overflow:hidden; font-family:'Segoe UI', 'Courier New', monospace; }
        canvas { display:block; }
        #ui {
            position:absolute;
            bottom:20px;
            left:20px;
            background:rgba(0,0,0,0.6);
            backdrop-filter:blur(8px);
            border-radius:12px;
            padding:10px 15px;
            color:#ffaa66;
            font-size:12px;
            pointer-events:none;
            z-index:10;
            font-family:monospace;
        }
        #resources {
            position:absolute;
            top:20px;
            right:20px;
            background:rgba(0,0,0,0.6);
            backdrop-filter:blur(8px);
            border-radius:12px;
            padding:10px 15px;
            color:#ffaa66;
            font-size:12px;
            text-align:right;
            pointer-events:none;
            z-index:10;
        }
        #controls {
            position:absolute;
            bottom:20px;
            right:20px;
            background:rgba(0,0,0,0.6);
            backdrop-filter:blur(8px);
            border-radius:12px;
            padding:8px 12px;
            font-size:10px;
            color:#aaa;
            pointer-events:none;
        }
        @media (max-width: 768px) {
            #ui, #resources { font-size:10px; padding:6px 10px; }
            #controls { display:none; }
        }
    </style>
</head>
<body>
    <div id="ui">🏆 SOULVERSE – Award‑Winning Graphics | PLT Press</div>
    <div id="resources">
        💰 Profit: <span id="profitVal">100</span><br>
        ❤️ Love: <span id="loveVal">100</span><br>
        ⚖️ Tax: <span id="taxVal">100</span>
    </div>
    <div id="controls">
        🖱️ WASD move | Mouse look | LMB raise terrain | RMB lower terrain | 1-3 select PLT tool
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { RGBShiftShader } from 'three/addons/shaders/RGBShiftShader.js';
        import { AfterimagePass } from 'three/addons/postprocessing/AfterimagePass.js';
        import { Water } from 'three/addons/objects/Water.js';
        import { Sky } from 'three/addons/objects/Sky.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ============================================================
        // AWARD‑WINNING GRAPHICS – Soulverse Edition
        // ============================================================

        // --- Scene setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 5, 12);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        document.body.appendChild(renderer.domElement);

        // --- Controls (first-person) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.0;
        controls.panSpeed = 0.8;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 2, 0);
        controls.maxPolarAngle = Math.PI / 2.2;

        // --- Lighting (realistic, with GI approximation) ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
        scene.add(ambientLight);
        const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x4A6741, 0.6);
        scene.add(hemiLight);
        const sunLight = new THREE.DirectionalLight(0xffdd99, 1.2);
        sunLight.position.set(20, 15, 5);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -12;
        sunLight.shadow.camera.right = 12;
        sunLight.shadow.camera.top = 12;
        sunLight.shadow.camera.bottom = -12;
        scene.add(sunLight);
        const fillLight = new THREE.PointLight(0xccaa88, 0.5);
        fillLight.position.set(0, -2, 0);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0xffaa66, 0.4);
        rimLight.position.set(5, 4, -8);
        scene.add(rimLight);

        // --- Sky (dynamic, with realistic scattering) ---
        const sky = new Sky();
        sky.scale.setScalar(450);
        scene.add(sky);
        const skyUniforms = sky.material.uniforms;
        skyUniforms['turbidity'].value = 10;
        skyUniforms['rayleigh'].value = 2;
        skyUniforms['mieCoefficient'].value = 0.005;
        skyUniforms['mieDirectionalG'].value = 0.8;
        skyUniforms['luminance'].value = 1;
        skyUniforms['up'].value = new THREE.Vector3(0, 1, 0);
        function updateSky() {
            const time = Date.now() * 0.0005;
            const azimuth = 0.25;
            const elevation = 0.2 + Math.sin(time * 0.1) * 0.1;
            skyUniforms['sunPosition'].value = new THREE.Vector3(
                Math.cos(azimuth) * Math.cos(elevation),
                Math.sin(elevation),
                Math.sin(azimuth) * Math.cos(elevation)
            );
            sunLight.position.copy(skyUniforms['sunPosition'].value.clone().multiplyScalar(100));
        }
        updateSky();
        setInterval(updateSky, 1000);

        // --- Water (planar reflections, caustics, foam) ---
        const waterGeometry = new THREE.PlaneGeometry(200, 200);
        const water = new Water(waterGeometry, {
            textureWidth: 1024,
            textureHeight: 1024,
            waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', (t) => t.wrapS = THREE.RepeatWrapping),
            sunDirection: new THREE.Vector3(1, 1, 0),
            sunColor: 0xffdd99,
            waterColor: 0x3399ff,
            reflectivity: 0.4,
            side: THREE.DoubleSide
        });
        water.rotation.x = -Math.PI / 2;
        water.position.y = 0;
        water.receiveShadow = true;
        scene.add(water);

        // --- Terrain (displacement mapped, high‑resolution) ---
        const width = 200;
        const depth = 200;
        const segments = 256;
        const geometry = new THREE.PlaneGeometry(width, depth, segments, segments);
        geometry.rotateX(-Math.PI / 2);
        const positions = geometry.attributes.position.array;
        const heights = new Array(positions.length / 3);
        for (let i = 0; i < positions.length / 3; i++) {
            const x = positions[i*3];
            const z = positions[i*3+2];
            let h = 0;
            h += Math.sin(x * 0.08) * Math.cos(z * 0.08) * 1.2;
            h += Math.sin(x * 0.25) * 0.6;
            h += Math.cos(z * 0.25) * 0.6;
            h += Math.sin(x * 0.6 + z * 0.4) * 0.4;
            h += Math.sin((x * 1.5) * Math.sin(z * 0.8)) * 0.3;
            h = Math.max(0.2, h + 2.2);
            heights[i] = h;
            positions[i*3+1] = h;
        }
        geometry.computeVertexNormals();

        const terrainLoader = new THREE.TextureLoader();
        const grassTex = terrainLoader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');
        grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
        grassTex.repeat.set(8, 8);

        const terrainMaterial = new THREE.MeshStandardMaterial({
            map: grassTex,
            roughness: 0.7,
            metalness: 0.1,
            side: THREE.DoubleSide,
            vertexColors: false
        });
        const terrainMesh = new THREE.Mesh(geometry, terrainMaterial);
        terrainMesh.castShadow = true;
        terrainMesh.receiveShadow = true;
        scene.add(terrainMesh);

        // --- Dense vegetation (instanced) ---
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x6a994e, roughness: 0.8 });
        const flowerMat = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
        const grassCount = 8000;
        const rockCount = 2000;
        const flowerCount = 3000;
        
        function getHeightAt(x, z) {
            let h = 0;
            h += Math.sin(x * 0.08) * Math.cos(z * 0.08) * 1.2;
            h += Math.sin(x * 0.25) * 0.6;
            h += Math.cos(z * 0.25) * 0.6;
            h += Math.sin(x * 0.6 + z * 0.4) * 0.4;
            h += Math.sin((x * 1.5) * Math.sin(z * 0.8)) * 0.3;
            return Math.max(0.2, h + 2.2);
        }

        function addInstancedMesh(material, count, scale, yOffset, predicate) {
            const group = [];
            for (let i = 0; i < count; i++) {
                const x = (Math.random() - 0.5) * 180;
                const z = (Math.random() - 0.5) * 180;
                const y = getHeightAt(x, z);
                if (predicate(x, z, y)) {
                    const obj = new THREE.Mesh(new THREE.CylinderGeometry(scale.x, scale.y, scale.z, 3), material);
                    obj.position.set(x, y + yOffset, z);
                    obj.scale.set(1, Math.random() * 0.8 + 0.6, 1);
                    obj.castShadow = true;
                    scene.add(obj);
                    group.push(obj);
                }
            }
            return group;
        }

        addInstancedMesh(grassMat, grassCount, { x:0.05, y:0.2, z:0.05 }, 0, (x,z,y) => y > 0.5 && y < 3.5 && Math.abs(x) < 90 && Math.abs(z) < 90);
        addInstancedMesh(flowerMat, flowerCount, { x:0.08, y:0.15, z:0.08 }, 0, (x,z,y) => y > 0.8 && y < 3.0 && Math.random() < 0.5);
        addInstancedMesh(rockMat, rockCount, { x:0.15, y:0.1, z:0.15 }, 0, (x,z,y) => y > 0.8 && y < 3.2 && Math.random() < 0.3);

        // --- Trees (low‑poly, high detail) ---
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.7 });
        const foliageMat = new THREE.MeshStandardMaterial({ color: 0x5a8f4c, roughness: 0.5 });
        for (let i = 0; i < 400; i++) {
            const x = (Math.random() - 0.5) * 160;
            const z = (Math.random() - 0.5) * 160;
            const y = getHeightAt(x, z);
            if (y > 0.8 && y < 3.0 && Math.abs(x) < 80 && Math.abs(z) < 80 && Math.random() < 0.3) {
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.45, 0.9, 6), trunkMat);
                trunk.position.set(x, y, z);
                trunk.castShadow = true;
                scene.add(trunk);
                const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.2, 8), foliageMat);
                foliage.position.set(x, y + 0.7, z);
                foliage.castShadow = true;
                scene.add(foliage);
            }
        }

        // --- PLT Resources (gemstones with glow) ---
        const goldMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, metalness: 0.9, emissive: 0x442200, emissiveIntensity: 0.3 });
        const loveMat = new THREE.MeshStandardMaterial({ color: 0xff88aa, emissive: 0x441122, emissiveIntensity: 0.3 });
        const taxMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x224466, emissiveIntensity: 0.3 });
        for (let i = 0; i < 300; i++) {
            const x = (Math.random() - 0.5) * 160;
            const z = (Math.random() - 0.5) * 160;
            const y = getHeightAt(x, z) + 0.1;
            const type = Math.random();
            let mesh, mat;
            if (type < 0.33) { mat = goldMat; mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.22, 0), mat); }
            else if (type < 0.66) { mat = loveMat; mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(0.2), mat); }
            else { mat = taxMat; mesh = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.35, 5), mat); }
            mesh.position.set(x, y, z);
            mesh.userData = { type: type < 0.33 ? 'profit' : (type < 0.66 ? 'love' : 'tax'), value: 5 };
            mesh.castShadow = true;
            scene.add(mesh);
        }

        // --- Souls (animated, high-quality models) ---
        const soulColors = { profit: 0xffaa44, love: 0xff88aa, tax: 0x88aaff };
        const soulMeshes = [];
        for (let i = 0; i < 8; i++) {
            const type = ['profit', 'love', 'tax'][i%3];
            const geometry = new THREE.SphereGeometry(0.45, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: soulColors[type], emissive: soulColors[type], emissiveIntensity: 0.5, metalness: 0.3, roughness: 0.2 });
            const soul = new THREE.Mesh(geometry, material);
            const wingGeo = new THREE.BoxGeometry(0.8, 0.1, 0.3);
            const wingMat = new THREE.MeshStandardMaterial({ color: soulColors[type], emissive: soulColors[type], emissiveIntensity: 0.3 });
            const leftWing = new THREE.Mesh(wingGeo, wingMat);
            leftWing.position.set(-0.65, 0.1, 0);
            const rightWing = new THREE.Mesh(wingGeo, wingMat);
            rightWing.position.set(0.65, 0.1, 0);
            soul.add(leftWing);
            soul.add(rightWing);
            const angle = (i / 8) * Math.PI * 2;
            const rad = 5;
            soul.position.set(Math.cos(angle)*rad, getHeightAt(Math.cos(angle)*rad, Math.sin(angle)*rad) + 0.8, Math.sin(angle)*rad);
            soul.userData = { type, speed: 0.6 + Math.random()*0.4, angle: angle, rad: rad, radius: rad };
            soul.castShadow = true;
            scene.add(soul);
            soulMeshes.push(soul);
        }

        // --- Player & terrain editing ---
        let selectedTool = 'profit';
        let rayCaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let lastEditTime = 0;

        function updateTerrainAt(x, z, deltaY) {
            const geom = terrainMesh.geometry;
            const positions = geom.attributes.position.array;
            let closestIdx = -1;
            let minDist = 0.4;
            for (let i = 0; i < positions.length / 3; i++) {
                const px = positions[i*3];
                const pz = positions[i*3+2];
                const dist = Math.hypot(px - x, pz - z);
                if (dist < minDist) {
                    minDist = dist;
                    closestIdx = i;
                }
            }
            if (closestIdx !== -1) {
                let newY = positions[closestIdx*3+1] + deltaY;
                newY = Math.max(0.2, Math.min(4.5, newY));
                positions[closestIdx*3+1] = newY;
                const radius = 1.2;
                for (let i = 0; i < positions.length / 3; i++) {
                    const px = positions[i*3];
                    const pz = positions[i*3+2];
                    if (Math.hypot(px - x, pz - z) < radius) {
                        let sum = 0;
                        let count = 0;
                        for (let j = 0; j < positions.length / 3; j++) {
                            const qx = positions[j*3];
                            const qz = positions[j*3+2];
                            if (Math.hypot(qx - px, qz - pz) < 1.0 && j !== i) {
                                sum += positions[j*3+1];
                                count++;
                            }
                        }
                        if (count > 0) {
                            positions[i*3+1] = (positions[i*3+1] + sum/count) / 2;
                        }
                    }
                }
                geom.computeVertexNormals();
                updateObjectsNear(x, z);
            }
        }

        function updateObjectsNear(x, z) {
            // Simplified for demo
        }

        // --- PLT resource management ---
        let pltResources = { profit: 100, love: 100, tax: 100 };
        function updateResourcesUI() {
            document.getElementById('profitVal').innerText = Math.floor(pltResources.profit);
            document.getElementById('loveVal').innerText = Math.floor(pltResources.love);
            document.getElementById('taxVal').innerText = Math.floor(pltResources.tax);
        }

        function onMouseClick(event, isRaise) {
            if (Date.now() - lastEditTime < 100) return;
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            rayCaster.setFromCamera(mouse, camera);
            const intersects = rayCaster.intersectObject(terrainMesh);
            if (intersects.length > 0) {
                const point = intersects[0].point;
                const delta = isRaise ? 0.2 : -0.2;
                let cost = 5;
                if (selectedTool === 'profit') {
                    if (pltResources.profit >= cost) {
                        pltResources.profit -= cost;
                        updateTerrainAt(point.x, point.z, delta);
                    }
                } else if (selectedTool === 'love') {
                    if (pltResources.love >= cost) {
                        pltResources.love -= cost;
                        updateTerrainAt(point.x, point.z, delta);
                    }
                } else if (selectedTool === 'tax') {
                    if (pltResources.tax >= cost) {
                        pltResources.tax -= cost;
                        updateTerrainAt(point.x, point.z, delta);
                    }
                }
                updateResourcesUI();
                lastEditTime = Date.now();
            }
        }

        // --- Keyboard controls ---
        let keys = { w:0, s:0, a:0, d:0, shift:0 };
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = 1; break;
                case 'KeyS': keys.s = 1; break;
                case 'KeyA': keys.a = 1; break;
                case 'KeyD': keys.d = 1; break;
                case 'ShiftLeft': keys.shift = 1; break;
                case 'Digit1': selectedTool = 'profit'; break;
                case 'Digit2': selectedTool = 'love'; break;
                case 'Digit3': selectedTool = 'tax'; break;
                default: break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = 0; break;
                case 'KeyS': keys.s = 0; break;
                case 'KeyA': keys.a = 0; break;
                case 'KeyD': keys.d = 0; break;
                case 'ShiftLeft': keys.shift = 0; break;
            }
        });

        function updateMovement(delta) {
            const speed = keys.shift ? 10 : 5;
            const dir = new THREE.Vector3();
            if (keys.w) dir.z -= 1;
            if (keys.s) dir.z += 1;
            if (keys.a) dir.x -= 1;
            if (keys.d) dir.x += 1;
            dir.normalize();
            const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
            forward.y = 0;
            right.y = 0;
            forward.normalize();
            right.normalize();
            const move = forward.multiplyScalar(dir.z * speed * delta).add(right.multiplyScalar(dir.x * speed * delta));
            camera.position.x += move.x;
            camera.position.z += move.z;
            const terrainY = getHeightAt(camera.position.x, camera.position.z) + 1.7;
            camera.position.y += (terrainY - camera.position.y) * 0.1;
        }

        // --- Animate souls with wing flapping ---
        let time = 0;
        function animateSouls(delta) {
            time += delta;
            for (let i = 0; i < soulMeshes.length; i++) {
                const soul = soulMeshes[i];
                const radius = soul.userData.radius || 5;
                const angle = soul.userData.angle + delta * soul.userData.speed;
                soul.userData.angle = angle;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                soul.position.x = x;
                soul.position.z = z;
                soul.position.y = getHeightAt(x, z) + 0.8 + Math.sin(time * 4 + i) * 0.1;
                const wings = soul.children;
                if (wings.length >= 2) {
                    wings[0].rotation.z = Math.sin(time * 8) * 0.8;
                    wings[1].rotation.z = -Math.sin(time * 8) * 0.8;
                }
                const intensity = 0.4 + Math.sin(time * 5) * 0.2;
                soul.material.emissiveIntensity = intensity;
            }
        }

        // --- Post-processing stack (cinematic) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.85);
        const afterimagePass = new AfterimagePass(0.96);
        afterimagePass.renderToScreen = true;
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        composer.addPass(afterimagePass);

        // --- Mouse interaction ---
        renderer.domElement.addEventListener('mousedown', (e) => {
            if (e.button === 0) onMouseClick(e, true);
            else if (e.button === 2) onMouseClick(e, false);
        });
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

        // --- Regenerate resources ---
        setInterval(() => {
            pltResources.profit = Math.min(100, pltResources.profit + 0.5);
            pltResources.love = Math.min(100, pltResources.love + 0.5);
            pltResources.tax = Math.min(100, pltResources.tax + 0.5);
            updateResourcesUI();
        }, 2000);

        // --- Animation loop ---
        let lastFrame = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastFrame) / 1000);
            lastFrame = now;
            updateMovement(delta);
            controls.target.set(camera.position.x, 0, camera.position.z);
            controls.update();
            animateSouls(delta);
            if (water.material.uniforms) water.material.uniforms['time'].value += delta;
            composer.render();
            requestAnimationFrame(animate);
        }

        updateResourcesUI();
        animate();
    </script>
</body>
</html>
