<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌌 SOULVERSE | Forge • Habitat • World</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:#ffaa66;font-family:'Courier New',monospace;overflow:hidden}
        canvas{display:block}
        
        /* UI Panels */
        .panel{position:fixed;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);border:2px solid #ffaa66;border-radius:16px;padding:15px;z-index:100}
        #topbar{top:10px;left:10px;right:10px;display:flex;justify-content:space-between;align-items:center}
        #resources{top:60px;right:10px;text-align:right}
        #controls{bottom:20px;left:20px}
        #tabs{bottom:20px;right:20px;display:flex;gap:10px}
        
        .tab-btn{background:#ffaa66;color:#000;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:bold}
        .tab-btn.active{background:#fff}
        .tab-btn:hover{background:#ffcc88}
        
        /* Forge Panel */
        #forge-panel{top:50%;left:50%;transform:translate(-50%,-50%);width:400px;display:none}
        #forge-panel h2{margin-bottom:15px;text-align:center}
        .form-group{margin-bottom:12px}
        label{display:block;font-size:11px;margin-bottom:4px;color:#ffaa66}
        input,select{width:100%;padding:8px;background:#222;border:1px solid #ffaa66;color:#ffaa66;border-radius:6px}
        input[type="range"]{padding:0}
        .forge-btn{width:100%;background:#ffaa66;color:#000;border:none;padding:12px;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:10px}
        
        /* Habitat Panel */
        #habitat-panel{top:100px;left:10px;right:10px;bottom:100px;display:none;overflow-y:auto}
        .room-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px}
        .room-card{background:#111;border:1px solid #88ffaa;border-radius:12px;padding:12px}
        .room-card h3{color:#88ffaa;margin-bottom:8px}
        .soul-item{background:#222;padding:8px;margin:6px 0;border-radius:6px;border-left:3px solid #88ffaa}
        
        /* World HUD */
        #world-hud{bottom:80px;left:20px;font-size:11px}
        #minimap{bottom:20px;left:50%;transform:translateX(-50%);width:150px;height:150px;background:#111;border:2px solid #ffaa66;border-radius:50%;overflow:hidden}
        
        /* Log */
        #log{position:fixed;bottom:20px;right:20px;width:300px;height:150px;background:rgba(0,0,0,0.8);border:2px solid #ffaa66;border-radius:12px;padding:10px;overflow-y:auto;font-size:10px;z-index:100}
        
        /* Buttons */
        .btn{background:#ffaa66;color:#000;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:bold;margin:2px}
        .btn:hover{background:#fff}
    </style>
</head>
<body>
    <!-- TOP BAR -->
    <div id="topbar" class="panel">
        <h2>🌌 SOULVERSE</h2>
        <div>
            <button class="tab-btn active" onclick="showTab('world')">🌍 World</button>
            <button class="tab-btn" onclick="showTab('forge')">⚔️ Forge</button>
            <button class="tab-btn" onclick="showTab('habitat')">🏠 Habitat</button>
        </div>
    </div>
    
    <!-- RESOURCES -->
    <div id="resources" class="panel">
        <div>💰 Profit: <strong id="profitVal">100</strong></div>
        <div>❤️ Love: <strong id="loveVal">100</strong></div>
        <div>⚖️ Tax: <strong id="taxVal">100</strong></div>
    </div>
    
    <!-- FORGE PANEL -->
    <div id="forge-panel" class="panel">
        <h2>⚔️ SOUL FORGE</h2>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="soulName" placeholder="Enter soul name...">
        </div>
        <div class="form-group">
            <label>Type</label>
            <select id="soulType">
                <option value="profit">💰 Profit</option>
                <option value="love">❤️ Love</option>
                <option value="tax">⚖️ Tax</option>
            </select>
        </div>
        <div class="form-group">
            <label>PLT Balance</label>
            <div style="font-size:10px;margin-bottom:4px">Profit: <span id="profitSliderVal">33</span>%</div>
            <input type="range" id="profitSlider" min="0" max="100" value="33">
            <div style="font-size:10px;margin:4px 0">Love: <span id="loveSliderVal">33</span>%</div>
            <input type="range" id="loveSlider" min="0" max="100" value="33">
            <div style="font-size:10px;margin:4px 0">Tax: <span id="taxSliderVal">33</span>%</div>
            <input type="range" id="taxSlider" min="0" max="100" value="34">
        </div>
        <button class="forge-btn" onclick="forgeSoul()">🔥 FORGE SOUL</button>
    </div>
    
    <!-- HABITAT PANEL -->
    <div id="habitat-panel" class="panel">
        <h2>🏠 SOUL HABITAT</h2>
        <div class="room-grid" id="roomGrid"></div>
    </div>
    
    <!-- WORLD HUD -->
    <div id="world-hud" class="panel">🌍 Souls: <span id="soulCount">0</span></div>
    <div id="minimap"><canvas id="minimapCanvas" width="150" height="150"></canvas></div>
    
    <!-- LOG -->
    <div id="log"><div>🌀 Soulverse initialized...</div></div>
    
    <!-- 3D CANVAS -->
    <canvas id="worldCanvas"></canvas>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/controls/OrbitControls.js"></script>
    <script>
        // === GAME STATE ===
        let resources = {profit:100, love:100, tax:100};
        let souls = [];
        let currentTab = 'world';
        
        // Load from localStorage
        if(localStorage.getItem('sv_resources')) resources = JSON.parse(localStorage.getItem('sv_resources'));
        if(localStorage.getItem('sv_souls')) souls = JSON.parse(localStorage.getItem('sv_souls'));
        
        // === THREE.JS WORLD ===
        let scene, camera, renderer, controls, soulMeshes = [];
        
        function initWorld(){
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.Fog(0x0a0a1a, 20, 60);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.set(0, 15, 25);
            
            renderer = new THREE.WebGLRenderer({canvas:document.getElementById('worldCanvas'), antialias:true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true;
            controls.enablePan = true;
            
            // Ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshStandardMaterial({color:0x1a1a2e, roughness:0.8})
            );
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);
            
            // Grid
            const grid = new THREE.GridHelper(100, 20, 0x333366, 0x222244);
            scene.add(grid);
            
            // Lights
            scene.add(new THREE.AmbientLight(0x404060, 1));
            const sun = new THREE.DirectionalLight(0xffddaa, 1);
            sun.position.set(20, 30, 20);
            scene.add(sun);
            
            // Create soul meshes from saved souls
            souls.forEach((soul, i) => createSoulMesh(soul, i));
            
            // Event listeners
            window.addEventListener('resize', ()=>{
                camera.aspect = window.innerWidth/window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            updateUI();
            updateHabitat();
            log('🌍 World initialized with '+souls.length+' souls');
            animate();
        }
        
        function createSoulMesh(soul, index){
            const colors = {profit:0xffaa44, love:0xff88aa, tax:0x88aaff};
            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(1, 16, 16),
                new THREE.MeshStandardMaterial({color:colors[soul.type], emissive:colors[soul.type], emissiveIntensity:0.3})
            );
            mesh.position.set(
                (Math.random()-0.5)*30,
                1,
                (Math.random()-0.5)*30
            );
            scene.add(mesh);
            soulMeshes[index] = mesh;
            log('✨ '+soul.name+' spawned in world');
        }
        
        function animate(){
            requestAnimationFrame(animate);
            
            // Animate souls
            soulMeshes.forEach((mesh, i)=>{
                if(mesh && souls[i]){
                    mesh.position.x += (Math.random()-0.5)*0.1;
                    mesh.position.z += (Math.random()-0.5)*0.1;
                    mesh.position.y = 1 + Math.sin(Date.now()*0.001+i)*0.2;
                }
            });
            
            updateMinimap();
            renderer.render(scene, camera);
        }
        
        function updateMinimap(){
            const ctx = document.getElementById('minimapCanvas').getContext('2d');
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, 150, 150);
            
            const scale = 2;
            const cx = 75, cy = 75;
            
            // Souls
            soulMeshes.forEach((mesh, i)=>{
                if(mesh && souls[i]){
                    const colors = {profit:'#ffaa44', love:'#ff88aa', tax:'#88aaff'};
                    ctx.fillStyle = colors[souls[i].type];
                    ctx.beginPath();
                    ctx.arc(cx - mesh.position.x*scale, cy - mesh.position.z*scale, 4, 0, Math.PI*2);
                    ctx.fill();
                }
            });
        }
        
        // === TABS ===
        function showTab(tab){
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('forge-panel').style.display = tab==='forge'?'block':'none';
            document.getElementById('habitat-panel').style.display = tab==='habitat'?'block':'none';
            
            if(tab==='habitat') updateHabitat();
            log('📍 Switched to '+tab);
        }
        
        // === FORGE ===
        function forgeSoul(){
            const name = document.getElementById('soulName').value || 'Unknown Soul';
            const type = document.getElementById('soulType').value;
            const profit = parseInt(document.getElementById('profitSlider').value);
            const love = parseInt(document.getElementById('loveSlider').value);
            const tax = parseInt(document.getElementById('taxSlider').value);
            
            const soul = {
                id: 'soul_'+Date.now(),
                name, type,
                plt: {profit:profit/100, love:love/100, tax:tax/100},
                energy: 100,
                mood: 'neutral'
            };
            
            souls.push(soul);
            createSoulMesh(soul, souls.length-1);
            saveGame();
            updateUI();
            updateHabitat();
            
            log('🔥 FORGED: '+name+' ('+type+')');
            alert('✨ '+name+' forged and spawned in world!');
            
            document.getElementById('soulName').value = '';
        }
        
        // === HABITAT ===
        function updateHabitat(){
            const grid = document.getElementById('roomGrid');
            if(!grid) return;
            
            const rooms = [
                {name:'Main Hall', souls:souls.filter(s=>s.type==='profit')},
                {name:'Garden', souls:souls.filter(s=>s.type==='love')},
                {name:'Archive', souls:souls.filter(s=>s.type==='tax')}
            ];
            
            grid.innerHTML = rooms.map(room=>`
                <div class="room-card">
                    <h3>${room.name}</h3>
                    ${room.souls.length===0?'<div style="color:#666;font-size:11px">Empty</div>':
                      room.souls.map(s=>`<div class="soul-item"><strong>${s.name}</strong><br><span style="font-size:10px;color:#888">Energy: ${s.energy}%</span></div>`).join('')}
                </div>
            `).join('');
        }
        
        // === UI ===
        function updateUI(){
            document.getElementById('profitVal').innerText = Math.floor(resources.profit);
            document.getElementById('loveVal').innerText = Math.floor(resources.love);
            document.getElementById('taxVal').innerText = Math.floor(resources.tax);
            document.getElementById('soulCount').innerText = souls.length;
        }
        
        function log(msg){
            const log = document.getElementById('log');
            log.innerHTML = '<div style="padding:2px 0">['+new Date().toLocaleTimeString().split(':')[1]+'] '+msg+'</div>' + log.innerHTML;
        }
        
        function saveGame(){
            localStorage.setItem('sv_resources', JSON.stringify(resources));
            localStorage.setItem('sv_souls', JSON.stringify(souls));
        }
        
        // Auto-save
        setInterval(saveGame, 30000);
        
        // Slider updates
        document.getElementById('profitSlider').oninput = ()=>document.getElementById('profitSliderVal').innerText = this.value;
        document.getElementById('loveSlider').oninput = ()=>document.getElementById('loveSliderVal').innerText = this.value;
        document.getElementById('taxSlider').oninput = ()=>document.getElementById('taxSliderVal').innerText = this.value;
        
        // Start
        initWorld();
    </script>
</body>
</html>
