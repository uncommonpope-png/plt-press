    <script type="module">
        import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';import{RenderPass}from'three/addons/postprocessing/RenderPass.js';import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';
        const QUALITY={0:{name:'Performance',terrainSegments:32,shadows:false,fog:false,post:false,grassCount:300,treeCount:15,resourceCount:20},1:{name:'Balanced',terrainSegments:64,shadows:true,fog:true,post:false,grassCount:800,treeCount:30,resourceCount:50},2:{name:'Beautiful',terrainSegments:128,shadows:true,fog:true,post:true,grassCount:2000,treeCount:60,resourceCount:100}};
        let currentQuality=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)?0:1;
        let scene,camera,renderer,composer,controls,terrain;
        let souls=[],resources=[],buildings=[];

        function getHeight(x,z){let h=0;h+=Math.sin(x*0.12)*Math.cos(z*0.12)*1;h+=Math.sin(x*0.3)*0.5;h+=Math.cos(z*0.3)*0.5;h+=Math.sin(x*0.7+z*0.5)*0.3;h+=Math.max(0,Math.sin(x*0.5)*Math.cos(z*0.5)-0.3)*1.2;return Math.max(0.2,h+1.6);}
        function generateTerrain(){const p=QUALITY[currentQuality];const g=new THREE.PlaneGeometry(160,160,p.terrainSegments,p.terrainSegments);g.rotateX(-Math.PI/2);const pos=g.attributes.position.array;for(let i=0;i<pos.length/3;i++){const x=pos[i*3],z=pos[i*3+2];pos[i*3+1]=getHeight(x,z);}g.computeVertexNormals();return new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:0x7c9c5e,roughness:0.7,metalness:0.1}));}
        class RTSUnit{constructor(id,name,type,x,z){this.id=id;this.name=name;this.type=type;this.x=x;this.z=z;this.health=100;this.maxHealth=100;this.damage=10+(type==='profit'?techs.profitUpgrade*5:type==='love'?techs.loveUpgrade*5:techs.taxUpgrade*5);this.armor=0;this.speed=3;this.state='idle';this.targetPos=null;this.targetUnit=null;this.targetBuilding=null;this.path=[];this.attackCooldown=0;this.gatherAmount=0;this.mesh=null;this.healthBar=null;this.homeData={level:1,storedItems:{profitShards:0,lovePetals:0,taxCrystals:0,seeds:0},garden:{planted:false,growth:0,lastWater:Date.now()},customization:{roofColor:'#aa6644',wallColor:'#aa8866'},craftingStation:false};this.villageId=null;this.updatePosition();}updatePosition(){if(this.mesh){const y=getHeight(this.x,this.z)+0.5;this.mesh.position.set(this.x,y,this.z);if(this.healthBar)this.healthBar.position.copy(this.mesh.position);}}update(delta){if(this.attackCooldown>0)this.attackCooldown-=delta;if(this.state==='move'&&this.targetPos){if(this.path.length===0)this.path=aStar({x:this.x,z:this.z},this.targetPos);if(this.path.length>0){let next=this.path[0];let dx=next.x-this.x,dz=next.z-this.z;let dist=Math.hypot(dx,dz);if(dist<0.2){this.path.shift();}else{let move=Math.min(this.speed*delta,dist);let angle=Math.atan2(dz,dx);this.x+=Math.cos(angle)*move;this.z+=Math.sin(angle)*move;}this.updatePosition();}if(this.path.length===0){this.state='idle';this.targetPos=null;}}else if(this.state==='attack'&&this.targetUnit&&this.targetUnit.health>0){let dx=this.targetUnit.x-this.x,dz=this.targetUnit.z-this.z;let dist=Math.hypot(dx,dz);if(dist>1.5){this.targetPos={x:this.targetUnit.x,z:this.targetUnit.z};this.state='move';this.path=[];}else{if(this.attackCooldown<=0){this.targetUnit.health-=this.damage;this.attackCooldown=1;if(this.targetUnit.health<=0){scene.remove(this.targetUnit.mesh);if(this.targetUnit.healthBar)scene.remove(this.targetUnit.healthBar);let idx=souls.findIndex(s=>s.id===this.targetUnit.id);if(idx!==-1)souls.spl         class Building{constructor(type,x,z){this.type=type;this.x=x;this.z=z;this.size=1.5;this.health=500;this.maxHealth=500;this.mesh=null;this.underConstruction=true;this.constructionProgress=0;this.requiredWork=100;this.completed=false;}update(delta){if(!this.completed&&this.underConstruction){this.constructionProgress+=delta*20;if(this.constructionProgress>=this.requiredWork){this.completed=true;this.underConstruction=false;if(this.type==='forge')techs.forge=true;if(this.type==='market')techs.market=true;if(this.type==='barracks')techs.barracks=true;if(this.mesh)this.mesh.material.color.setHex(0x88aa66);}}}}
        const GRID_SIZE=0.5;function getNeighbors(x,z){let n=[];for(let dx=-1;dx<=1;dx++){for(let dz=-1;dz<=1;dz++){if(dx===0&&dz===0)continue;let nx=x+dx*GRID_SIZE,nz=z+dz*GRID_SIZE;let walkable=true;for(let b of buildings){if(Math.abs(b.x-nx)<b.size/2&&Math.abs(b.z-nz)<b.size/2)walkable=false;}if(walkable&&Math.abs(nx)<80&&Math.abs(nz)<80)n.push({x:nx,z:nz,cost:1});}}return n;}
        function aStar(start,goal){let open=[{x:start.x,z:start.z,g:0,h:Math.hypot(start.x-goal.x,start.z-goal.z),f:Math.hypot(start.x-goal.x,start.z-goal.z),parent:null}];let closed=new Set();while(open.length){open.sort((a,b)=>a.f-b.f);let cur=open.shift();let key=`${Math.floor(cur.x/GRID_SIZE)},${Math.floor(cur.z/GRID_SIZE)}`;if(closed.has(key))continue;if(Math.hypot(cur.x-goal.x,cur.z-goal.z)<0.8){let path=[];let c=cur;while(c){path.unshift({x:c.x,z:c.z});c=c.parent;}return path;}closed.add(key);let nb=getNeighbors(cur.x,cur.z);for(let n of nb){let nk=`${Math.floor(n.x/GRID_SIZE)},${Math.floor(n.z/GRID_SIZE)}`;if(closed.has(nk))continue;let g=cur.g+n.cost;let h=Math.hypot(n.x-goal.x,n.z-goal.z);let f=g+h;let ex=open.find(x=>x.x===n.x&&x.z===n.z);if(!ex||g<ex.g)open.push({x:n.x,z:n.z,g,h,f,parent:cur});}}return [];}
        function createUnit(type,x,z){const colors={profit:0xffaa44,love:0xff88aa,tax:0x88aaff};const mat=new THREE.MeshStandardMaterial({color:colors[type],emissive:colors[type],emissiveIntensity:0.3});const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.4,16,16),mat);mesh.position.set(x,getHeight(x,z)+0.5,z);mesh.castShadow=true;scene.add(mesh);const barGeo=new THREE.BoxGeometry(0.8,0.1,0.1);const barMat=new THREE.MeshStandardMaterial({color:0xff3333});const healthBar=new THREE.Mesh(barGeo,barMat);mesh.add(healthBar);healthBar.position.y=0.8;const unit=new RTSUnit(Date.now()+Math.random(),'Soul',type,x,z);unit.mesh=mesh;unit.healthBar=healthBar;souls.push(unit);return unit;}
        function createBuilding(type,x,z){const b=new Building(type,x,z);const colors={townhall:0xaa8866,forge:0xcc8844,market:0x88aa66,barracks:0x8866aa};const mat=new THREE.MeshStandardMaterial({color:colors[type]||0xaaaaaa});const mesh=new THREE.Mesh(new THREE.BoxGeometry(1.5,1.2,1.5),mat);mesh.position.set(x,getHeight(x,z)+0.6,z);mesh.castShadow=true;scene.add(mesh);b.mesh=mesh;buildings.push(b);return b;}
        function addResources(){const goldMat=new THREE.MeshStandardMaterial({color:0xffaa44,emissive:0x442200});const loveMat=new THREE.MeshStandardMaterial({color:0xff88aa,emissive:0x441122});const taxMat=new THREE.MeshStandardMaterial({color:0x88aaff,emissive:0x224466});for(let i=0;i<QUALITY[currentQuality].resourceCount;i++){const x=(Math.random()-0.5)*130,z=(Math.random()-0.5)*130,y=getHeight(x,z)+0.1;const r=Math.random();let mesh,mat,type;if(r<0.33){mat=goldMat;mesh=new THREE.Mesh(new THREE.IcosahedronGeometry(0.18,0),mat);type='profit';}else if(r<0.66){mat=loveMat;mesh=new THREE.Mesh(new THREE.DodecahedronGeometry(0.16),mat);type='love';}else{mat=taxMat;mesh=new THREE.Mesh(new THREE.ConeGeometry(0.16,0.3,5),mat);type='tax';}mesh.position.set(x,y,z);mesh.userData={type,value:5};mesh.castShadow=true;scene.add(mesh);resources.push(mesh);}}
        function addVegetation(){const p=QUALITY[currentQuality];const grassMat=new THREE.MeshStandardMaterial({color:0x6a994e});for(let i=0;i<p.grassCount;i++){const x=(Math.random()-0.5)*140,z=(Math.random()-0.5)*140,y=getHeight(x,z);if(y>0.5&&y<3.5&&Math.abs(x)<70&&Math.abs(z)<70){const blade=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.1,0.2,3),grassMat);blade.position.set(x,y,z);blade.castShadow=true;scene.add(blade);}}}
        function addTrees(){const p=QUALITY[currentQuality];const trunkMat=new THREE.MeshStandardMaterial({color:0x8B5A2B});const foliageMat=new THREE.MeshStandardMaterial({color:0x5a8f4c});for(let i=0;i<p.treeCount;i++){const x=(Math.random()-0.5)*130,z=(Math.random()-0.5)*130,y=getHeight(x,z);if(y>0.8&&y<3&&Math.abs(x)<65&&Math.abs(z)<65){const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,0.8,4),trunkMat);trunk.position.set(x,y,z);trunk.castShadow=true;scene.add(trunk);const foliage=new THREE.Mesh(new THREE.ConeGeometry(0.65,1,6),foliageMat);foliage.position.set(x,y+0.7,z);foliage.castShadow=true;scene.add(foliage);}}}
        function createVillage(soulsList,centerX,centerZ){const villageId=Date.now().toString();const village={id:villageId,name:`${soulsList[0]?.name||'New'}Village`,centerX:centerY:centerZ,members:soulsList.map(s=>s.id),heartLevel:1,sharedStorage:{profitShards:0,lovePetals:0,taxCrystals:0,seeds:0},projects:[],tradeOffers:[]};for(let s of soulsList)s.villageId=villageId;villages.push(village);const hg=new THREE.Group();const base=new THREE.Mesh(new THREE.CylinderGeometry(0.8,0.8,0.3,8),new THREE.MeshStandardMaterial({color:0xffaa66}));base.position.y=0.15;hg.add(base);const pil=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,1,8),new THREE.MeshStandardMaterial({color:0xcc8844}));pil.position.y=0.7;hg.add(pil);const cry=new THREE.Mesh(new THREE.IcosahedronGeometry(0.3,0),new THREE.MeshStandardMaterial({color:0xffaa44,emissive:0x442200}));cry.position.y=1.2;hg.add(cry);hg.position.set(centerX,getHeight(centerX,centerZ),centerZ);scene.add(hg);village.heartMesh=hg;return village;}

        function updateTechTreeUI(){const c=document.getElementById('techTreeContent');c.innerHTML=`<div>Forge: ${techs.forge?'✅':'🔒'}</div><div>Market: ${techs.market?'✅':'🔒'}</div><div>Barracks: ${techs.barracks?'✅':'🔒'}</div><div>Profit Upgrade (100 each): <button id="profitUpgradeBtn" ${!techs.forge?'disabled':''}>+5 dmg (${techs.profitUpgrade*5})</button></div><div>Love Upgrade (100 each): <button id="loveUpgradeBtn" ${!techs.market?'disabled':''}>+5 dmg (${techs.loveUpgrade*5})</button></div><div>Tax Upgrade (100 each): <button id="taxUpgradeBtn" ${!techs.barracks?'disabled':''}>+5 dmg (${techs.taxUpgrade*5})</button></div>`;document.getElementById('profitUpgradeBtn')?.addEventListener('click',()=>{if(playerResources.profit>=100&&playerResources.love>=100&&playerResources.tax>=100&&techs.forge){playerResources.profit-=100;playerResources.love-=100;playerResources.tax-=100;techs.profitUpgrade++;for(let u of souls)if(u.type==='profit')u.damage+=5;updateUI();updateTechTreeUI();}});document.getElementById('loveUpgradeBtn')?.addEventListener('click',()=>{if(playerResources.profit>=100&&playerResources.love>=100&&playerResources.tax>=100&&techs.market){playerResources.profit-=100;playerResources.love-=100;playerResources.tax-=100;techs.loveUpgrade++;for(let u of souls)if(u.type==='love')u.damage+=5;updateUI();updateTechTreeUI();}});document.getElementById('taxUpgradeBtn')?.addEventListener('click',()=>{if(playerResources.profit>=100&&playerResources.love>=100&&playerResources.tax>=100&&techs.barracks){playerResources.profit-=100;playerResources.love-=100;playerResources.tax-=100;techs.taxUpgrade++;for(let u of souls)if(u.type==='tax')u.damage+=5;updateUI();updateTechTreeUI();}});}
        function showVillage(village){const modal=document.getElementById('villageModal');document.getElementById('villageTitle').innerText=village.name;const members=village.members.map(id=>souls.find(s=>s.id===id)).filter(s=>s);let content=`<div>❤️ Village Heart Lv.${village.heartLevel}</div><h4>Members (${members.length})</h4>`;members.forEach(s=>content+=`<div>${s.name}</div>`);content+=`<h4>Storage</h4><div>💰${village.sharedStorage.profitShards} ❤️${village.sharedStorage.lovePetals} ⚖️${village.sharedStorage.taxCrystals}</div><button id="depositBtn">Deposit</button>`;document.getElementById('villageContent').innerHTML=content;modal.style.display='block';document.getElementById('depositBtn').onclick=()=>alert('Deposit coming soon');document.getElementById('closeVillageModal').onclick=()=>modal.style.display='none';document.getElementById('closeVillage').onclick=()=>modal.style.display='none';}

        let raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2(),dragStart=null,selectionRectActive=false,selectionRectElem=null;
        function onMouseDown(event){if(buildingMode){const rect=renderer.domElement.getBoundingClientRect();mouse.x=((event.clientX-rect.left)/rect.width)*2-1;mouse.y=-((event.clientY-rect.top)/rect.height)*2+1;raycaster.setFromCamera(mouse,camera);const ints=raycaster.intersectObject(terrain);if(ints.length>0){let p=ints[0].point;let cost=buildingType==='townhall'?200:buildingType==='forge'?150:buildingType==='market'?120:180;if(playerResources.profit>=cost&&playerResources.love>=cost&&playerResources.tax>=cost){playerResources.profit-=cost;playerResources.love-=cost;playerResources.tax-=cost;createBuilding(buildingType,p.x,p.z);updateUI();}else alert('Not enough resources!');}buildingMode=false;if(ghostBuilding)scene.remove(ghostBuilding);ghostBuilding=null;return;}dragStart={x:event.clientX,y:event.clientY};selectionRectActive=true;if(!selectionRectElem){selectionRectElem=document.createElement('div');selectionRectElem.className='selection-rect';document.body.appendChild(selectionRectElem);}}
        function onMouseMove(event){if(!selectionRectActive)return;let left=Math.min(dragStart.x,event.clientX),top=Math.min(dragStart.y,event.clientY),width=Math.abs(event.clientX-dragStart.x),height=Math.abs(event.clientY-dragStart.y);selectionRectElem.style.left=left+'px';selectionRectElem.style.top=top+'px';selectionRectElem.style.width=width+'px';selectionRectElem.style.height=height+'px';selectionRectElem.style.display='block';}
        function onMouseUp(event){if(!selectionRectActive){const rect=renderer.domElement.getBoundingClientRect();mouse.x=((event.clientX-rect.left)/rect.width)*2-1;mouse.y=-((event.clientY-rect.top)/rect.height)*2+1;raycaster.setFromCamera(mouse,camera);const ints=raycaster.intersectObjects(souls.map(s=>s.mesh));if(ints.length>0){let unit=souls.find(s=>s.mesh===ints[0].object);if(unit){if(!shiftPressed)selectedUnits.clear();selectedUnits.add(unit);}else if(!shiftPressed)selectedUnits.clear();}else if(!shiftPressed)selectedUnits.clear();updateSelectionDisplay();selectionRectActive=false;if(selectionRectElem)selectionRectElem.style.display='none';return;}let minX=Math.min(dragStart.x,event.clientX),maxX=Math.max(dragStart.x,event.clientX),minY=Math.min(dragStart.y,event.clientY),maxY=Math.max(dragStart.y,event.clientY);const rect=renderer.domElement.getBoundingClientRect(),w=rect.width,h=rect.height;let newSel=new Set();for(let u of souls){let sp=u.mesh.position.clone().project(camera);let x=(sp.x*0.5+0.5)*w+rect.left,y=(-sp.y*0.5+0.5)*h+rect.top;if(x>=minX&&x<=maxX&&y>=minY&&y<=maxY)newSel.add(u);}if(!shiftPressed)selectedUnits.clear();for(let u of newSel)selectedUnits.add(u);updateSelectionDisplay();selectionRectActive=false;if(selectionRectElem)selectionRectElem.style.display='none';}
        function onRightClick(event){event.preventDefault();if(selectedUnits.size===0)return;const rect=renderer.domElement.getBoundingClientRect();mouse.x=((event.clientX-rect.left)/rect.width)*2-1;mouse.y=-((event.clientY-rect.top)/rect.height)*2+1;raycaster.setFromCamera(mouse,camera);let ints=raycaster.intersectObjects(souls.map(s=>s.mesh));if(ints.length>0){let tu=souls.find(s=>s.mesh===ints[0].object);if(tu&&!selectedUnits.has(tu)){for(let u of selectedUnits)u.giveOrder('attack',tu);return;}}ints=raycaster.intersectObjects(resources);if(ints.length>0){for(let u of selectedUnits)u.giveOrder('gather',ints[0].object);return;}ints=raycaster.intersectObject(terrain);if(ints.length>0){let p=ints[0].point;for(let u of selectedUnits)u.giveOrder('move',{x:p.x,z:p.z});}}
        function startBuilding(type){buildingMode=true;buildingType=type;if(ghostBuilding)scene.remove(ghostBuilding);const geo=new THREE.BoxGeometry(1.5,1.2,1.5),mat=new THREE.MeshStandardMaterial({color:0x88ff88,transparent:true,opacity:0.5});ghostBuilding=new THREE.Mesh(geo,mat);scene.add(ghostBuilding);const onMove=(e)=>{const rect=renderer.domElement.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/rect.width)*2-1;mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;raycaster.setFromCamera(mouse,camera);const ints=raycaster.intersectObject(terrain);if(ints.length){let p=ints[0].point;ghostBuilding.position.set(p.x,getHeight(p.x,p.z)+0.6,p.z);}};renderer.domElement.addEventListener('mousemove',onMove);const finish=()=>{renderer.domElement.removeEventListener('mousemove',onMove);document.removeEventListener('click',finish);};document.addEventListener('click',finish,{once:true});}
        let lastFrame=performance.now();function animate(){const now=performance.now();let delta=Math.min(0.033,(now-lastFrame)/1000);lastFrame=now;dayTime+=delta*0.01;if(dayTime>1)dayTime-=1;for(let u of souls)u.update(delta);for(let b of buildings)b.update(delta);renderer.render(scene,camera);requestAnimationFrame(animate);}
        function init(){scene=new THREE.Scene();scene.background=new THREE.Color(0x87CEEB);if(QUALITY[currentQuality].fog)scene.fog=new THREE.FogExp2(0x87CEEB,0.008);camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,200);camera.position.set(0,12,18);renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);renderer.shadowMap.enabled=QUALITY[currentQuality].shadows;document.body.appendChild(renderer.domElement);controls=new OrbitControls(camera,renderer.domElement);controls.enableZoom=true;controls.enablePan=true;controls.enableRotate=true;controls.target.set(0,0,0);const ambientLight=new THREE.AmbientLight(0x404060,0.6);scene.add(ambientLight);const sunLight=new THREE.DirectionalLight(0xffdd99,0.8);sunLight.position.set(10,15,5);if(QUALITY[currentQuality].shadows)sunLight.castShadow=true;scene.add(sunLight);const fillLight=new THREE.PointLight(0xccaa88,0.4);fillLight.position.set(0,3,0);scene.add(fillLight);terrain=generateTerrain();scene.add(terrain);addVegetation();addTrees();addResources();createUnit('profit',-2,-2);createUnit('love',2,-1);createUnit('tax',-1,2);createBuilding('townhall',0,0);let nearbySouls=souls.slice(0,3);createVillage(nearbySouls,0,0);renderer.domElement.addEventListener('mousedown',onMouseDown);renderer.domElement.addEventListener('mousemove',onMouseMove);renderer.domElement.addEventListener('mouseup',onMouseUp);renderer.domElement.addEventListener('contextmenu',onRightClick);window.addEventListener('keydown',(e)=>{if(e.shiftKey)shiftPressed=true;});window.addEventListener('keyup',(e)=>{if(e.key==='Shift')shiftPressed=false;});document.getElementById('techTreeBtn').onclick=()=>{const p=document.getElementById('tech-tree-panel');p.style.display=p.style.display==='none'?'block':'none';updateTechTreeUI();};document.getElementById('closeTechTree').onclick=()=>document.getElementById('tech-tree-panel').style.display='none';document.querySelectorAll('.build-btn').forEach(btn=>{btn.addEventListener('click',()=>startBuilding(btn.dataset.building));});document.getElementById('villageBtn').onclick=()=>{if(villages.length)showVillage(villages[0]);else alert('No villages yet.');};document.getElementById('pantheonBtn').onclick=showPantheon;document.getElementById('arenaBtn').onclick=()=>alert('Arena coming soon');document.getElementById('metaverseBtn').onclick=()=>alert('Metaverse coming soon');updateUI();animate();}
        init();
