<!DOCTYPE html>
<html>
<head>
<title>TEST - Click to Play</title>
<style>
body{margin:0;overflow:hidden;background:#000}
canvas{display:block;width:100vw;height:100vh}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#ffaa66;font-size:24px;font-family:monospace;pointer-events:none}
</style>
</head>
<body>
<div id="msg">Click to Start</div>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let scene,camera,renderer,cube;
let yaw=0,pitch=0,locked=false;

function init(){
    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x87ceeb);
    camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
    camera.position.set(0,2,5);
    renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
    renderer.setSize(window.innerWidth,window.innerHeight);
    
    // Add a cube
    const geo=new THREE.BoxGeometry(1,1,1);
    const mat=new THREE.MeshLambertMaterial({color:0xffaa66});
    cube=new THREE.Mesh(geo,mat);
    scene.add(cube);
    
    // Add light
    const light=new THREE.DirectionalLight(0xffffff,1);
    light.position.set(5,5,5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));
    
    // Add ground
    const ground=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshLambertMaterial({color:0x4a8f3a}));
    ground.rotation.x=-Math.PI/2;
    ground.position.y=-2;
    scene.add(ground);
    
    document.getElementById('c').addEventListener('click',()=>{
        document.getElementById('c').requestPointerLock();
    });
    
    document.addEventListener('pointerlockchange',()=>{
        locked=document.pointerLockElement===document.getElementById('c');
        document.getElementById('msg').style.display=locked?'none':'block';
    });
    
    document.addEventListener('mousemove',e=>{
        if(!locked)return;
        yaw-=e.movementX*0.002;
        pitch-=e.movementY*0.002;
        camera.rotation.order='YXZ';
        camera.rotation.y=yaw;
        camera.rotation.x=pitch;
    });
    
    animate();
}

function animate(){
    cube.rotation.x+=0.01;
    cube.rotation.y+=0.01;
    renderer.render(scene,camera);
    requestAnimationFrame(animate);
}

init();
</script>
</body>
</html>
