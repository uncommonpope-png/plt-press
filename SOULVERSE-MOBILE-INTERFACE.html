<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌌 SOULVERSE MOBILE INTERFACE | GTA • Pokémon • MK • FF • Sims | PLT Press</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
        body { background:#000; overflow:hidden; font-family:'Courier New', monospace; touch-action:pan-x pan-y; }
        canvas { display:block; width:100%; height:100%; }

        /* ============================================
           UNIFIED MOBILE UI OVERLAY
           ============================================ */
        #mobile-ui { position:absolute; inset:0; pointer-events:none; z-index:100; }
        #mobile-ui > * { pointer-events:auto; }

        /* TOP BAR - Health, XP, Resources (GTA/FF style) */
        .top-bar {
            position:absolute; top:10px; left:10px; right:10px;
            display:flex; flex-direction:column; gap:6px;
            z-index:110;
        }
        .bar-container {
            display:flex; align-items:center; gap:8px;
            background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
            border-radius:20px; padding:6px 12px;
            border:1px solid rgba(255,170,102,0.3);
        }
        .health-bar-wrap { flex:1; height:16px; background:#2a0a0a; border-radius:10px; overflow:hidden; position:relative; }
        .health-bar-fill { height:100%; background:linear-gradient(90deg,#ff4444,#ff6666); width:100%; transition:width 0.3s; }
        .health-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:10px; font-weight:bold; text-shadow:1px 1px 2px #000; }
        .xp-bar-wrap { flex:1; height:8px; background:#1a1a2a; border-radius:6px; overflow:hidden; }
        .xp-bar-fill { height:100%; background:linear-gradient(90deg,#64aaff,#88ccff); width:0%; transition:width 0.3s; }
        .resources { display:flex; gap:12px; font-size:11px; color:#ffaa66; font-weight:bold; }
        .res-icon { background:rgba(255,170,102,0.2); padding:2px 6px; border-radius:10px; }

        /* MINIMAP - GTA style (top right) */
        #minimap-container {
            position:absolute; top:10px; right:10px;
            width:160px; height:160px;
            background:rgba(0,0,0,0.6);
            border:2px solid #ffaa66;
            border-radius:12px;
            overflow:hidden;
            z-index:110;
        }
        #minimap-canvas { width:100%; height:100%; }

        /* CONTEXTUAL PROMPTS - GTA style (center bottom) */
        .context-prompt {
            position:absolute; bottom:140px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.8); backdrop-filter:blur(8px);
            color:#ffaa66; padding:10px 20px; border-radius:30px;
            font-size:12px; font-weight:bold;
            border:2px solid #ffaa66;
            display:none; gap:8px; align-items:center;
            z-index:120;
            animation:pulse 1.5s infinite;
        }
        .context-prompt.active { display:flex; }
        .context-prompt .progress-ring {
            width:20px; height:20px; border:3px solid rgba(255,170,102,0.3);
            border-top-color:#ffaa66; border-radius:50%;
            animation:spin 1s linear infinite;
        }
        @keyframes pulse { 0%,100% { transform:translateX(-50%) scale(1); } 50% { transform:translateX(-50%) scale(1.05); } }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* CLIMB PROMPT */
        .climb-prompt {
            position:absolute; bottom:180px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.8); color:#64aaff;
            padding:8px 16px; border-radius:20px; font-size:12px;
            border:1px solid #64aaff; display:none; z-index:120;
        }
        .climb-prompt.active { display:block; }

        /* ACTION WHEEL - Crimson Desert style */
        #action-wheel {
            position:absolute;
            width:180px; height:180px;
            background:rgba(0,0,0,0.85); backdrop-filter:blur(12px);
            border:2px solid #ffaa66;
            border-radius:50%;
            display:none;
            grid-template-columns:repeat(2,1fr);
            transform:translate(-50%,-50%);
            z-index:200;
            padding:10px;
            gap:8px;
        }
        #action-wheel.active { display:grid; }
        .action-wheel-btn {
            background:rgba(255,170,102,0.2);
            border:1px solid #ffaa66;
            border-radius:12px;
            color:#ffaa66;
            font-size:20px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition:0.2s;
        }
        .action-wheel-btn:active { background:#ffaa66; color:#000; transform:scale(0.95); }
        .action-wheel-btn .label { font-size:8px; margin-top:2px; }

        /* BOTTOM ACTION BAR - Mobile friendly */
        .bottom-bar {
            position:absolute; bottom:15px; left:15px; right:15px;
            display:flex; justify-content:space-around; align-items:center;
            background:rgba(0,0,0,0.7); backdrop-filter:blur(12px);
            border:2px solid rgba(255,170,102,0.5);
            border-radius:40px;
            padding:8px 12px;
            z-index:110;
        }
        .action-btn {
            background:rgba(255,170,102,0.2);
            border:2px solid #ffaa66;
            color:#ffaa66;
            font-size:20px;
            padding:10px 14px;
            border-radius:30px;
            font-weight:bold;
            cursor:pointer;
            transition:0.2s;
            min-width:50px;
            text-align:center;
        }
        .action-btn:active { background:#ffaa66; color:#000; transform:scale(0.9); }
        .action-btn.primary { background:#ffaa66; color:#000; }

        /* COMBAT OVERLAY - Mortal Kombat style */
        #combat-overlay {
            position:absolute; inset:0;
            background:rgba(0,0,0,0.85);
            display:none;
            flex-direction:column;
            justify-content:space-between;
            padding:20px;
            z-index:150;
        }
        #combat-overlay.active { display:flex; }
        
        .opponent-info {
            display:flex; align-items:center; gap:12px;
            background:rgba(50,0,0,0.6);
            padding:10px; border-radius:12px;
            border:2px solid #ff4444;
        }
        .opponent-sprite {
            width:60px; height:60px;
            background:#300;
            border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            font-size:30px;
        }
        .opponent-health-wrap { flex:1; }
        .opponent-health-bar { height:12px; background:#2a0a0a; border-radius:8px; overflow:hidden; }
        .opponent-health-fill { height:100%; background:linear-gradient(90deg,#ff4444,#ff6666); width:100%; transition:width 0.3s; }
        .opponent-name { color:#ffaa66; font-size:11px; margin-top:4px; font-weight:bold; }

        .player-info {
            display:flex; flex-direction:column; gap:8px;
            background:rgba(0,0,50,0.6);
            padding:10px; border-radius:12px;
            border:2px solid #64aaff;
        }
        .player-sprite {
            width:50px; height:50px;
            background:#001a33;
            border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            font-size:24px;
            align-self:center;
        }
        .player-health-bar { height:10px; background:#0a0a2a; border-radius:6px; overflow:hidden; }
        .player-health-fill { height:100%; background:linear-gradient(90deg,#4488ff,#64aaff); width:100%; transition:width 0.3s; }
        
        .combo-counter {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            font-size:48px; font-weight:bold;
            color:#ffaa00; text-shadow:0 0 20px #ffaa00;
            display:none; pointer-events:none;
            z-index:160;
        }
        .combo-counter.active { display:block; animation:comboFlash 0.3s; }
        @keyframes comboFlash { 0% { transform:translate(-50%,-50%) scale(1.5); opacity:0; } 50% { transform:translate(-50%,-50%) scale(1); opacity:1; } 100% { transform:translate(-50%,-50%) scale(1.2); } }

        .super-meter-wrap {
            height:16px; background:#1a1a3a; border-radius:10px; overflow:hidden; position:relative; }
        .super-meter-fill { height:100%; background:linear-gradient(90deg,#ffaa00,#ffdd44); width:0%; transition:width 0.3s; }
        .super-meter-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:10px; font-weight:bold; }

        .move-buttons {
            display:grid; grid-template-columns:repeat(2,1fr); gap:10px;
            margin-top:10px;
        }
        .move-btn {
            background:rgba(255,170,102,0.2);
            border:2px solid #ffaa66;
            border-radius:20px;
            padding:15px;
            color:#ffaa66;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.2s;
        }
        .move-btn:active { background:#ffaa66; color:#000; transform:scale(0.95); }
        .move-btn.special { border-color:#ff4444; color:#ff4444; background:rgba(255,68,68,0.2); }

        .fatality-prompt {
            position:absolute; top:40%; left:50%; transform:translate(-50%,-50%);
            font-size:36px; font-weight:bold;
            color:#ff0000; text-shadow:0 0 30px #ff0000;
            display:none; cursor:pointer;
            animation:fatalityPulse 0.5s infinite;
            z-index:170;
        }
        .fatality-prompt.active { display:block; }
        @keyframes fatalityPulse { 0%,100% { transform:translate(-50%,-50%) scale(1); } 50% { transform:translate(-50%,-50%) scale(1.1); } }

        /* PARTY UI MODAL - Pokémon style */
        #party-modal {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.95); backdrop-filter:blur(16px);
            border:3px solid #64aaff;
            border-radius:24px;
            padding:20px;
            min-width:320px; max-width:90vw;
            z-index:200;
            display:none;
        }
        #party-modal.active { display:block; }
        .party-grid {
            display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
            margin-top:15px;
        }
        .party-card {
            background:rgba(100,170,255,0.1);
            border:2px solid #64aaff;
            border-radius:16px;
            padding:10px;
            text-align:center;
            cursor:pointer;
            transition:0.2s;
        }
        .party-card:active { background:rgba(100,170,255,0.3); transform:scale(0.95); }
        .party-card .creature-img {
            width:50px; height:50px;
            background:rgba(100,170,255,0.2);
            border-radius:12px;
            margin:0 auto 6px;
            display:flex; align-items:center; justify-content:center;
            font-size:24px;
        }
        .party-card .creature-name { font-size:10px; color:#64aaff; font-weight:bold; }
        .party-card .creature-hp { font-size:8px; color:#88ccff; margin-top:2px; }
        .party-card.empty {
            background:rgba(50,50,50,0.5);
            border:2px dashed #444;
            display:flex; align-items:center; justify-content:center;
            color:#666; font-size:10px;
        }

        /* LIMIT BREAK BAR - Final Fantasy style */
        .limit-break-wrap {
            position:absolute; bottom:80px; left:50%; transform:translateX(-50%);
            width:200px;
            background:rgba(0,0,0,0.7);
            border:2px solid #ff00ff;
            border-radius:20px;
            padding:6px;
            display:none;
            z-index:115;
        }
        .limit-break-wrap.active { display:block; }
        .limit-break-bar { height:12px; background:#2a0a2a; border-radius:8px; overflow:hidden; }
        .limit-break-fill { height:100%; background:linear-gradient(90deg,#ff00ff,#ff66ff); width:0%; transition:width 0.3s; animation:limitGlow 1s infinite; }
        @keyframes limitGlow { 0%,100% { filter:brightness(1); } 50% { filter:brightness(1.5); } }
        .limit-break-btn {
            position:absolute; top:-15px; left:50%; transform:translateX(-50%);
            background:#ff00ff; color:#fff;
            border:2px solid #fff;
            padding:6px 16px; border-radius:20px;
            font-size:10px; font-weight:bold;
            cursor:pointer;
            display:none;
        }
        .limit-break-btn.ready { display:block; animation:pulse 0.5s infinite; }

        /* NEEDS BARS - Sims style */
        #needs-container {
            position:absolute; top:100px; right:10px;
            background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
            border:1px solid rgba(255,170,102,0.3);
            border-radius:12px;
            padding:8px;
            display:none;
            z-index:110;
        }
        #needs-container.active { display:block; }
        .need {
            display:flex; align-items:center; gap:6px;
            margin:4px 0;
        }
        .need-label { font-size:9px; color:#ffaa66; width:50px; }
        .need-bar-wrap { flex:1; height:8px; background:#1a1a1a; border-radius:4px; overflow:hidden; }
        .need-bar-fill { height:100%; background:linear-gradient(90deg,#44ff44,#88ff88); width:100%; transition:width 0.3s; }

        /* MODAL CLOSE BUTTON */
        .modal-close {
            position:absolute; top:10px; right:10px;
            background:none; border:none;
            color:#ffaa66; font-size:24px;
            cursor:pointer;
            z-index:210;
        }

        /* JOYSTICK AREAS */
        .joystick-area {
            position:absolute; bottom:100px; left:20px;
            width:100px; height:100px;
            background:rgba(255,170,102,0.1);
            border:2px solid rgba(255,170,102,0.3);
            border-radius:50%;
            touch-action:none;
            z-index:105;
        }
        .joystick-knob {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            width:40px; height:40px;
            background:rgba(255,170,102,0.5);
            border-radius:50%;
            pointer-events:none;
        }

        /* MOODLETS - Sims style */
        #moodlets-container {
            position:absolute; top:10px; left:50%; transform:translateX(-50%);
            display:flex; gap:6px;
            background:rgba(0,0,0,0.6);
            padding:6px 12px;
            border-radius:20px;
            display:none;
            z-index:110;
        }
        #moodlets-container.active { display:flex; }
        .moodlet {
            font-size:18px;
            background:rgba(255,255,255,0.1);
            padding:4px 8px;
            border-radius:10px;
        }

        /* RESPONSIVE */
        @media (max-width:768px) {
            .top-bar { left:5px; right:5px; top:5px; }
            #minimap-container { width:120px; height:120px; top:5px; right:5px; }
            .bottom-bar { bottom:10px; left:10px; right:10px; padding:6px 8px; }
            .action-btn { font-size:16px; padding:8px 10px; min-width:40px; }
            .party-grid { grid-template-columns:repeat(2,1fr); }
            .move-buttons { grid-template-columns:repeat(2,1fr); }
        }
    </style>
</head>
<body>
    <!-- 3D Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Unified Mobile UI Overlay -->
    <div id="mobile-ui">
        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="bar-container">
                <div class="health-bar-wrap">
                    <div class="health-bar-fill" id="player-health-fill"></div>
                    <div class="health-text"><span id="player-hp-text">100/100</span></div>

                <div class="resources">
                    <span class="res-icon">💰 <span id="coins">100</span></span>

                    <span class="res-icon">⚖️ <span id="tax">100</span></span>
                </div>
            </div>
            <div class="bar-container">
                <span style="color:#64aaff; font-size:10px; font-weight:bold;">XP</span>
                <div class="xp-bar-wrap">
                    <div class="xp-bar-fill" id="player-xp-fill"></div>
                </div>
                <span style="color:#64aaff; font-size:10px; font-weight:bold;">LVL <span id="level-val">1</span></span>
            </div>

        <!-- MINIMAP -->
        <div id="minimap-container">

        <!-- CONTEXT PROMPTS -->
        <div class="context-prompt" id="context-prompt">

        </div>

        <div class="climb-prompt" id="climb-prompt">⬆️ Climb</div>

        <!-- ACTION WHEEL -->
        <div id="action-wheel"></div>

        <!-- MOODLETS -->

        <!-- NEEDS BARS -->

        <!-- LIMIT BREAK -->
        <div class="limit-break-wrap" id="limit-break-wrap">
            <button class="limit-break-btn" id="limit-break-btn">✨ LIMIT BREAK!</button>
            <div class="limit-break-bar">
                <div class="limit-break-fill" id="limit-break-fill"></div>
            </div>
        </div>

        <!-- COMBAT OVERLAY -->
        <div id="combat-overlay">
            <div class="opponent-info">
                <div class="opponent-sprite" id="opponent-sprite">👹</div>
                <div class="opponent-health-wrap">
                    <div class="opponent-health-bar">
                        <div class="opponent-health-fill" id="opponent-health-fill"></div>
                    </div>
                    <div class="opponent-name" id="opponent-name">Dark Soul</div>
                </div>
            </div>

            <div class="combo-counter" id="combo-counter">0 HIT COMBO!</div>

            <div class="fatality-prompt" id="fatality-prompt">💀 FATALITY 💀</div>

            <div class="player-info">
                <div class="player-sprite" id="player-sprite">🧙</div>
                <div class="player-health-bar">
                    <div class="player-health-fill" id="player-health-fill-combat"></div>
                </div>
                <div class="super-meter-wrap">
                    <div class="super-meter-fill" id="super-meter-fill"></div>
                    <div class="super-meter-text">SUPER METER</div>
                </div>
            </div>

            <div class="move-buttons" id="move-buttons">
                <button class="move-btn" onclick="combat.useMove('punch')">👊 Punch</button>
                <button class="move-btn" onclick="combat.useMove('kick')">🦶 Kick</button>
                <button class="move-btn special" onclick="combat.useMove('special')">✨ Special</button>
                <button class="move-btn special" onclick="combat.useMove('ultimate')">💥 Ultimate</button>

        <!-- PARTY MODAL -->
        <div id="party-modal">
            <button class="modal-close" onclick="partyUI.close()">&times;</button>
            <h3 style="color:#64aaff; text-align:center;">🧬 SOUL PARTY</h3>
            <div class="party-grid" id="party-grid"></div>
        </div>

        <!-- BOTTOM ACTION BAR -->
        <div class="bottom-bar">
            <button class="action-btn" onclick="app.openParty()">🧬 Party</button>
            <button class="action-btn" onclick="app.toggleHabitat()">🏠 Habitat</button>
            <button class="action-btn primary" onclick="app.enterCombat()">⚔️ Battle</button>
            <button class="action-btn" onclick="app.openCollector()">🔵 Collect</button>
            <button class="action-btn" onclick="app.openMenu()">☰ Menu</button>

        <!-- JOYSTICK -->
        <div class="joystick-area" id="joystick-area">
            <div class="joystick-knob" id="joystick-knob"></div>

    <script>
        // ============================================================
        // SOULVERSE MOBILE INTERFACE - Complete System
        // Integrating GTA, Pokémon, Mortal Kombat, FF, Sims patterns
        // ============================================================

        // --- Game State ---
        const app = {
            player: {
                hp: 100, maxHp: 100,
                xp: 0, maxXp: 100, level: 1,
                resources: { profit: 100, love: 100, tax: 100 },
                x: 0, z: 0,
                mood: 'happy',
                needs: { energy: 100, hunger: 100, social: 100 }
            },
            party: [],
            limitMeter: 0,
            inCombat: false,
            currentContext: null
        };

        // --- GTA Style Minimap ---
        class GTAMinimap {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.blips = [];
                this.worldSize = 200;
            }

            addBlip(x, z, icon, color) {
                this.blips.push({ x, z, icon, color });
            }

            draw(playerX, playerZ) {
                const size = this.canvas.width;
                this.ctx.clearRect(0, 0, size, size);
                
                // Background
                this.ctx.fillStyle = '#111';
                this.ctx.fillRect(0, 0, size, size);

                // Grid
                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = 1;
                for (let i = 0; i < size; i += 20) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i, 0);
                    this.ctx.lineTo(i, size);
                    this.ctx.stroke();
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i);
                    this.ctx.lineTo(size, i);
                    this.ctx.stroke();
                }

                // Player (center)
                const cx = size / 2, cy = size / 2;
                this.ctx.fillStyle = '#ffaa66';
                this.ctx.beginPath();
                this.ctx.arc(cx, cy, 6, 0, Math.PI * 2);
                this.ctx.fill();

                // Blips
                for (let blip of this.blips) {
                    const dx = (blip.x - playerX) * (size / this.worldSize);
                    const dy = (blip.z - playerZ) * (size / this.worldSize);
                    const x = cx + dx;
                    const y = cy + dy;
                    
                    if (x < 0 || x > size || y < 0 || y > size) continue;
                    
                    this.ctx.fillStyle = blip.color;
                    this.ctx.font = '14px Arial';
                    this.ctx.fillText(blip.icon, x - 6, y + 4);
                    
                    this.ctx.fillStyle = blip.color;
                    this.ctx.fillRect(x - 2, y - 2, 4, 4);
                }
            }
        }

        // --- Contextual Prompt (GTA) ---
        class ContextualPrompt {
            constructor() {
                this.element = document.getElementById('context-prompt');
                this.textElement = document.getElementById('context-text');
                this.active = false;
                this.holdTime = 0;
                this.holdThreshold = 800;
                this.onActivate = null;
            }

            show(text, callback) {
                this.textElement.textContent = text;
                this.element.classList.add('active');
                this.onActivate = callback;
                this.active = true;
                this.holdTime = 0;
            }

            hide() {
                this.element.classList.remove('active');
                this.active = false;
                this.onActivate = null;
            }

            update(delta) {
                if (!this.active) return;
                // Touch hold detection would go here
            }
        }

        // --- Pokémon Style Party UI ---
        class PokemonPartyUI {
            constructor() {
                this.modal = document.getElementById('party-modal');
                this.grid = document.getElementById('party-grid');
            }

            setParty(party) {
                app.party = party;
                this.render();
            }

            render() {
                this.grid.innerHTML = '';
                for (let i = 0; i < 6; i++) {
                    const creature = app.party[i];
                    const card = document.createElement('div');
                    card.className = 'party-card';
                    
                    if (creature) {
                        card.innerHTML = `
                            <div class="creature-img">${creature.icon || '🧬'}</div>
                            <div class="creature-name">${creature.name}</div>
                            <div class="creature-hp">❤️ ${creature.hp}/${creature.maxHp}</div>
                        `;
                        card.onclick = () => this.selectCreature(creature);
                    } else {
                        card.className += ' empty';
                        card.textContent = 'Empty';
                    }
                    
                    this.grid.appendChild(card);
                }
            }

            selectCreature(creature) {
                console.log('Selected:', creature);
                // Show creature details
            }

            open() {
                this.render();
                this.modal.classList.add('active');
            }

            close() {
                this.modal.classList.remove('active');
            }
        }

        // --- Mortal Kombat Combat UI ---
        class CombatUI {
            constructor() {
                this.overlay = document.getElementById('combat-overlay');
                this.combo = 0;
                this.superMeter = 0;
                this.opponent = null;
            }

            startCombat(opponent) {
                this.opponent = {
                    name: opponent.name || 'Dark Soul',
                    hp: opponent.hp || 100,
                    maxHp: opponent.maxHp || 100,
                    sprite: opponent.sprite || '👹'
                };
                
                document.getElementById('opponent-name').textContent = this.opponent.name;
                document.getElementById('opponent-sprite').textContent = this.opponent.sprite;
                this.updateHealth();
                
                this.overlay.classList.add('active');
                app.inCombat = true;
            }

            updateHealth() {
                if (!this.opponent) return;
                const pct = (this.opponent.hp / this.opponent.maxHp) * 100;
                document.getElementById('opponent-health-fill').style.width = pct + '%';
                
                // Check for fatality
                if (pct < 20) {
                    document.getElementById('fatality-prompt').classList.add('active');
                } else {
                    document.getElementById('fatality-prompt').classList.remove('active');
            }
            }

            addCombo(hits) {
                this.combo += hits;
                const counter = document.getElementById('combo-counter');
                counter.textContent = `${this.combo} HIT COMBO!`;
                counter.classList.add('active');
                setTimeout(() => counter.classList.remove('active'), 500);
                
                if (this.combo >= 10) {
                    this.addSuperMeter(20);
                }
            }

            addSuperMeter(amount) {
                this.superMeter = Math.min(100, this.superMeter + amount);
                document.getElementById('super-meter-fill').style.width = this.superMeter + '%';
            }

            useMove(move) {
                if (!this.opponent) return;
                
                const damage = {
                    'punch': 10,
                    'kick': 15,
                    'special': this.superMeter >= 50 ? 40 : 0,
                    'ultimate': this.superMeter >= 100 ? 80 : 0
                };

                if (move === 'special' && this.superMeter >= 50) {
                    this.superMeter -= 50;
                    document.getElementById('super-meter-fill').style.width = this.superMeter + '%';
                } else if (move === 'ultimate' && this.superMeter >= 100) {
                    this.superMeter -= 100;
                    document.getElementById('super-meter-fill').style.width = this.superMeter + '%';
                }

                this.opponent.hp = Math.max(0, this.opponent.hp - damage[move]);
                this.updateHealth();
                this.addCombo(1);

                if (this.opponent.hp <= 0) {
                    this.endCombat(true);
                }
            }

            endCombat(victory) {
                this.overlay.classList.remove('active');
                app.inCombat = false;
                this.combo = 0;
                this.superMeter = 0;
                this.opponent = null;
                
                if (victory) {
                    console.log('Victory!');
                    // Award rewards
                }
            }
        }

        // --- Final Fantasy Limit Break ---
        class LimitBreakUI {
            constructor() {
                this.wrap = document.getElementById('limit-break-wrap');
                this.fill = document.getElementById('limit-break-fill');
                this.btn = document.getElementById('limit-break-btn');
                this.meter = 0;
                this.max = 100;
            }

            add(amount) {
                this.meter = Math.min(this.max, this.meter + amount);
                this.fill.style.width = (this.meter / this.max * 100) + '%';
                
                if (this.meter >= this.max) {
                    this.btn.classList.add('ready');
                }
            }

            use() {
                if (this.meter >= this.max) {
                    this.meter = 0;
                    this.fill.style.width = '0%';
                    this.btn.classList.remove('ready');
                    return true;
                }
                return false;
            }

            show() { this.wrap.classList.add('active'); }
            hide() { this.wrap.classList.remove('active'); }
        }

        // --- Sims Needs & Moodlets ---
        class SimsNeedsUI {
            constructor() {
                this.container = document.getElementById('needs-container');
                this.moodletsContainer = document.getElementById('moodlets-container');
            }

            update(needs, mood) {
                this.container.innerHTML = `
                    <div class="need">
                        <span class="need-label">⚡ Energy</span>
                        <div class="need-bar-wrap">
                            <div class="need-bar-fill" style="width:${needs.energy}%; background:${needs.energy < 30 ? '#ff4444' : '#44ff44'}"></div>
                        </div>
                    </div>
                    <div class="need">
                        <span class="need-label">🍔 Hunger</span>
                        <div class="need-bar-wrap">
                            <div class="need-bar-fill" style="width:${needs.hunger}%; background:${needs.hunger < 30 ? '#ff4444' : '#44ff44'}"></div>
                        </div>
                    </div>
                    <div class="need">
                        <span class="need-label">💬 Social</span>
                        <div class="need-bar-wrap">
                            <div class="need-bar-fill" style="width:${needs.social}%; background:${needs.social < 30 ? '#ff4444' : '#44ff44'}"></div>
                        </div>
                    </div>
                `;

                const moodIcons = {
                    'happy': '😊',
                    'tired': '😴',
                    'hungry': '😋',
                    'lonely': '😢',
                    'angry': '😠'
                };

                this.moodletsContainer.innerHTML = `<span class="moodlet">${moodIcons[mood] || '😊'}</span>`;
            }

            show() { this.container.classList.add('active'); this.moodletsContainer.classList.add('active'); }
            hide() { this.container.classList.remove('active'); this.moodletsContainer.classList.remove('active'); }
        }

        // --- Virtual Joystick ---
        class VirtualJoystick {
            constructor(areaId, knobId, onMove) {
                this.area = document.getElementById(areaId);
                this.knob = document.getElementById(knobId);
                this.onMove = onMove;
                this.active = false;
                this.center = { x: 0, y: 0 };
                this.maxRadius = 30;

                this.area.addEventListener('touchstart', (e) => {
                    this.active = true;
                    const rect = this.area.getBoundingClientRect();
                    this.center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
                    this.update(e.touches[0]);
                });

                this.area.addEventListener('touchmove', (e) => {
                    if (this.active) {
                        e.preventDefault();
                        this.update(e.touches[0]);
                    }
                });

                this.area.addEventListener('touchend', () => {
                    this.active = false;
                    this.knob.style.transform = `translate(-50%, -50%)`;
                    if (this.onMove) this.onMove(0, 0);
                });
            }

            update(touch) {
                let dx = touch.clientX - this.center.x;
                let dy = touch.clientY - this.center.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist > this.maxRadius) {
                    const angle = Math.atan2(dy, dx);
                    dx = Math.cos(angle) * this.maxRadius;
                    dy = Math.sin(angle) * this.maxRadius;
                }

                this.knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                
                if (this.onMove) {
                    this.onMove(dx / this.maxRadius, dy / this.maxRadius);
                }
            }
        }

        // --- Initialize All Systems ---
        const minimap = new GTAMinimap('minimap-canvas');
        const contextPrompt = new ContextualPrompt();
        const partyUI = new PokemonPartyUI();
        const combat = new CombatUI();
        const limitBreak = new LimitBreakUI();
        const simsNeeds = new SimsNeedsUI();

        // Add some blips to minimap
        minimap.addBlip(20, 30, '🏠', '#64aaff');
        minimap.addBlip(-40, 20, '⚔️', '#ff4444');
        minimap.addBlip(10, -50, '🐾', '#64ff64');
        minimap.addBlip(-30, -40, '💎', '#ffaa00');

        // Initialize joystick
        const joystick = new VirtualJoystick('joystick-area', 'joystick-knob', (x, y) => {
            // Move player
            app.player.x += x * 0.1;
            app.player.z += y * 0.1;
            minimap.draw(app.player.x, app.player.z);
        });

        // --- App Functions ---
        app.openParty = () => partyUI.open();
        app.toggleHabitat = () => { simsNeeds.show(); console.log('Habitat mode'); };
        app.enterCombat = () => {
            combat.startCombat({ name: 'Dark Soul', hp: 100, sprite: '👹' });
            limitBreak.show();
        };
        app.openCollector = () => { console.log('Collector mode'); };
        app.openMenu = () => { console.log('Menu opened'); };
        app.toggleHomes = () => { console.log('Homes view'); };
        app.showDashboard = () => { console.log('Dashboard'); };
        app.exploreWorld = () => { console.log('Exploring'); };
        app.showFactions = () => { console.log('Factions'); };
        app.showCreatures = () => { console.log('Creatures'); };
        app.enterLadder = () => { console.log('Tower ladder'); };

        // --- Game Loop ---
        let lastTime = Date.now();
        function gameLoop() {
            const now = Date.now();
            const delta = (now - lastTime) / 1000;
            lastTime = now;

            // Update needs over time
            app.player.needs.energy = Math.max(0, app.player.needs.energy - delta * 0.5);
            app.player.needs.hunger = Math.max(0, app.player.needs.hunger - delta * 0.8);
            app.player.needs.social = Math.max(0, app.player.needs.social - delta * 0.3);

            // Update mood based on needs
            if (app.player.needs.energy < 30) app.player.mood = 'tired';
            else if (app.player.needs.hunger < 30) app.player.mood = 'hungry';
            else if (app.player.needs.social < 30) app.player.mood = 'lonely';
            else app.player.mood = 'happy';

            simsNeeds.update(app.player.needs, app.player.mood);

            // Update UI
            document.getElementById('player-health-fill').style.width = (app.player.hp / app.player.maxHp * 100) + '%';
            document.getElementById('player-hp-text').textContent = `${Math.floor(app.player.hp)}/${app.player.maxHp}`;
            document.getElementById('player-xp-fill').style.width = (app.player.xp / app.player.maxXp * 100) + '%';
            document.getElementById('level-val').textContent = app.player.level;
            document.getElementById('coins').textContent = Math.floor(app.player.resources.profit);
            document.getElementById('love').textContent = Math.floor(app.player.resources.love);
            document.getElementById('tax').textContent = Math.floor(app.player.resources.tax);

            contextPrompt.update(delta);

            requestAnimationFrame(gameLoop);
        }

        // Start game loop
        gameLoop();

        // Draw initial minimap
        minimap.draw(0, 0);

        // Limit break button
        document.getElementById('limit-break-btn').onclick = () => {
            if (limitBreak.use()) {
                console.log('LIMIT BREAK ACTIVATED!');
                // Deal massive damage or heal
                if (app.inCombat) {
                    combat.opponent.hp = Math.max(0, combat.opponent.hp - 50);
                    combat.updateHealth();
                }
            }
        };

        // Fatality click handler
        document.getElementById('fatality-prompt').onclick = () => {
            if (combat.opponent && combat.opponent.hp < 20) {
                console.log('FATALITY!');
                combat.endCombat(true);
            }
        };

        console.log('🌌 SOULVERSE MOBILE INTERFACE initialized!');
        console.log('📱 Touch controls ready');
        console.log('🎮 All game UI patterns loaded: GTA, Pokémon, MK, FF, Sims');
    </script>
