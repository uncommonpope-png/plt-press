<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Soulverse | Unified</title>
  <style>
    * { user-select: none; touch-action: manipulation; }
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    #ui-root { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    .top-bar { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 40px; padding: 8px 16px; color: white; font-size: 14px; font-weight: bold; pointer-events: auto; z-index: 20; }
    .minimap { position: absolute; bottom: 120px; right: 20px; width: 140px; height: 140px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 2px solid #ffaa44; pointer-events: none; z-index: 20; }
    .context-prompt { position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 40px; color: white; font-weight: bold; display: flex; gap: 12px; align-items: center; border: 1px solid #ffaa44; pointer-events: auto; z-index: 30; white-space: nowrap; }
    .context-prompt.hidden { display: none; }
    .progress-ring { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ffaa44; border-top-color: transparent; animation: fill-ring 0.8s linear forwards; }
    @keyframes fill-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .action-wheel { position: fixed; width: 180px; height: 180px; border-radius: 50%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); border: 1px solid #ffaa44; transform: translate(-50%, -50%); pointer-events: auto; z-index: 200; display: flex; align-items: center; justify-content: center; }
    .action-wheel.hidden { display: none; }
    .wheel-options { position: relative; width: 100%; height: 100%; }
    .wheel-option { position: absolute; width: 60px; height: 60px; border-radius: 50%; background: #222; border: 1px solid #ffaa44; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: 0.1s; transform: translate(-50%, -50%); }
    .wheel-option:active { background: #ffaa44; color: black; }
    .battle-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; flex-direction: column; justify-content: space-between; padding: 20px; z-index: 100; pointer-events: auto; }
    .battle-overlay.hidden { display: none; }
    .battle-stats { display: flex; justify-content: space-between; color: white; }
    .health-bar { width: 200px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
    .health-fill { height: 100%; background: #ff4444; width: 100%; }
    .combo-counter { font-size: 32px; font-weight: bold; text-align: center; color: #ffaa44; text-shadow: 0 0 10px #ffaa44; margin: 10px 0; }
    .super-meter { width: 200px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
    .super-fill { height: 100%; background: #44ff44; width: 0; }
    .limit-break-btn { background: #ffaa44; border: none; padding: 8px 16px; border-radius: 40px; font-weight: bold; margin-top: 8px; }
    .limit-break-btn.hidden { display: none; }
    .move-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
    .move-btn { background: #222; border: 1px solid #ffaa44; padding: 14px; border-radius: 40px; color: white; font-size: 16px; font-weight: bold; text-align: center; cursor: pointer; }
    .fatality-prompt { background: red; color: white; font-weight: bold; text-align: center; padding: 12px; border-radius: 40px; margin-top: 20px; cursor: pointer; }
    .fatality-prompt.hidden { display: none; }
    .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border-radius: 32px; padding: 20px; width: 85%; max-width: 400px; color: white; border: 1px solid #ffaa44; pointer-events: auto; z-index: 150; backdrop-filter: blur(20px); }
    .modal.hidden { display: none; }
    .party-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
    .party-card { background: #222; border-radius: 16px; padding: 8px; text-align: center; cursor: pointer; }
    .close-btn { background: none; border: none; color: #ffaa44; font-size: 24px; float: right; cursor: pointer; }
    .joystick-base { position: fixed; bottom: 100px; left: 40px; width: 100px; height: 100px; border-radius: 50%; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.3); pointer-events: auto; z-index: 50; }
    .joystick-thumb { position: absolute; width: 50px; height: 50px; border-radius: 50%; background: rgba(255,170,68,0.8); top: 25px; left: 25px; transition: 0.05s linear; }
    .action-bar { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: space-around; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 40px; margin: 0 16px; pointer-events: auto; z-index: 30; }
    .action-btn { background: none; border: none; color: white; font-size: 24px; padding: 8px; border-radius: 40px; min-width: 60px; }
    input[type="text"] { width: 100%; padding: 8px; margin: 8px 0; border-radius: 8px; border: 1px solid #ffaa44; background: #222; color: white; }
    input[type="range"] { width: 100%; }
  </style>
</head>
<body>
  <div id="ui-root">
    <div class="top-bar">
      <span>❤️ <span id="player-hp">100</span>/<span id="player-maxhp">100</span></span>
      <span>⭐ Lv.<span id="player-level">1</span></span>
      <span>💰 <span id="player-coins">0</span></span>
    </div>
    <canvas id="minimap-canvas" class="minimap" width="140" height="140"></canvas>
    <div id="context-prompt" class="context-prompt hidden"></div>
    <div id="action-wheel" class="action-wheel hidden"><div class="wheel-options"></div></div>
    <div id="battle-overlay" class="battle-overlay hidden">
      <div class="battle-stats">
        <div><div id="opponent-name"></div><div class="health-bar"><div id="opponent-health-fill" class="health-fill"></div></div></div>
        <div><div>You</div><div class="health-bar"><div id="player-battle-health-fill" class="health-fill"></div></div></div>
      </div>
      <div class="combo-counter" id="combo-counter">0</div>
      <div class="super-meter"><div id="super-fill" class="super-fill"></div></div>
      <button id="limit-break-btn" class="limit-break-btn hidden">Limit Break!</button>
      <div id="move-buttons" class="move-buttons"></div>
      <div id="fatality-prompt" class="fatality-prompt hidden">💀 FATALITY 💀</div>
    </div>
    <div id="party-modal" class="modal hidden">
      <button class="close-btn" onclick="closePartyModal()">✖</button>
      <h2>Your Party</h2>
      <div id="party-grid" class="party-grid"></div>
    </div>
    <div id="forge-modal" class="modal hidden">
      <button class="close-btn" onclick="closeForgeModal()">✖</button>
      <h2>Forge Soul</h2>
      <input type="text" id="soul-name" placeholder="Name">
      <div>PLT Sliders</div>
      <div>Profit <input type="range" id="plt-profit" min="0" max="100" value="33"></div>
      <div>Love <input type="range" id="plt-love" min="0" max="100" value="33"></div>
      <div>Tax <input type="range" id="plt-tax" min="0" max="100" value="33"></div>
      <button id="forge-confirm" style="margin-top:12px; background:#ffaa44; border:none; padding:8px; border-radius:40px; width:100%;">Forge</button>
    </div>
    <div id="habitat-modal" class="modal hidden">
      <button class="close-btn" onclick="closeHabitatModal()">✖</button>
      <h2>Habitat</h2>
      <div id="habitat-souls"></div>
    </div>
    <div class="joystick-base" id="joystick-base"><div class="joystick-thumb" id="joystick-thumb"></div></div>
    <div class="action-bar">
      <button class="action-btn" id="forge-btn">⚔️</button>
      <button class="action-btn" id="habitat-btn">🏠</button>
      <button class="action-btn" id="arena-btn">🥊</button>
      <button class="action-btn" id="collector-btn">🧬</button>
      <button class="action-btn" id="menu-btn">☰</button>
    </div>
  </div>
  <canvas id="game-canvas"></canvas>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three/examples/js/controls/OrbitControls.js"></script>
  <script>
    // === GLOBAL STATE ===
    let state = { player: { id: 'craig', name: 'Craig', level: 1, xp: 0, hp: 100, maxHp: 100, attack: 10, defense: 10, plt: { profit: 33, love: 33, tax: 33 }, coins: 0, inventory: [] }, world: { currentRegion: 'starter', time: { hour: 12, minute: 0 }, weather: 'clear' }, souls: [], party: [], storage: [], factionRep: {}, homes: [], settings: { sound: true, music: true, haptics: true } };

    // === BRIDGE CLIENT ===
    class BridgeClient { constructor(url) { this.url = url; this.ws = null; } connect() { try { this.ws = new WebSocket(this.url); this.ws.onopen = () => console.log('🌉 Bridge connected'); this.ws.onmessage = (e) => this.handleMessage(JSON.parse(e.data)); this.ws.onclose = () => { console.log('Bridge disconnected, reconnecting...'); setTimeout(() => this.connect(), 5000); }; } catch(e) { console.log('Bridge connection failed:', e); } } handleMessage(msg) { if (msg.type === 'craig_action') spawnSoulFromAction(msg.action, msg.detail); else if (msg.type === 'soul_event') applySoulEvent(msg.event, msg.data); } sendCraigAction(action, detail) { if (this.ws && this.ws.readyState === WebSocket.OPEN) { this.ws.send(JSON.stringify({ type: 'craig_action', action, detail, timestamp: Date.now() })); } else { console.log(`🌉 Bridge (mock): ${action} - ${detail}`); } } }
    const bridge = new BridgeClient('wss://your-oracle-instance.com/bridge');

    // === THREE.JS WORLD ===
    let scene, camera, renderer, controls, playerMesh;
    function initThree() {
      scene = new THREE.Scene(); scene.background = new THREE.Color(0x050b1a);
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000); camera.position.set(0, 5, 10);
      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas') }); renderer.setSize(window.innerWidth, window.innerHeight);
      controls = new THREE.OrbitControls(camera, renderer.domElement); controls.enableZoom = true; controls.enablePan = true; controls.enableTouchRotate = true;
      const groundGeo = new THREE.PlaneGeometry(50, 50); const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a6b3a }); const ground = new THREE.Mesh(groundGeo, groundMat); ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);
      const playerGeo = new THREE.BoxGeometry(0.8, 1.2, 0.8); const playerMat = new THREE.MeshStandardMaterial({ color: 0xffaa44 }); playerMesh = new THREE.Mesh(playerGeo, playerMat); playerMesh.castShadow = true; playerMesh.position.y = 0.6; scene.add(playerMesh);
      const ambient = new THREE.AmbientLight(0x404040); scene.add(ambient);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1); dirLight.position.set(5, 10, 7); dirLight.castShadow = true; scene.add(dirLight);
      for (let i = 0; i < 20; i++) { const tree = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1, 0.5), new THREE.MeshStandardMaterial({ color: 0x8B5A2B })); tree.position.x = (Math.random() - 0.5) * 40; tree.position.z = (Math.random() - 0.5) * 40; tree.position.y = 0.5; scene.add(tree); }
      animate();
    }
    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }

    // === VIRTUAL JOYSTICK ===
    const joystickBase = document.getElementById('joystick-base'), joystickThumb = document.getElementById('joystick-thumb');
    let joystickActive = false, joystickCenter = { x: 0, y: 0 }, moveVector = { x: 0, z: 0 };
    function handleJoystickStart(e) { e.preventDefault(); joystickActive = true; const rect = joystickBase.getBoundingClientRect(); joystickCenter.x = rect.left + rect.width/2; joystickCenter.y = rect.top + rect.height/2; }
    function handleJoystickMove(e) { if (!joystickActive) return; e.preventDefault(); const touch = e.touches[0]; const dx = touch.clientX - joystickCenter.x; const dy = touch.clientY - joystickCenter.y; const dist = Math.min(40, Math.hypot(dx, dy)); const angle = Math.atan2(dy, dx); joystickThumb.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`; moveVector.x = Math.cos(angle) * dist / 40; moveVector.z = Math.sin(angle) * dist / 40; if (playerMesh) { playerMesh.position.x += moveVector.x * 0.1; playerMesh.position.z += moveVector.z * 0.1; } }
    function handleJoystickEnd() { joystickActive = false; joystickThumb.style.transform = 'translate(0px, 0px)'; moveVector = { x: 0, z: 0 }; }
    joystickBase.addEventListener('touchstart', handleJoystickStart); window.addEventListener('touchmove', handleJoystickMove); window.addEventListener('touchend', handleJoystickEnd);

    // === MINIMAP ===
    const minimapCanvas = document.getElementById('minimap-canvas'), minimapCtx = minimapCanvas.getContext('2d');
    function updateMinimap() { if (!playerMesh) return; const size = minimapCanvas.width; minimapCtx.clearRect(0, 0, size, size); minimapCtx.fillStyle = 'rgba(0,0,0,0.6)'; minimapCtx.fillRect(0, 0, size, size); minimapCtx.fillStyle = '#ffaa44'; minimapCtx.beginPath(); minimapCtx.arc(size/2, size/2, 5, 0, 2*Math.PI); minimapCtx.fill(); }
    setInterval(updateMinimap, 100);

    // === COMBAT SYSTEM ===
    let activeBattle = null, combo = 0, superMeter = 0, limitMeter = 0, comboTimeout = null, fatalityShown = false;
    function startBattle(opponent) { activeBattle = { player: { ...state.player, hp: state.player.hp }, opponent }; document.getElementById('battle-overlay').classList.remove('hidden'); document.getElementById('opponent-name').innerText = opponent.name; updateBattleUI(); generateMoveButtons(); combo = 0; superMeter = 0; limitMeter = 0; updateComboDisplay(); updateSuperMeter(); updateLimitButton(); fatalityShown = false; }
    function updateBattleUI() { if (!activeBattle) return; document.getElementById('player-battle-health-fill').style.width = `${(activeBattle.player.hp / activeBattle.player.maxHp) * 100}%`; document.getElementById('opponent-health-fill').style.width = `${(activeBattle.opponent.hp / activeBattle.opponent.maxHp) * 100}%`; }
    function updateComboDisplay() { const el = document.getElementById('combo-counter'); el.innerText = combo ? `${combo} HIT COMBO!` : '0'; el.style.color = combo >= 5 ? '#ffaa44' : 'white'; }
    function updateSuperMeter() { document.getElementById('super-fill').style.width = `${superMeter}%`; }
    function updateLimitButton() { const btn = document.getElementById('limit-break-btn'); if (limitMeter >= 100) btn.classList.remove('hidden'); else btn.classList.add('hidden'); }
    function generateMoveButtons() { const container = document.getElementById('move-buttons'); container.innerHTML = ''; [{ name: 'Punch', plt: 'profit', damage: 15 }, { name: 'Kick', plt: 'love', damage: 12 }, { name: 'Code Strike', plt: 'tax', damage: 18 }, { name: 'PLT Blast', plt: 'hybrid', damage: 20 }].forEach(move => { const btn = document.createElement('div'); btn.className = 'move-btn'; btn.innerText = move.name; btn.onclick = () => performMove(move); container.appendChild(btn); }); }
    function performMove(move) { if (!activeBattle) return; let damage = move.damage + activeBattle.player.attack - activeBattle.opponent.defense/2; damage *= getPltAdvantage(move.plt, activeBattle.opponent.plt); if (Math.random() < 0.1) damage *= 1.5; damage = Math.max(1, Math.floor(damage)); activeBattle.opponent.hp -= damage; combo++; if (comboTimeout) clearTimeout(comboTimeout); comboTimeout = setTimeout(() => { combo = 0; updateComboDisplay(); }, 2000); updateComboDisplay(); superMeter = Math.min(100, superMeter + damage/2); updateSuperMeter(); updateBattleUI(); if (activeBattle.opponent.hp <= 0) { endBattle(true); return; } const oppDamage = Math.max(1, Math.floor(activeBattle.opponent.attack - activeBattle.player.defense/2 + Math.random()*5)); activeBattle.player.hp -= oppDamage; limitMeter = Math.min(100, limitMeter + oppDamage); updateLimitButton(); updateBattleUI(); if (activeBattle.player.hp <= 0) endBattle(false); if (activeBattle.opponent.hp <= 10 && !fatalityShown) showFatalityPrompt(); }
    function getPltAdvantage(movePlt, oppPlt) { if (movePlt === 'profit' && oppPlt === 'love') return 1.3; if (movePlt === 'love' && oppPlt === 'tax') return 1.3; if (movePlt === 'tax' && oppPlt === 'profit') return 1.3; if (movePlt === 'profit' && oppPlt === 'tax') return 0.7; if (movePlt === 'love' && oppPlt === 'profit') return 0.7; if (movePlt === 'tax' && oppPlt === 'love') return 0.7; return 1.0; }
    function showFatalityPrompt() { fatalityShown = true; const prompt = document.getElementById('fatality-prompt'); prompt.classList.remove('hidden'); prompt.onclick = () => { endBattle(true, true); prompt.classList.add('hidden'); }; }
    function endBattle(win, fatality = false) { if (win) { alert(`Victory! ${fatality ? 'FATALITY!' : 'You win!'}`); state.player.xp += 50; state.player.coins += 100; updateTopBar(); bridge.sendCraigAction('arena_win', { opponent: activeBattle.opponent.name }); } else { alert('Defeat...'); } activeBattle = null; document.getElementById('battle-overlay').classList.add('hidden'); fatalityShown = false; }
    document.getElementById('limit-break-btn').onclick = () => { if (limitMeter >= 100) { limitMeter = 0; updateLimitButton(); if (activeBattle) { activeBattle.opponent.hp -= 80; updateBattleUI(); if (activeBattle.opponent.hp <= 0) endBattle(true); } } };

    // === PARTY UI ===
    function showPartyModal() { const modal = document.getElementById('party-modal'), grid = document.getElementById('party-grid'); grid.innerHTML = ''; state.party.forEach((creature, i) => { const card = document.createElement('div'); card.className = 'party-card'; card.innerHTML = `<div>${creature.name}</div><div>Lv.${creature.level}</div><div>❤️ ${creature.hp}/${creature.maxHp}</div>`; card.onclick = () => alert(`${creature.name}\nHP: ${creature.hp}/${creature.maxHp}\nLevel: ${creature.level}`); grid.appendChild(card); }); modal.classList.remove('hidden'); }
    function closePartyModal() { document.getElementById('party-modal').classList.add('hidden'); }

    // === FORGE MODAL ===
    function showForgeModal() { document.getElementById('forge-modal').classList.remove('hidden'); }
    function closeForgeModal() { document.getElementById('forge-modal').classList.add('hidden'); }
    document.getElementById('forge-confirm').onclick = () => { const name = document.getElementById('soul-name').value || 'New Soul'; const profit = parseInt(document.getElementById('plt-profit').value); const love = parseInt(document.getElementById('plt-love').value); const tax = parseInt(document.getElementById('plt-tax').value); const soul = { id: Date.now(), name, plt: { profit, love, tax }, type: 'hybrid', level: 1, xp: 0, hp: 50, maxHp: 50, attack: 5, defense: 5 }; state.souls.push(soul); if (state.party.length < 6) state.party.push(soul); else state.storage.push(soul); bridge.sendCraigAction('forge', { name, plt: soul.plt }); alert(`Soul ${name} forged!`); closeForgeModal(); };

    // === HABITAT MODAL ===
    function showHabitatModal() { const container = document.getElementById('habitat-souls'); container.innerHTML = ''; state.party.forEach(soul => { const div = document.createElement('div'); div.innerHTML = `<b>${soul.name}</b> Lv.${soul.level} <br>❤️ ${soul.hp}/${soul.maxHp}`; container.appendChild(div); }); document.getElementById('habitat-modal').classList.remove('hidden'); }
    function closeHabitatModal() { document.getElementById('habitat-modal').classList.add('hidden'); }

    // === ARENA ===
    function startRandomBattle() { const randomCreature = { name: `Wild ${['Spirit','Golem','Sprite'][Math.floor(Math.random()*3)]}`, hp: 50 + Math.random() * 30, maxHp: 80, attack: 8 + Math.random() * 7, defense: 5 + Math.random() * 5, plt: ['profit','love','tax'][Math.floor(Math.random()*3)] }; startBattle(randomCreature); }

    // === UI HELPERS ===
    function updateTopBar() { document.getElementById('player-hp').innerText = state.player.hp; document.getElementById('player-maxhp').innerText = state.player.maxHp; document.getElementById('player-level').innerText = state.player.level; document.getElementById('player-coins').innerText = state.player.coins; }

    // === CONTEXT PROMPT ===
    function showContextPrompt(text, callback) { const promptDiv = document.getElementById('context-prompt'); promptDiv.innerHTML = `<span>${text}</span><div class="progress-ring"></div>`; promptDiv.classList.remove('hidden'); let startTime; const onTouchStart = () => { startTime = Date.now(); }; const onTouchEnd = () => { const duration = Date.now() - startTime; if (duration > 800) callback(); promptDiv.classList.add('hidden'); promptDiv.removeEventListener('touchstart', onTouchStart); promptDiv.removeEventListener('touchend', onTouchEnd); }; promptDiv.addEventListener('touchstart', onTouchStart); promptDiv.addEventListener('touchend', onTouchEnd); }
    setInterval(() => { if (!activeBattle && Math.random() < 0.1) { showContextPrompt('Hold to enter home', () => alert('Entering home...')); } }, 10000);

    // === ACTION WHEEL ===
    const actionWheel = document.getElementById('action-wheel'), wheelOptions = actionWheel.querySelector('.wheel-options');
    function showActionWheel(actions, centerX, centerY) { wheelOptions.innerHTML = ''; const angleStep = (2 * Math.PI) / actions.length; actions.forEach((action, idx) => { const angle = idx * angleStep; const x = 90 + 60 * Math.cos(angle), y = 90 + 60 * Math.sin(angle); const btn = document.createElement('div'); btn.className = 'wheel-option'; btn.style.left = `${x - 30}px`; btn.style.top = `${y - 30}px`; btn.innerHTML = `<span>${action.icon}</span><span style="font-size:12px">${action.label}</span>`; btn.onclick = () => { action.callback(); actionWheel.classList.add('hidden'); }; wheelOptions.appendChild(btn); }); actionWheel.style.left = `${centerX - 90}px`; actionWheel.style.top = `${centerY - 90}px`; actionWheel.classList.remove('hidden'); }
    let longPressTimer; const canvas = document.getElementById('game-canvas');
    canvas.addEventListener('touchstart', (e) => { longPressTimer = setTimeout(() => { const touch = e.touches[0]; showActionWheel([{ icon: '🗺️', label: 'Map', callback: () => alert('World map') }, { icon: '🐾', label: 'Party', callback: showPartyModal }, { icon: '🏠', label: 'Camp', callback: showHabitatModal }, { icon: '⚔️', label: 'Fight', callback: startRandomBattle }], touch.clientX, touch.clientY); }, 500); });
    canvas.addEventListener('touchend', () => clearTimeout(longPressTimer));

    // === BOTTOM BAR ===
    document.getElementById('forge-btn').onclick = showForgeModal;
    document.getElementById('habitat-btn').onclick = showHabitatModal;
    document.getElementById('arena-btn').onclick = startRandomBattle;
    document.getElementById('collector-btn').onclick = showPartyModal;
    document.getElementById('menu-btn').onclick = () => alert('Settings / More');

    // === SAVE/LOAD ===
    function saveGame() { localStorage.setItem('soulverse_state', JSON.stringify(state)); }
    function loadGame() { const saved = localStorage.getItem('soulverse_state'); if (saved) { try { const parsed = JSON.parse(saved); state = { ...state, ...parsed }; state.souls = parsed.souls || []; state.party = parsed.party || []; state.storage = parsed.storage || []; updateTopBar(); } catch(e) { console.warn(e); } } }
    window.addEventListener('beforeunload', saveGame);

    // === START ===
    initThree(); loadGame(); updateTopBar(); console.log('🌌 Soulverse Unified ready');
  </script>
</body>
</html>
