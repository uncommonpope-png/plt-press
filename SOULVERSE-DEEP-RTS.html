<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚔️ SOULVERSE – Deep RTS Expansion | PLT Press</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body { background:#000; overflow:hidden; font-family:'Courier New', monospace; }
        canvas { display:block; width:100%; height:100%; }
        #ui {
            position:absolute; bottom:20px; left:20px; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
            border-radius:12px; padding:8px 12px; color:#ffaa66; font-size:11px; pointer-events:none; z-index:10;
        }
        #top-bar {
            position:absolute; top:20px; left:0; right:0; display:flex; justify-content:center; gap:12px;
            z-index:30; pointer-events:auto; flex-wrap:wrap;
        }
        .top-btn {
            background:#ffaa66; border:none; color:#000; font-weight:bold; padding:8px 18px; border-radius:30px;
            cursor:pointer; font-family:monospace; transition:0.2s;
        }
        .top-btn:hover { transform:scale(1.02); box-shadow:0 0 12px #ffaa66; }
        #resources {
            position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.6); border-radius:12px;
            padding:8px 12px; color:#ffaa66; font-size:11px; text-align:right; pointer-events:none; z-index:10;
        }
        #selection-panel {
            position:absolute; bottom:100px; left:20px; background:rgba(0,0,0,0.6); border-radius:12px;
            padding:6px 12px; font-size:10px; pointer-events:none; z-index:20;
        }
        #building-menu {
            position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8);
            backdrop-filter:blur(8px); border-radius:20px; padding:8px; display:flex; gap:8px; flex-wrap:wrap;
            justify-content:center; z-index:40; pointer-events:auto;
        }
        .build-btn {
            background:#2a2a3a; border:1px solid #ffaa66; color:#ffaa66; padding:6px 12px; border-radius:20px;
            cursor:pointer; font-size:10px;
        }
        .build-btn:hover { background:#ffaa66; color:#000; }
        #tech-tree-panel {
            position:absolute; top:80px; left:20px; background:rgba(0,0,0,0.8); backdrop-filter:blur(12px);
            border-radius:16px; padding:12px; width:280px; display:none; z-index:50; pointer-events:auto;
        }
        .close-panel { float:right; background:none; border:none; color:#ffaa66; cursor:pointer; }
        .modal {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9);
            backdrop-filter:blur(16px); border:2px solid #ffaa66; border-radius:24px; padding:20px; z-index:200;
            display:none; pointer-events:auto; min-width:300px; max-width:90vw; max-height:80vh; overflow-y:auto; text-align:center;
        }
        .modal button { margin:5px; padding:8px 16px; background:#ffaa66; border:none; border-radius:30px; font-weight:bold; cursor:pointer; }
        .modal-close { float:right; background:none; border:none; color:#ffaa66; font-size:20px; cursor:pointer; }
        .selection-rect {
            position:absolute; border:1px solid #ffaa66; background:rgba(255,170,102,0.2); pointer-events:none; z-index:100;
        }
        #minimap {
            position:absolute; bottom:20px; right:20px; width:200px; height:200px; background:rgba(0,0,0,0.5);
            border:2px solid #ffaa66; border-radius:8px; pointer-events:none; z-index:60;
        }
        @media (max-width:768px) {
            .top-btn { padding:6px 12px; font-size:10px; }
            #building-menu .build-btn { padding:4px 8px; font-size:8px; }
            #minimap { width:120px; height:120px; }
        }
    </style>
</head>
<body>
    <div id="ui">⚔️ SOULVERSE – Deep RTS Expansion</div>
    <div id="top-bar">
        <button id="techTreeBtn" class="top-btn">📜 Tech Tree</button>
        <button id="villageBtn" class="top-btn">🏘️ Village</button>
        <button id="pantheonBtn" class="top-btn">🏛️ Pantheon</button>
        <button id="arenaBtn" class="top-btn">⚔️ Arena</button>
        <button id="metaverseBtn" class="top-btn">🌐 Metaverse</button>
    </div>
    <div id="resources">
        💰 Profit: <span id="profitVal">500</span><br>
        ❤️ Love: <span id="loveVal">500</span><br>
        ⚖️ Tax: <span id="taxVal">500</span>
    </div>
    <div id="selection-panel">Selected: none</div>
    <div id="building-menu">
        <button class="build-btn" data-building="townhall">🏛️ Town Hall (200)</button>
        <button class="build-btn" data-building="forge">⚒️ Forge (150)</button>
        <button class="build-btn" data-building="market">🏪 Market (120)</button>
        <button class="build-btn" data-building="barracks">🏚️ Barracks (180)</button>
        <button class="build-btn" data-building="farm">🌾 Farm (100)</button>
        <button class="build-btn" data-building="wall">🧱 Wall (50)</button>
        <button class="build-btn" data-building="tower">🗼 Tower (200)</button>
        <button class="build-btn" data-building="blacksmith">🔨 Blacksmith (250)</button>
        <button class="build-btn" data-building="magetower">✨ Mage Tower (300)</button>
    </div>
    <div id="tech-tree-panel">
        <button class="close-panel" id="closeTechTree">&times;</button>
        <h3>Tech Tree</h3>
        <div id="techTreeContent"></div>
    </div>
    <div id="minimap"><canvas id="minimapCanvas" width="200" height="200" style="width:100%; height:100%;"></canvas></div>

    <div id="villageModal" class="modal">
        <button class="modal-close" id="closeVillageModal">&times;</button>
        <h3 id="villageTitle">Village</h3>
        <div id="villageContent"></div>
        <button id="closeVillage">Close</button>
    </div>
    <div id="pantheonModal" class="modal">
        <button class="modal-close" id="closePantheonModal">&times;</button>
        <h3>Pantheon</h3>
        <div id="pantheonContent"></div>
        <button id="closePantheon">Close</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const QUALITY = {
            0: { terrainSegments:32, shadows:false, grassCount:300, treeCount:15, resourceCount:20 },
            1: { terrainSegments:64, shadows:true, grassCount:800, treeCount:30, resourceCount:50 },
            2: { terrainSegments:128, shadows:true, grassCount:2000, treeCount:60, resourceCount:100 }
        };
        let currentQuality = 1;
        function detectQuality() { return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ? 0 : 1; }
        currentQuality = detectQuality();

        let scene, camera, renderer, controls;
        let terrain;
        let playerUnits = [], playerBuildings = [];
        let enemyUnits = [], enemyBuildings = [];
        let resources = [];
        let selectedUnits = new Set();
        let shiftPressed = false;
        let buildingMode = false;
        let buildingType = null;
        let ghostBuilding = null;
        let playerResources = { profit:500, love:500, tax:500 };
        let techs = { forge:false, market:false, barracks:false, farm:false, blacksmith:false, magetower:false };
        let upgrades = { meleeDamage:0, rangedDamage:0, armor:0, attackSpeed:0 };
        let enemyAI = { attackCooldown:0, buildCooldown:0, expansionCooldown:0 };
        let villages = [];
        let minimapCtx = null;

        function getHeight(x, z) {
            let h = 0;
            h += Math.sin(x * 0.12) * Math.cos(z * 0.12) * 1.0;
            h += Math.sin(x * 0.3) * 0.5;
            h += Math.cos(z * 0.3) * 0.5;
            h += Math.sin(x * 0.7 + z * 0.5) * 0.3;
            h += Math.max(0, Math.sin(x * 0.5) * Math.cos(z * 0.5) - 0.3) * 1.2;
            return Math.max(0.2, h + 1.6);
        }

        function generateTerrain() {
            const preset = QUALITY[currentQuality];
            const geometry = new THREE.PlaneGeometry(160, 160, preset.terrainSegments, preset.terrainSegments);
            geometry.rotateX(-Math.PI/2);
            const positions = geometry.attributes.position.array;
            for (let i = 0; i < positions.length/3; i++) {
                const x = positions[i*3];
                const z = positions[i*3+2];
                positions[i*3+1] = getHeight(x, z);
            }
            geometry.computeVertexNormals();
            const material = new THREE.MeshStandardMaterial({ color: 0x7c9c5e, roughness: 0.7, metalness: 0.1 });
            return new THREE.Mesh(geometry, material);
        }

        function createMeleeCharacter(type, isEnemy = false) {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: type==='profit'?0xffaa44 : type==='love'?0xff88aa : 0x88aaff, metalness:0.5 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.45, 0.8, 8), bodyMat);
            body.position.y = 0.4;
            group.add(body);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xddbb99 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), headMat);
            head.position.y = 0.85;
            group.add(head);
            const crestMat = new THREE.MeshStandardMaterial({ color: 0xffaa44 });
            const crest = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.3, 4), crestMat);
            crest.position.y = 1.05;
            group.add(crest);
            const padMat = new THREE.MeshStandardMaterial({ color: 0xccaa88 });
            const leftPad = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.4), padMat);
            leftPad.position.set(-0.55, 0.7, 0);
            const rightPad = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.4), padMat);
            rightPad.position.set(0.55, 0.7, 0);
            group.add(leftPad);
            group.add(rightPad);
            const armMat = new THREE.MeshStandardMaterial({ color: 0xccaa88 });
            const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.6, 6), armMat);
            leftArm.position.set(-0.5, 0.65, 0);
            leftArm.rotation.z = 0.3;
            const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.6, 6), armMat);
            rightArm.position.set(0.5, 0.65, 0);
            rightArm.rotation.z = -0.3;
            group.add(leftArm);
            group.add(rightArm);
            const weaponMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, metalness:0.8 });
            const hilt = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.1), weaponMat);
            hilt.position.set(0.6, 0.65, 0.2);
            const blade = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.1, 0.6, 4), weaponMat);
            blade.position.set(0.6, 0.95, 0.2);
            group.add(hilt);
            group.add(blade);
            if (isEnemy) { group.traverse(c => { if (c.isMesh) c.material.color.multiplyScalar(0.7); }); }
            return group;
        }

        function createRangedCharacter(type, isEnemy = false) {
            const group = createMeleeCharacter(type, isEnemy);
            const weaponMat = new THREE.MeshStandardMaterial({ color: 0xccaa88 });
            const bow = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.05, 8, 20), weaponMat);
            bow.rotation.x = Math.PI/2;
            bow.position.set(0.6, 0.7, 0.2);
            group.add(bow);
            group.children = group.children.filter(c => !(c.position.x > 0.5 && (c.geometry.type === 'CylinderGeometry' || c.geometry.type === 'BoxGeometry' && c.scale.y>1)));
            return group;
        }

        class RTSUnit {
            constructor(id, name, type, x, z, isEnemy = false, isRanged = false) {
                this.id = id; this.name = name; this.type = type; this.isEnemy = isEnemy; this.isRanged = isRanged;
                this.x = x; this.z = z; this.health = 100; this.maxHealth = 100;
                this.damage = 10 + (type==='profit'?upgrades.meleeDamage : upgrades.rangedDamage);
                this.armor = upgrades.armor; this.speed = 3;
                this.attackRange = isRanged ? 5 : 1.5;
                this.attackCooldownMax = 1.0 / (1 + upgrades.attackSpeed*0.2);
                this.state = 'idle'; this.targetPos = null; this.targetUnit = null; this.targetBuilding = null;
                this.path = []; this.attackCooldown = 0; this.gatherAmount = 0;
                this.model = null; this.healthBar = null; this.animTime = 0; this.armAngle = 0;
                this.updatePosition();
            }
            updatePosition() {
                if (this.model) {
                    const y = getHeight(this.x, this.z) + 0.5;
                    this.model.position.set(this.x, y, this.z);
                    if (this.healthBar) this.healthBar.position.copy(this.model.position);
                }
            }
            update(delta) {
                this.animTime += delta * 5;
                if (this.attackCooldown > 0) this.attackCooldown -= delta;
                if (this.state === 'move') this.armAngle = Math.sin(this.animTime) * 0.8;
                else if (this.state === 'attack') this.armAngle = Math.sin(this.animTime * 10) * 0.5;
                else this.armAngle *= 0.9;
                this.updateArmAngles();

                if (this.isEnemy && this.state === 'idle') {
                    let nearest = null, minDist = Infinity;
                    for (let u of playerUnits) { let d = Math.hypot(u.x - this.x, u.z - this.z); if (d < minDist) { minDist = d; nearest = u; } }
                    if (!nearest) { for (let b of playerBuildings) { let d = Math.hypot(b.x - this.x, b.z - this.z); if (d < minDist) { minDist = d; nearest = b; } } }
                    if (nearest && minDist < 20) this.giveOrder('attack', nearest);
                    else if (Math.random() < 0.02) { let angle = Math.random() * Math.PI * 2; let rad = 10 + Math.random() * 15; this.giveOrder('move', {x: this.x + Math.cos(angle)*rad, z: this.z + Math.sin(angle)*rad}); }
                }

                if (this.state === 'move' && this.targetPos) {
                    if (this.path.length === 0) this.path = aStar({x:this.x, z:this.z}, this.targetPos, this.isEnemy);
                    if (this.path.length > 0) {
                        let next = this.path[0];
                        let dx = next.x - this.x, dz = next.z - this.z;
                        let dist = Math.hypot(dx, dz);
                        if (dist < 0.2) this.path.shift();
                        else { let move = Math.min(this.speed * delta, dist); let angle = Math.atan2(dz, dx); this.x += Math.cos(angle) * move; this.z += Math.sin(angle) * move; this.updatePosition(); }
                    }
                    if (this.path.length === 0) this.state = 'idle';
                } else if (this.state === 'attack' && this.targetUnit && this.targetUnit.health > 0) {
                    let dx = this.targetUnit.x - this.x, dz = this.targetUnit.z - this.z;
                    let dist = Math.hypot(dx, dz);
                    if (dist > this.attackRange) { this.targetPos = {x:this.targetUnit.x, z:this.targetUnit.z}; this.state = 'move'; this.path = []; }
                    else {
                        if (this.attackCooldown <= 0) {
                            let damage = Math.max(1, this.damage - this.targetUnit.armor);
                            this.targetUnit.health -= damage;
                            this.attackCooldown = this.attackCooldownMax;
                            if (this.isRanged) createProjectile(this, this.targetUnit);
                            else createHitEffect(this.targetUnit);
                            if (this.targetUnit.health <= 0) { this.targetUnit.destroy(); this.state = 'idle'; this.targetUnit = null; }
                            else if (this.targetUnit.healthBar) this.targetUnit.healthBar.scale.x = this.targetUnit.health / this.targetUnit.maxHealth;
                        }
                    }
                } else if (this.state === 'gather') {
                    if (!this.targetPos) {
                        let nearest = null, minDist = Infinity;
                        for (let r of resources) { let d = Math.hypot(r.position.x - this.x, r.position.z - this.z); if (d < minDist) { minDist = d; nearest = r; } }
                        if (nearest) { this.targetPos = {x:nearest.position.x, z:nearest.position.z}; this.state = 'move'; this.path = []; }
                    } else {
                        if (this.state === 'move') {
                            let dist = Math.hypot(this.targetPos.x - this.x, this.targetPos.z - this.z);
                            if (dist < 1.0) {
                                let resourceNode = resources.find(r => Math.hypot(r.position.x-this.x, r.position.z-this.z) < 1.0);
                                if (resourceNode) {
                                    let type = resourceNode.userData.type;
                                    if (type === 'profit') this.gatherAmount += 5;
                                    else if (type === 'love') this.gatherAmount += 5;
                                    else if (type === 'tax') this.gatherAmount += 5;
                                    scene.remove(resourceNode); resources.splice(resources.indexOf(resourceNode),1);
                                    let townHall = playerBuildings.find(b => b.type === 'townhall');
                                    if (townHall) { this.targetPos = {x:townHall.x, z:townHall.z}; this.state = 'move'; this.path = []; }
                                    else this.state = 'idle';
                                }
                            }
                        } else {
                            let townHall = playerBuildings.find(b => b.type === 'townhall');
                            if (townHall && Math.hypot(townHall.x - this.x, townHall.z - this.z) < 1.5) {
                                if (this.gatherAmount > 0) {
                                    playerResources.profit += this.gatherAmount; playerResources.love += this.gatherAmount; playerResources.tax += this.gatherAmount;
                                    this.gatherAmount = 0; updateUI();
                                }
                                this.state = 'idle'; this.targetPos = null;
                            }
                        }
                    }
                }
            }
            updateArmAngles() {
                if (!this.model) return;
                let leftArm = this.model.children.find(c => c.position.x < 0 && (c.geometry.type === 'CylinderGeometry' || c.geometry.type === 'BoxGeometry'));
                let rightArm = this.model.children.find(c => c.position.x > 0 && (c.geometry.type === 'CylinderGeometry' || c.geometry.type === 'BoxGeometry'));
                if (leftArm) leftArm.rotation.z = 0.3 + this.armAngle * 0.5;
                if (rightArm) rightArm.rotation.z = -0.3 - this.armAngle * 0.5;
            }
            giveOrder(type, target) {
                if (type === 'move') { this.targetPos = target; this.state = 'move'; this.path = []; this.targetUnit = null; }
                else if (type === 'attack') { this.targetUnit = target; this.state = 'attack'; this.targetPos = null; }
                else if (type === 'gather') { this.targetBuilding = target; this.state = 'gather'; this.targetPos = null; }
            }
            destroy() {
                scene.remove(this.model);
                if (this.healthBar) scene.remove(this.healthBar);
                if (this.isEnemy) enemyUnits = enemyUnits.filter(u => u !== this);
                else { playerUnits = playerUnits.filter(u => u !== this); selectedUnits.delete(this); updateSelectionDisplay(); }
            }
        }

        function createProjectile(source, target) {
            const start = source.model.position.clone(), end = target.model.position.clone();
            const particle = new THREE.Mesh(new THREE.SphereGeometry(0.08, 4, 4), new THREE.MeshStandardMaterial({ color: 0xffaa66 }));
            particle.position.copy(start); scene.add(particle);
            let t = 0;
            const animate = () => { t += 0.05; if (t >= 1) { scene.remove(particle); return; } particle.position.lerpVectors(start, end, t); requestAnimationFrame(animate); };
            animate();
        }

        function createHitEffect(unit) {
            const spark = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4, 4), new THREE.MeshStandardMaterial({ color: 0xff8866, emissive:0xff4422 }));
            spark.position.copy(unit.model.position); scene.add(spark);
            setTimeout(() => scene.remove(spark), 200);
        }

        class Building {
            constructor(type, x, z, isEnemy = false) {
                this.type = type; this.x = x; this.z = z; this.isEnemy = isEnemy; this.size = 1.5;
                this.health = 500; this.maxHealth = 500; this.mesh = null; this.underConstruction = true;
                this.constructionProgress = 0; this.requiredWork = 100; this.completed = false;
                this.productionQueue = []; this.productionTimer = 0; this.attackCooldown = 0;
            }
            update(delta) {
                if (!this.completed && this.underConstruction) {
                    this.constructionProgress += delta * 20;
                    if (this.constructionProgress >= this.requiredWork) {
                        this.completed = true; this.underConstruction = false;
                        if (this.type === 'forge' && !this.isEnemy) techs.forge = true;
                        if (this.type === 'market' && !this.isEnemy) techs.market = true;
                        if (this.type === 'barracks' && !this.isEnemy) techs.barracks = true;
                        if (this.type === 'farm' && !this.isEnemy) techs.farm = true;
                        if (this.type === 'blacksmith' && !this.isEnemy) techs.blacksmith = true;
                        if (this.type === 'magetower' && !this.isEnemy) techs.magetower = true;
                        if (this.mesh) this.mesh.material.color.setHex(0x88aa66);
                    }
                }
                if (this.completed && this.type === 'barracks' && !this.isEnemy && this.productionQueue.length > 0) {
                    this.productionTimer += delta;
                    if (this.productionTimer >= 3.0) {
                        this.productionTimer = 0;
                        let unitType = this.productionQueue.shift();
                        let newUnit = createUnit(unitType, this.x + (Math.random()-0.5)*2, this.z + (Math.random()-0.5)*2, false, unitType.ranged);
                        newUnit.giveOrder('move', {x:this.x+1, z:this.z+1});
                    }
                }
                if (this.completed && this.type === 'farm' && !this.isEnemy) {
                    this.productionTimer += delta;
                    if (this.productionTimer >= 5.0) { this.productionTimer = 0; playerResources.profit += 10; playerResources.love += 10; playerResources.tax += 10; updateUI(); }
                }
                if (this.completed && this.type === 'tower' && !this.isEnemy) {
                    this.attackCooldown -= delta;
                    if (this.attackCooldown <= 0) {
                        let closest = null, minDist = Infinity;
                        for (let u of enemyUnits) { let d = Math.hypot(u.x - this.x, u.z - this.z); if (d < minDist && d < 8) { minDist = d; closest = u; } }
                        if (closest) { closest.health -= 20; this.attackCooldown = 1.0; if (closest.health <= 0) closest.destroy(); else if (closest.healthBar) closest.healthBar.scale.x = closest.health / closest.maxHealth; }
                    }
                }
            }
            addToQueue(unitType, isRanged = false) {
                if (!this.completed || this.isEnemy) return false;
                let cost = 50;
                if (playerResources.profit >= cost && playerResources.love >= cost && playerResources.tax >= cost) {
                    playerResources.profit -= cost; playerResources.love -= cost; playerResources.tax -= cost;
                    this.productionQueue.push({type:unitType, ranged:isRanged}); updateUI(); return true;
                }
                return false;
            }
            destroy() { scene.remove(this.mesh); if (this.isEnemy) enemyBuildings = enemyBuildings.filter(b => b !== this); else playerBuildings = playerBuildings.filter(b => b !== this); }
        }

        const GRID_SIZE = 0.5;
        function getNeighbors(x, z, isEnemy) {
            let neighbors = [];
            for (let dx = -1; dx<=1; dx++) { for (let dz = -1; dz<=1; dz++) {
                if (dx===0 && dz===0) continue;
                let nx = x + dx*GRID_SIZE, nz = z + dz*GRID_SIZE;
                let walkable = true;
                let buildings = isEnemy ? enemyBuildings : playerBuildings;
                for (let b of buildings) { if (Math.abs(b.x - nx) < b.size/2 && Math.abs(b.z - nz) < b.size/2) walkable = false; }
                if (walkable && Math.abs(nx)<80 && Math.abs(nz)<80) neighbors.push({x:nx, z:nz, cost:1});
            }}
            return neighbors;
        }
        function aStar(start, goal, isEnemy = false) {
            let openSet = [{x:start.x, z:start.z, g:0, h:Math.hypot(start.x-goal.x, start.z-goal.z), f:Math.hypot(start.x-goal.x, start.z-goal.z), parent:null}];
            let closedSet = new Set();
            while (openSet.length) {
                openSet.sort((a,b)=>a.f-b.f); let current = openSet.shift();
                let key = `${Math.floor(current.x/GRID_SIZE)},${Math.floor(current.z/GRID_SIZE)}`;
                if (closedSet.has(key)) continue;
                if (Math.hypot(current.x-goal.x, current.z-goal.z) < 0.8) { let path = []; let cur = current; while (cur) { path.unshift({x:cur.x, z:cur.z}); cur = cur.parent; } return path; }
                closedSet.add(key);
                let neighbors = getNeighbors(current.x, current.z, isEnemy);
                for (let nb of neighbors) {
                    let newKey = `${Math.floor(nb.x/GRID_SIZE)},${Math.floor(nb.z/GRID_SIZE)}`;
                    if (closedSet.has(newKey)) continue;
                    let g = current.g + nb.cost, h = Math.hypot(nb.x-goal.x, nb.z-goal.z), f = g + h;
                    let existing = openSet.find(n => n.x===nb.x && n.z===nb.z);
                    if (!existing || g < existing.g) openSet.push({x:nb.x, z:nb.z, g, h, f, parent:current});
                }
            }
            return [];
        }

        function createUnit(type, x, z, isEnemy = false, isRanged = false) {
            const model = isRanged ? createRangedCharacter(type, isEnemy) : createMeleeCharacter(type, isEnemy);
            const y = getHeight(x, z) + 0.5; model.position.set(x, y, z); model.castShadow = true; scene.add(model);
            const barGeo = new THREE.BoxGeometry(0.8, 0.1, 0.1), barMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
            const healthBar = new THREE.Mesh(barGeo, barMat); model.add(healthBar); healthBar.position.y = 0.9;
            const unit = new RTSUnit(Date.now()+Math.random(), `Soul`, type, x, z, isEnemy, isRanged);
            unit.model = model; unit.healthBar = healthBar;
            (isEnemy ? enemyUnits : playerUnits).push(unit); return unit;
        }

        function createBuilding(type, x, z, isEnemy = false) {
            const building = new Building(type, x, z, isEnemy);
            const colors = { townhall:0xaa8866, forge:0xcc8844, market:0x88aa66, barracks:0x8866aa, farm:0x6a994e, wall:0xaaaaaa, tower:0xaa8866, blacksmith:0x886633, magetower:0x6688aa };
            const material = new THREE.MeshStandardMaterial({ color: colors[type] || 0xaaaaaa });
            let mesh;
            if (type === 'wall') mesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.0, 0.3), material);
            else if (type === 'tower') mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 1.5, 6), material);
            else if (type === 'blacksmith') mesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.0, 1.5), material);
            else if (type === 'magetower') mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.9, 1.8, 8), material);
            else mesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.2, 1.5), material);
            mesh.position.set(x, getHeight(x,z)+ (type==='tower'?0.8:0.6), z); mesh.castShadow = true; scene.add(mesh);
            building.mesh = mesh; (isEnemy ? enemyBuildings : playerBuildings).push(building); return building;
        }

        function addResources() {
            const goldMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 });
            const loveMat = new THREE.MeshStandardMaterial({ color: 0xff88aa, emissive: 0x441122 });
            const taxMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x224466 });
            for (let i = 0; i < QUALITY[currentQuality].resourceCount; i++) {
                const x = (Math.random() - 0.5) * 130, z = (Math.random() - 0.5) * 130, y = getHeight(x, z) + 0.1;
                const r = Math.random(); let mesh, mat, type;
                if (r < 0.33) { mat = goldMat; mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.18, 0), mat); type = 'profit'; }
                else if (r < 0.66) { mat = loveMat; mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(0.16), mat); type = 'love'; }
                else { mat = taxMat; mesh = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.3, 5), mat); type = 'tax'; }
                mesh.position.set(x, y, z); mesh.userData = { type, value: 5 }; mesh.castShadow = true; scene.add(mesh); resources.push(mesh);
            }
        }

        function addVegetation() {
            const preset = QUALITY[currentQuality], grassMat = new THREE.MeshStandardMaterial({ color: 0x6a994e });
            for (let i = 0; i < preset.grassCount; i++) {
                const x = (Math.random() - 0.5) * 140, z = (Math.random() - 0.5) * 140, y = getHeight(x, z);
                if (y > 0.5 && y < 3.5 && Math.abs(x) < 70 && Math.abs(z) < 70) {
                    const blade = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.1, 0.2, 3), grassMat);
                    blade.position.set(x, y, z); blade.castShadow = true; scene.add(blade);
                }
            }
        }

        function addTrees() {
            const preset = QUALITY[currentQuality], trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B }), foliageMat = new THREE.MeshStandardMaterial({ color: 0x5a8f4c });
            for (let i = 0; i < preset.treeCount; i++) {
                const x = (Math.random() - 0.5) * 130, z = (Math.random() - 0.5) * 130, y = getHeight(x, z);
                if (y > 0.8 && y < 3.0 && Math.abs(x) < 65 && Math.abs(z) < 65) {
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.8, 4), trunkMat);
                    trunk.position.set(x, y, z); trunk.castShadow = true; scene.add(trunk);
                    const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.65, 1.0, 6), foliageMat);
                    foliage.position.set(x, y + 0.7, z); foliage.castShadow = true; scene.add(foliage);
                }
            }
        }

        function updateEnemyAI(delta) {
            enemyAI.attackCooldown -= delta; enemyAI.buildCooldown -= delta;
            if (enemyAI.buildCooldown <= 0 && enemyBuildings.length < 8 && playerResources.profit > 200) {
                let townHall = enemyBuildings.find(b => b.type === 'townhall');
                if (townHall) { let angle = Math.random() * Math.PI * 2, rad = 3 + Math.random() * 3; let nx = townHall.x + Math.cos(angle) * rad, nz = townHall.z + Math.sin(angle) * rad; let type = ['barracks','forge','market','farm','blacksmith','magetower'][Math.floor(Math.random()*6)]; createBuilding(type, nx, nz, true); enemyAI.buildCooldown = 15; }
            }
            if (enemyAI.attackCooldown <= 0 && enemyUnits.length > 4) {
                let target = playerBuildings[0]; if (target) { for (let u of enemyUnits) u.giveOrder('attack', target); }
                enemyAI.attackCooldown = 20;
            }
        }

        function createVillage(soulsList, centerX, centerZ) { villages.push({ souls: soulsList, center: {x:centerX, z:centerZ}, buildings: playerBuildings.filter(b => Math.hypot(b.x-centerX, b.z-centerZ) < 10) }); }
        function showVillage(village) { const modal = document.getElementById('villageModal'); document.getElementById('villageContent').innerHTML = `<p>Souls: ${village.souls.length}</p><p>Buildings: ${village.buildings.length}</p>`; modal.style.display = 'block'; }
        function updateUI() { document.getElementById('profitVal').textContent = Math.floor(playerResources.profit); document.getElementById('loveVal').textContent = Math.floor(playerResources.love); document.getElementById('taxVal').textContent = Math.floor(playerResources.tax); }
        function updateSelectionDisplay() { const panel = document.getElementById('selection-panel'); if (selectedUnits.size === 0) panel.textContent = 'Selected: none'; else { let arr = Array.from(selectedUnits); panel.textContent = `Selected: ${arr.length} unit(s) - ${arr[0].name} (${Math.floor(arr[0].health)} HP)`; } }
        function updateTechTreeUI() {
            const container = document.getElementById('techTreeContent');
            container.innerHTML = `<div>Forge: ${techs.forge ? '✅' : '🔒'}</div><div>Market: ${techs.market ? '✅' : '🔒'}</div><div>Barracks: ${techs.barracks ? '✅' : '🔒'}</div><div>Farm: ${techs.farm ? '✅' : '🔒'}</div><div>Blacksmith: ${techs.blacksmith ? '✅' : '🔒'}</div><div>Mage Tower: ${techs.magetower ? '✅' : '🔒'}</div><button id="trainMeleeBtn" ${!techs.barracks ? 'disabled' : ''}>Train Melee (50)</button><button id="trainRangedBtn" ${!techs.barracks ? 'disabled' : ''}>Train Ranged (50)</button><button id="upgradeMeleeBtn" ${!techs.blacksmith ? 'disabled' : ''}>Upgrade Melee Damage (100)</button><button id="upgradeRangedBtn" ${!techs.magetower ? 'disabled' : ''}>Upgrade Ranged Damage (100)</button><button id="upgradeArmorBtn" ${!techs.blacksmith ? 'disabled' : ''}>Upgrade Armor (100)</button><button id="upgradeSpeedBtn" ${!techs.magetower ? 'disabled' : ''}>Upgrade Attack Speed (100)</button>`;
            document.getElementById('trainMeleeBtn')?.addEventListener('click', () => { let barracks = playerBuildings.find(b => b.type === 'barracks'); if (barracks) barracks.addToQueue('profit', false); else alert("Build Barracks first!"); });
            document.getElementById('trainRangedBtn')?.addEventListener('click', () => { let barracks = playerBuildings.find(b => b.type === 'barracks'); if (barracks) barracks.addToQueue('profit', true); else alert("Build Barracks first!"); });
            document.getElementById('upgradeMeleeBtn')?.addEventListener('click', () => { if (playerResources.profit>=100 && playerResources.love>=100 && playerResources.tax>=100) { playerResources.profit-=100; playerResources.love-=100; playerResources.tax-=100; upgrades.meleeDamage++; for (let u of playerUnits) if (!u.isRanged) u.damage += 5; updateUI(); updateTechTreeUI(); } else alert("Need 100 of each resource"); });
            document.getElementById('upgradeRangedBtn')?.addEventListener('click', () => { if (playerResources.profit>=100 && playerResources.love>=100 && playerResources.tax>=100) { playerResources.profit-=100; playerResources.love-=100; playerResources.tax-=100; upgrades.rangedDamage++; for (let u of playerUnits) if (u.isRanged) u.damage += 5; updateUI(); updateTechTreeUI(); } });
            document.getElementById('upgradeArmorBtn')?.addEventListener('click', () => { if (playerResources.profit>=100 && playerResources.love>=100 && playerResources.tax>=100) { playerResources.profit-=100; playerResources.love-=100; playerResources.tax-=100; upgrades.armor++; for (let u of playerUnits) u.armor++; updateUI(); updateTechTreeUI(); } });
            document.getElementById('upgradeSpeedBtn')?.addEventListener('click', () => { if (playerResources.profit>=100 && playerResources.love>=100 && playerResources.tax>=100) { playerResources.profit-=100; playerResources.love-=100; playerResources.tax-=100; upgrades.attackSpeed++; for (let u of playerUnits) u.attackCooldownMax = 1.0 / (1 + upgrades.attackSpeed*0.2); updateUI(); updateTechTreeUI(); } });
        }

        function updateMinimap() {
            if (!minimapCtx) return;
            minimapCtx.fillStyle = 'rgba(0,0,0,0.8)'; minimapCtx.fillRect(0, 0, 200, 200);
            const scale = 200 / 160; const offset = 100;
            for (let b of playerBuildings) { minimapCtx.fillStyle = '#44ff44'; minimapCtx.fillRect(b.x*scale+offset, b.z*scale+offset, 3, 3); }
            for (let b of enemyBuildings) { minimapCtx.fillStyle = '#ff4444'; minimapCtx.fillRect(b.x*scale+offset, b.z*scale+offset, 3, 3); }
            for (let u of playerUnits) { minimapCtx.fillStyle = '#44aaff'; minimapCtx.fillRect(u.x*scale+offset, u.z*scale+offset, 2, 2); }
            for (let u of enemyUnits) { minimapCtx.fillStyle = '#ff8844'; minimapCtx.fillRect(u.x*scale+offset, u.z*scale+offset, 2, 2); }
        }

        let raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
        let dragStart = null, selectionRectActive = false, selectionRectElem = null;

        function onMouseDown(event) {
            if (buildingMode) {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(terrain);
                if (intersects.length > 0) {
                    let point = intersects[0].point;
                    let cost = { townhall:200, forge:150, market:120, barracks:180, farm:100, wall:50, tower:200, blacksmith:250, magetower:300 }[buildingType];
                    if (playerResources.profit >= cost && playerResources.love >= cost && playerResources.tax >= cost) {
                        playerResources.profit -= cost; playerResources.love -= cost; playerResources.tax -= cost;
                        createBuilding(buildingType, point.x, point.z, false); updateUI();
                    } else alert("Not enough resources!");
                }
                buildingMode = false; if (ghostBuilding) scene.remove(ghostBuilding); ghostBuilding = null; return;
            }
            dragStart = { x: event.clientX, y: event.clientY }; selectionRectActive = true;
            if (!selectionRectElem) { selectionRectElem = document.createElement('div'); selectionRectElem.className = 'selection-rect'; document.body.appendChild(selectionRectElem); }
        }
        function onMouseMove(event) {
            if (!selectionRectActive) return;
            let left = Math.min(dragStart.x, event.clientX), top = Math.min(dragStart.y, event.clientY);
            let width = Math.abs(event.clientX - dragStart.x), height = Math.abs(event.clientY - dragStart.y);
            selectionRectElem.style.left = left + 'px'; selectionRectElem.style.top = top + 'px';
            selectionRectElem.style.width = width + 'px'; selectionRectElem.style.height = height + 'px';
            selectionRectElem.style.display = 'block';
        }
        function onMouseUp(event) {
            if (!selectionRectActive) {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(playerUnits.map(u => u.model));
                if (intersects.length > 0) { let unit = playerUnits.find(u => u.model === intersects[0].object); if (unit) { if (!shiftPressed) selectedUnits.clear(); selectedUnits.add(unit); } else if (!shiftPressed) selectedUnits.clear(); }
                else if (!shiftPressed) selectedUnits.clear();
                updateSelectionDisplay(); selectionRectActive = false; if (selectionRectElem) selectionRectElem.style.display = 'none'; return;
            }
            let minX = Math.min(dragStart.x, event.clientX), maxX = Math.max(dragStart.x, event.clientX);
            let minY = Math.min(dragStart.y, event.clientY), maxY = Math.max(dragStart.y, event.clientY);
            const rect = renderer.domElement.getBoundingClientRect(); const width = rect.width, height = rect.height;
            let newSelection = new Set();
            for (let unit of playerUnits) {
                let screenPos = unit.model.position.clone().project(camera);
                let x = (screenPos.x * 0.5 + 0.5) * width + rect.left, y = (-screenPos.y * 0.5 + 0.5) * height + rect.top;
                if (x >= minX && x <= maxX && y >= minY && y <= maxY) newSelection.add(unit);
            }
            if (!shiftPressed) selectedUnits.clear(); for (let u of newSelection) selectedUnits.add(u);
            updateSelectionDisplay(); selectionRectActive = false; if (selectionRectElem) selectionRectElem.style.display = 'none';
        }
        function onRightClick(event) {
            event.preventDefault(); if (selectedUnits.size === 0) return;
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            let intersects = raycaster.intersectObjects(enemyUnits.map(u => u.model));
            if (intersects.length > 0) { let targetUnit = enemyUnits.find(u => u.model === intersects[0].object); if (targetUnit) { for (let u of selectedUnits) u.giveOrder('attack', targetUnit); return; } }
            intersects = raycaster.intersectObjects(resources);
            if (intersects.length > 0) { for (let u of selectedUnits) u.giveOrder('gather', intersects[0].object); return; }
            intersects = raycaster.intersectObject(terrain);
            if (intersects.length > 0) { let point = intersects[0].point; for (let u of selectedUnits) u.giveOrder('move', {x:point.x, z:point.z}); }
        }
        function startBuilding(type) {
            buildingMode = true; buildingType = type;
            if (ghostBuilding) scene.remove(ghostBuilding);
            const geometry = new THREE.BoxGeometry(1.5, 1.2, 1.5), material = new THREE.MeshStandardMaterial({ color: 0x88ff88, transparent: true, opacity: 0.5 });
            ghostBuilding = new THREE.Mesh(geometry, material); scene.add(ghostBuilding);
            const onMouseMoveGhost = (e) => { const rect = renderer.domElement.getBoundingClientRect(); mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1; mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1; raycaster.setFromCamera(mouse, camera); const intersects = raycaster.intersectObject(terrain); if (intersects.length) { let point = intersects[0].point; ghostBuilding.position.set(point.x, getHeight(point.x, point.z)+0.6, point.z); } };
            renderer.domElement.addEventListener('mousemove', onMouseMoveGhost);
            const finishBuilding = () => { renderer.domElement.removeEventListener('mousemove', onMouseMoveGhost); document.removeEventListener('click', finishBuilding); };
            document.addEventListener('click', finishBuilding, { once: true });
        }
        function showPantheon() { const modal = document.getElementById('pantheonModal'); document.getElementById('pantheonContent').innerHTML = `<h4>Gods of the Soulverse</h4><p>💰 Profit - God of Leverage</p><p>❤️ Love - Goddess of Connection</p><p>⚖️ Tax - Keeper of Balance</p>`; modal.style.display = 'block'; }

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200); camera.position.set(0, 12, 18);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = QUALITY[currentQuality].shadows;
            document.body.appendChild(renderer.domElement);
            controls = new OrbitControls(camera, renderer.domElement); controls.enableZoom = true; controls.enablePan = true; controls.enableRotate = true; controls.target.set(0,0,0);

            const ambient = new THREE.AmbientLight(0x404060, 0.6); scene.add(ambient);
            const sunLight = new THREE.DirectionalLight(0xffdd99, 0.8); sunLight.position.set(10, 15, 5); if (QUALITY[currentQuality].shadows) sunLight.castShadow = true; scene.add(sunLight);
            const fillLight = new THREE.PointLight(0xccaa88, 0.4); fillLight.position.set(0, 3, 0); scene.add(fillLight);

            terrain = generateTerrain(); scene.add(terrain); addVegetation(); addTrees(); addResources();

            createUnit('profit', -2, -2, false, false); createUnit('love', 2, -1, false, false); createUnit('tax', -1, 2, false, true);
            createBuilding('townhall', 0, 0, false);
            createUnit('profit', 30, 30, true, false); createUnit('love', 32, 31, true, false); createUnit('tax', 31, 32, true, true);
            createBuilding('townhall', 30, 30, true); createBuilding('barracks', 32, 32, true);
            createVillage(playerUnits.slice(0,3), 0, 0);

            minimapCtx = document.getElementById('minimapCanvas').getContext('2d'); setInterval(updateMinimap, 500);

            renderer.domElement.addEventListener('mousedown', onMouseDown); renderer.domElement.addEventListener('mousemove', onMouseMove); renderer.domElement.addEventListener('mouseup', onMouseUp); renderer.domElement.addEventListener('contextmenu', onRightClick);
            window.addEventListener('keydown', (e) => { if (e.shiftKey) shiftPressed = true; });
            window.addEventListener('keyup', (e) => { if (e.key === 'Shift') shiftPressed = false; });

            document.getElementById('techTreeBtn').onclick = () => { let panel = document.getElementById('tech-tree-panel'); panel.style.display = panel.style.display === 'none' ? 'block' : 'none'; updateTechTreeUI(); };
            document.getElementById('closeTechTree').onclick = () => document.getElementById('tech-tree-panel').style.display = 'none';
            document.querySelectorAll('.build-btn').forEach(btn => btn.addEventListener('click', () => startBuilding(btn.dataset.building)));
            document.getElementById('villageBtn').onclick = () => { if (villages.length) showVillage(villages[0]); else alert("No villages yet."); };
            document.getElementById('pantheonBtn').onclick = showPantheon;
            document.getElementById('closePantheonModal').onclick = () => document.getElementById('pantheonModal').style.display = 'none';
            document.getElementById('closePantheon').onclick = () => document.getElementById('pantheonModal').style.display = 'none';
            document.getElementById('closeVillageModal').onclick = () => document.getElementById('villageModal').style.display = 'none';
            document.getElementById('closeVillage').onclick = () => document.getElementById('villageModal').style.display = 'none';
            document.getElementById('arenaBtn').onclick = () => alert("Arena coming soon");
            document.getElementById('metaverseBtn').onclick = () => alert("Metaverse coming soon");

            updateUI();
            let lastFrame = performance.now();
            function animate() { let now = performance.now(); let delta = Math.min(0.033, (now - lastFrame) / 1000); lastFrame = now;
                for (let u of playerUnits) u.update(delta); for (let u of enemyUnits) u.update(delta);
                for (let b of playerBuildings) b.update(delta); for (let b of enemyBuildings) b.update(delta);
                updateEnemyAI(delta); renderer.render(scene, camera); requestAnimationFrame(animate);
            }
            animate();
        }
        init();
    </script>
</body>
