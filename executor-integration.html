<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚡ SOUL EXECUTOR — Souls That Work | PLT Press</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at 30% 20%, #0a0a2a 0%, #010105 100%); color: #e8d8b0; font-family: 'Orbitron', 'Courier New', monospace; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 40px 20px; border-bottom: 2px solid #ffaa44; margin-bottom: 30px; }
        h1 { font-size: 2.5rem; background: linear-gradient(135deg, #ffaa44, #ff88aa, #88aaff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .soul-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .soul-card { background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid rgba(255,170,68,0.3); overflow: hidden; transition: all 0.3s; }
        .soul-card:hover { transform: translateY(-4px); border-color: #ffaa44; }
        .soul-header { background: rgba(255,170,68,0.1); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .soul-name { font-size: 20px; font-weight: bold; color: #ffaa66; }
        .soul-energy { font-size: 12px; background: #2a2a3a; padding: 4px 12px; border-radius: 20px; }
        .soul-skills { padding: 15px; display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid rgba(255,170,68,0.2); }
        .skill-tag { background: rgba(255,170,68,0.1); border: 1px solid #ffaa44; border-radius: 20px; padding: 4px 12px; font-size: 10px; }
        .task-area { padding: 15px; }
        .task-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,170,68,0.3); border-radius: 16px; padding: 10px; color: #ffdd99; font-family: monospace; margin-bottom: 10px; }
        .execute-btn { background: linear-gradient(135deg, #ffaa44, #ff8844); border: none; color: #0a0a1a; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; }
        .output-area { background: rgba(0,0,0,0.4); border-radius: 16px; padding: 12px; margin-top: 12px; font-size: 11px; font-family: monospace; max-height: 150px; overflow-y: auto; white-space: pre-wrap; }
        .queue-panel { background: rgba(0,0,0,0.5); border-radius: 24px; padding: 20px; margin-top: 20px; border: 1px solid rgba(255,170,68,0.2); }
        .queue-item { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 12px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .api-config { background: rgba(0,0,0,0.5); border-radius: 20px; padding: 20px; margin-top: 20px; border: 1px solid #88aaff; }
        .api-input { background: rgba(0,0,0,0.5); border: 1px solid #88aaff; border-radius: 40px; padding: 10px 20px; width: 100%; color: #ffdd99; font-family: monospace; margin-top: 10px; }
        footer { text-align: center; padding: 30px; font-size: 10px; color: #665533; border-top: 1px solid rgba(255,170,68,0.2); margin-top: 40px; }
        /* Nav */
        .nav-bar { display: flex; align-items: center; padding: 12px 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,170,68,0.2); position: sticky; top: 0; z-index: 100; }
        .nav-back { background: rgba(255,170,68,0.1); border: 1px solid rgba(255,170,68,0.4); border-radius: 30px; padding: 6px 16px; font-size: 12px; cursor: pointer; color: #ffaa44; transition: background 0.2s; font-family: monospace; }
        .nav-back:hover { background: rgba(255,170,68,0.25); }
        .nav-title { flex: 1; text-align: center; font-size: 13px; color: #886644; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-back" onclick="window.location.href='index.html'">← HOME</button>
        <span class="nav-title">⚡ PLT PRESS</span>
        <span style="width:80px;"></span>
    </div>
    <div class="container">
        <div class="header"><h1>⚡ SOUL EXECUTOR</h1><p>Souls that work — code, calendar, business, API</p></div>
        <div class="api-config">
            <h3 style="color:#88aaff;">🔑 API CONFIGURATION (Optional)</h3>
            <p style="font-size:11px;">Add OpenAI API key for real AI-powered responses. Leave blank for demo mode.</p>
            <input type="password" id="apiKeyInput" class="api-input" placeholder="sk-... (OpenAI API Key)">
            <button id="saveApiKey" style="margin-top:10px;background:#88aaff;border:none;padding:8px 20px;border-radius:30px;cursor:pointer;">💾 Save Key</button>
        </div>
        <div class="soul-grid" id="soulGrid"></div>
        <div class="queue-panel"><h3 style="color:#ffaa66;">📋 TASK QUEUE</h3><div id="queueContainer"></div></div>
        <footer>⚡ PLT PRESS — Profit · Love · Tax ⚡<br>Your souls work for you. Code. Research. Manage.</footer>
    </div>
    <script>
        let souls = [], taskQueue = [], apiKey = localStorage.getItem('openai_api_key') || '';
        function loadSouls() {
            const saved = localStorage.getItem('soulforge_souls');
            if (saved) { souls = JSON.parse(saved); }
            else {
                souls = [
                    { id: 'soul_1', name: 'Profit Prime', type: 'profit', personality: 'Cold, strategic.', plt: { profit: 0.92, love: 0.18, tax: 0.68 }, energy: 85, skills: ['code', 'strategize', 'analyze'] },
                    { id: 'soul_2', name: 'Love Weaver', type: 'love', personality: 'Warm, magnetic.', plt: { profit: 0.28, love: 0.91, tax: 0.45 }, energy: 92, skills: ['write', 'teach', 'design'] },
                    { id: 'soul_3', name: 'Tax Collector', type: 'tax', personality: 'Precise, calm.', plt: { profit: 0.48, love: 0.22, tax: 0.94 }, energy: 78, skills: ['analyze', 'strategize', 'research'] },
                    { id: 'soul_4', name: 'Harvester', type: 'profit', personality: 'Sharp, quick.', plt: { profit: 0.82, love: 0.45, tax: 0.58 }, energy: 88, skills: ['research', 'analyze', 'code'] }
                ];
                saveSouls();
            }
            renderSoulGrid(); loadQueue();
        }
        function saveSouls() { localStorage.setItem('soulforge_souls', JSON.stringify(souls)); }
        function addTask(soulId, task, input) {
            taskQueue.push({ id: Date.now(), soulId, task, input, status: 'pending', output: null, createdAt: Date.now() });
            saveQueue(); renderQueue(); processQueue();
        }
        function saveQueue() { localStorage.setItem('soul_executor_queue', JSON.stringify(taskQueue)); }
        function loadQueue() { const saved = localStorage.getItem('soul_executor_queue'); if (saved) taskQueue = JSON.parse(saved); renderQueue(); }
        async function processQueue() { const pending = taskQueue.filter(t => t.status === 'pending'); for (const task of pending) { await executeTask(task); } }
        async function executeTask(task) {
            const soul = souls.find(s => s.id === task.soulId); if (!soul) return;
            task.status = 'processing'; saveQueue(); renderQueue();
            if (soul.energy < 10) { task.status = 'failed'; task.output = `${soul.name} is too tired. Rest in Habitat.`; saveQueue(); renderQueue(); return; }
            let result;
            try {
                if (task.task === 'code') result = await executeCode(soul, task.input);
                else if (task.task === 'write') result = await executeWrite(soul, task.input);
                else if (task.task === 'research') result = await executeResearch(soul, task.input);
                else if (task.task === 'analyze') result = await executeAnalyze(soul, task.input);
                else if (task.task === 'strategize') result = await executeStrategize(soul, task.input);
                else result = { output: `${soul.name}: I can help with code, write, research, analyze, or strategize.`, energyCost: 2 };
                soul.energy = Math.max(0, soul.energy - result.energyCost); saveSouls();
                task.status = 'completed'; task.output = result.output; task.completedAt = Date.now();
            } catch (err) { task.status = 'failed'; task.output = `Error: ${err.message}`; }
            saveQueue(); renderQueue(); renderSoulGrid();
        }
        async function callAI(prompt, soul) {
            if (apiKey && apiKey.startsWith('sk-')) {
                try {
                    const response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({ model: 'gpt-4-turbo-preview', messages: [{ role: 'system', content: `You are ${soul.name}, a ${soul.type} soul. Respond in character.` }, { role: 'user', content: prompt }], max_tokens: 500 })
                    });
                    const data = await response.json(); return data.choices[0].message.content;
                } catch(e) { console.warn('API error'); return null; }
            }
            return null;
        }
        async function executeCode(soul, prompt) {
            const aiResponse = await callAI(`Write code for: ${prompt}. Return only code.`, soul);
            if (aiResponse) return { output: aiResponse, energyCost: 8 };
            const pltStyle = soul.plt.profit > 0.6 ? "profit-optimized" : soul.plt.love > 0.6 ? "user-friendly" : "efficient";
            return { output: `// Code by ${soul.name} (${pltStyle})\nfunction solve(input) {\n  const profit = input * ${soul.plt.profit.toFixed(2)};\n  const love = input * ${soul.plt.love.toFixed(2)};\n  const tax = input * ${soul.plt.tax.toFixed(2)};\n  return { profit, love, tax };\n}\nmodule.exports = { solve };`, energyCost: 5 };
        }
        async function executeWrite(soul, topic) {
            const aiResponse = await callAI(`Write about: ${topic}`, soul);
            if (aiResponse) return { output: aiResponse, energyCost: 6 };
            return { output: `# ${topic}\n\n*By ${soul.name}*\n\nProfit: ${soul.plt.profit > 0.5 ? 'Growth opportunity' : 'Consider value'}\nLove: ${soul.plt.love > 0.5 ? 'Community matters' : 'Focus on utility'}\nTax: ${soul.plt.tax > 0.5 ? 'Account for cost' : 'Risk manageable'}`, energyCost: 3 };
        }
        async function executeResearch(soul, query) {
            const aiResponse = await callAI(`Research: ${query}. 3 bullet points.`, soul);
            if (aiResponse) return { output: aiResponse, energyCost: 6 };
            return { output: `🔍 RESEARCH: "${query}"\n\nFindings from ${soul.name}:\n- ${soul.type === 'profit' ? 'Market: $47B TAM' : soul.type === 'love' ? 'Sentiment: 82% positive' : 'Risk: Low'}\n- Next: ${soul.name} recommends deeper analysis.`, energyCost: 4 };
        }
        async function executeAnalyze(soul, data) {
            return { output: `📊 ANALYSIS by ${soul.name}\n\nData: ${data}\n\nPLT:\n- Profit: ${(soul.plt.profit*100).toFixed(0)}/100\n- Love: ${(soul.plt.love*100).toFixed(0)}/100\n- Tax: ${(soul.plt.tax*100).toFixed(0)}/100\n\nRecommendation: ${soul.plt.profit > 0.6 ? 'Accelerate' : soul.plt.love > 0.6 ? 'Nurture' : 'Balance'}`, energyCost: 6 };
        }
        async function executeStrategize(soul, goal) {
            return { output: `♟️ STRATEGY by ${soul.name}\n\nGoal: ${goal}\n\n1. ${soul.plt.profit > 0.5 ? 'Maximize returns' : 'Build foundation'}\n2. ${soul.plt.love > 0.5 ? 'Engage community' : 'Focus execution'}\n3. ${soul.plt.tax > 0.5 ? 'Account for risks' : 'Move with agility'}\n\nExpected: ${soul.type === 'profit' ? '2x growth' : soul.type === 'love' ? '80% retention' : '15% efficiency'}`, energyCost: 7 };
        }
        function renderSoulGrid() {
            document.getElementById('soulGrid').innerHTML = souls.map(soul => `
                <div class="soul-card"><div class="soul-header"><span class="soul-name">${soul.name}</span><span class="soul-energy">⚡ ${Math.floor(soul.energy)}%</span></div>
                <div class="soul-skills">${soul.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
                <div class="task-area"><select id="taskType_${soul.id}" class="task-input"><option value="code">💻 Write Code</option><option value="write">📝 Write Content</option><option value="research">🔍 Research</option><option value="analyze">📊 Analyze</option><option value="strategize">♟️ Strategize</option></select>
                <input type="text" id="taskInput_${soul.id}" class="task-input" placeholder="What should ${soul.name} do?"><button class="execute-btn" onclick="queueTask('${soul.id}')">⚡ EXECUTE</button>
                <div class="output-area" id="output_${soul.id}">Ready to work.</div></div></div>`).join('');
        }
        window.queueTask = function(soulId) {
            const taskType = document.getElementById(`taskType_${soulId}`).value;
            const taskInput = document.getElementById(`taskInput_${soulId}`).value;
            if (!taskInput.trim()) { alert('Enter a task description.'); return; }
            addTask(soulId, taskType, taskInput);
            document.getElementById(`taskInput_${soulId}`).value = '';
            document.getElementById(`output_${soulId}`).innerHTML = '⏳ Queued...';
        };
        function renderQueue() {
            const pending = taskQueue.filter(t => t.status !== 'completed').slice(0, 10);
            const completed = taskQueue.filter(t => t.status === 'completed').slice(-5);
            document.getElementById('queueContainer').innerHTML = `
                <h4>⏳ PENDING / PROCESSING (${pending.length})</h4>
                ${pending.map(t => `<div class="queue-item"><div><strong>${souls.find(s => s.id === t.soulId)?.name || '?'}</strong> — ${t.task}: ${t.input.substring(0, 40)}...</div><span style="color: ${t.status === 'processing' ? '#ffaa44' : '#88aaff'}">${t.status}</span></div>`).join('') || '<div>No pending tasks</div>'}
                <h4 style="margin-top:15px;">✅ COMPLETED (${completed.length})</h4>
                ${completed.map(t => `<div class="queue-item"><div><strong>${souls.find(s => s.id === t.soulId)?.name || '?'}</strong> — ${t.task}</div><span style="color:#88ff88;">done</span></div>`).join('') || '<div>No completed tasks</div>'}`;
            for (const task of taskQueue) {
                if (task.status === 'completed') {
                    const outputDiv = document.getElementById(`output_${task.soulId}`);
                    if (outputDiv && task.output) outputDiv.innerHTML = `<span style="color:#88ffaa;">✓</span><br>${task.output.substring(0, 200)}${task.output.length > 200 ? '...' : ''}`;
                }
            }
        }
        document.getElementById('saveApiKey').addEventListener('click', () => {
            const key = document.getElementById('apiKeyInput').value;
            if (key.trim()) { apiKey = key.trim(); localStorage.setItem('openai_api_key', apiKey); alert('API key saved. Souls will use real AI.'); }
            else { localStorage.removeItem('openai_api_key'); apiKey = ''; alert('API key removed. Using demo mode.'); }
        });
        document.getElementById('apiKeyInput').value = apiKey;
        setInterval(() => { processQueue(); renderSoulGrid(); }, 3000);
        loadSouls();
    </script>
</body>
</html>
