    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }</script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        const QUALITY = { 0: { terrainSegments:32, shadows:false, grassCount:200, treeCount:10, resourceCount:15 }, 1: { terrainSegments:48, shadows:true, grassCount:400, treeCount:20, resourceCount:25 }, 2: { terrainSegments:64, shadows:true, grassCount:600, treeCount:30, resourceCount:35 } };
        let currentQuality = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ? 0 : 1;
        let scene, camera, renderer, controls;
        let terrain;
        let playerUnits = [], playerBuildings = [];
        let enemyUnits = [], enemyBuildings = [];
        let neutralCreeps = [];
        let resources = [];
        let selectedUnits = new Set();
        let shiftPressed = false;

        let soundEnabled = false;

        let fogGrid = null, exploredGrid = null;
        const MAP_SIZE = 160, FOG_CELLS = 40;
        let cellSize = MAP_SIZE / FOG_CELLS;
        let currentOrderType = 'move';

        function getHeight(x, z) { let h = 0; h += Math.sin(x * 0.12) * Math.cos(z * 0.12) * 1.0; h += Math.sin(x * 0.3) * 0.5; h += Math.cos(z * 0.3) * 0.5; h += Math.sin(x * 0.7 + z * 0.5) * 0.3; h += Math.max(0, Math.sin(x * 0.5) * Math.cos(z * 0.5) - 0.3) * 1.2; return Math.max(0.2, h + 1.6); }
        function initFog() { fogGrid = Array(FOG_CELLS).fill().map(() => Array(FOG_CELLS).fill(false)); exploredGrid = Array(FOG_CELLS).fill().map(() => Array(FOG_CELLS).fill(false)); }
        function updateFog(cx, cz) { let ix = Math.floor((cx + MAP_SIZE/2) / cellSize); let iz = Math.floor((cz + MAP_SIZE/2) / cellSize); for (let dx = -2; dx <= 2; dx++) { for (let dz = -2; dz <= 2; dz++) { let x = ix+dx, z = iz+dz; if (x>=0 && x<FOG_CELLS && z>=0 && z<FOG_CELLS) { fogGrid[x][z] = true; exploredGrid[x][z] = true; } } } }
        function isVisible(x, z) { let ix = Math.floor((x + MAP_SIZE/2) / cellSize); let iz = Math.floor((z + MAP_SIZE/2) / cellSize); if (ix<0 || ix>=FOG_CELLS || iz<0 || iz>=FOG_CELLS) return false; return fogGrid[ix][iz]; }
        function playSound(type) { if (!soundEnabled || !audioCtx) return; const now = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; if (type === 'select') { osc.frequency.value = 440; gain.gain.value = 0.1; osc.start(); osc.stop(now+0.1); } if (type === 'attack') { osc.frequency.value = 220; gain.gain.value = 0.15; osc.start(); osc.stop(now+0.2); } if (type === 'build') { osc.frequency.value = 880; gain.gain.value = 0.1; osc.start(); osc.stop(now+0.15); } }

        class RTSUnit {
            constructor(id, name, type, x, z, isEnemy = false, isRanged = false, isHero = false) {
                this.id = id; this.name = name; this.type = type; this.isEnemy = isEnemy; this.isRanged = isRanged; this.isHero = isHero;
                this.x = x; this.z = z; this.health = isHero ? 200 : 100; this.maxHealth = this.health;
                this.damage = (isHero ? 25 : 10) + (type==='profit'?upgrades.meleeDamage : upgrades.rangedDamage);
                this.armor = upgrades.armor; this.speed = 3;
                this.attackRange = isRanged ? 5 : 1.5;
                this.attackCooldownMax = 1.0 / (1 + upgrades.attackSpeed*0.2);
                this.state = 'idle'; this.targetPos = null; this.targetUnit = null; this.targetBuilding = null;
                this.path = []; this.attackCooldown = 0; this.gatherAmount = 0;
                this.model = null; this.healthBar = null; this.animTime = 0; this.armAngle = 0; this.abilityCooldown = 0;
                this.updatePosition();
            }
            updatePosition() { if (this.model) { const y = getHeight(this.x, this.z) + 0.5; this.model.position.set(this.x, y, this.z); if (this.healthBar) this.healthBar.position.copy(this.model.position); } }
            update(delta) {
                this.animTime += delta * 5;
                if (this.attackCooldown > 0) this.attackCooldown -= delta;
                if (this.abilityCooldown > 0) this.abilityCooldown -= delta;
                if (this.state === 'move') this.armAngle = Math.sin(this.animTime) * 0.8;
                else if (this.state === 'attack') this.armAngle = Math.sin(this.animTime * 10) * 0.5;
                else this.armAngle *= 0.9;
                this.updateArmAngles();
                if (this.isHero && this.state === 'attack' && this.targetUnit && this.abilityCooldown <= 0 && Math.random() < 0.1) this.castAbility();
                if (this.isEnemy && this.state === 'idle') {
                    let nearest = null, minDist = Infinity;
                    for (let u of playerUnits) { let d = Math.hypot(u.x - this.x, u.z - this.z); if (d < minDist) { minDist = d; nearest = u; } }
                    if (!nearest) { for (let b of playerBuildings) { let d = Math.hypot(b.x - this.x, b.z - this.z); if (d < minDist) { minDist = d; nearest = b; } } }
                    if (nearest && minDist < 20) this.giveOrder('attack', nearest);
                    else if (Math.random() < 0.02) { let angle = Math.random() * Math.PI * 2; let rad = 10 + Math.random() * 15; this.giveOrder('move', {x: this.x + Math.cos(angle)*rad, z: this.z + Math.sin(angle)*rad}); }
                }
                if (this.state === 'move' && this.targetPos) {
                    if (this.path.length === 0) this.path = aStar({x:this.x, z:this.z}, this.targetPos, this.isEnemy);
                    if (this.path.length > 0) { let next = this.path[0]; let dx = next.x - this.x, dz = next.z - this.z; let dist = Math.hypot(dx, dz); if (dist < 0.2) this.path.shift(); else { let move = Math.min(this.speed * delta, dist); let angle = Math.atan2(dz, dx); this.x += Math.cos(angle) * move; this.z += Math.sin(angle) * move; this.updatePosition(); } }
                    if (this.path.length === 0) this.state = 'idle';
                } else if (this.state === 'attack' && this.targetUnit && this.targetUnit.health > 0) {
                    let dx = this.targetUnit.x - this.x, dz = this.targetUnit.z - this.z; let dist = Math.hypot(dx, dz);
                    if (dist > this.attackRange) { this.targetPos = {x:this.targetUnit.x, z:this.targetUnit.z}; this.state = 'move'; this.path = []; }
                    else { if (this.attackCooldown <= 0) { let damage = Math.max(1, this.damage - this.targetUnit.armor); this.targetUnit.health -= damage; this.attackCooldown = this.attackCooldownMax; if (this.isRanged) createProjectile(this, this.targetUnit); else createHitEffect(this.targetUnit); if (this.targetUnit.health <= 0) { this.targetUnit.destroy(); this.state = 'idle'; this.targetUnit = null; } else if (this.targetUnit.healthBar) this.targetUnit.healthBar.scale.x = this.targetUnit.health / this.targetUnit.maxHealth; } }
                } else if (this.state === 'gather') {
                    if (!this.targetPos) { let nearest = null, minDist = Infinity; for (let r of resources) { let d = Math.hypot(r.position.x - this.x, r.position.z - this.z); if (d < minDist) { minDist = d; nearest = r; } } if (nearest) { this.targetPos = {x:nearest.position.x, z:nearest.position.z}; this.state = 'move'; this.path = []; } }
                    else { if (this.state === 'move') { let dist = Math.hypot(this.targetPos.x - this.x, this.targetPos.z - this.z); if (dist < 1.0) { let resourceNode = resources.find(r => Math.hypot(r.position.x-this.x, r.position.z-this.z) < 1.0); if (resourceNode) { let type = resourceNode.userData.type; if (type === 'profit') this.gatherAmount += 5; else if (type === 'love') this.gatherAmount += 5; else if (type === 'tax') this.gatherAmount += 5; scene.remove(resourceNode); resources.splice(resources.indexOf(resourceNode),1); let townHall = playerBuildings.find(b => b.type === 'townhall'); if (townHall) { this.targetPos = {x:townHall.x, z:townHall.z}; this.state = 'move'; this.path = []; } else this.state = 'idle'; } } } else { let townHall = playerBuildings.find(b => b.type === 'townhall'); if (townHall && Math.hypot(townHall.x - this.x, townHall.z - this.z) < 1.5) { if (this.gatherAmount > 0) { playerResources.profit += this.gatherAmount; playerResources.love += this.gatherAmount; playerResources.tax += this.gatherAmount; this.gatherAmount = 0; updateUI(); } this.state = 'idle'; this.targetPos = null; } } }
                }
            }
            updateArmAngles() { if (!this.model) return; let leftArm = this.model.children.find(c => c.position.x < 0); let rightArm = this.model.children.find(c => c.position.x > 0); if (leftArm) leftArm.rotation.z = 0.3 + this.armAngle * 0.5; if (rightArm) rightArm.rotation.z = -0.3 - this.armAngle * 0.5; }
            castAbility() {
                if (this.name === 'Profit Prime') { playerResources.profit += 50; playerResources.love += 50; playerResources.tax += 50; updateUI(); playSound('select'); }
                else if (this.name === 'Love Weaver') { for (let u of playerUnits) { if (Math.hypot(u.x - this.x, u.z - this.z) < 8) { u.health = Math.min(u.maxHealth, u.health + 30); if (u.healthBar) u.healthBar.scale.x = u.health / u.maxHealth; } } playSound('select'); }
                else if (this.name === 'Tax Collector') { for (let u of enemyUnits) { if (Math.hypot(u.x - this.x, u.z - this.z) < 5) { playerResources.profit += 10; playerResources.love += 10; playerResources.tax += 10; updateUI(); break; } } playSound('select'); }

            }
            giveOrder(type, target) { if (type === 'move') { this.targetPos = target; this.state = 'move'; this.path = []; this.targetUnit = null; } else if (type === 'attack') { this.targetUnit = target; this.state = 'attack'; this.targetPos = null; } else if (type === 'gather') { this.targetBuilding = target; this.state = 'gather'; this.targetPos = null; } }

        }

        function createProjectile(source, target) { const start = source.model.position.clone(); const end = target.model.position.clone(); const particle = new THREE.Mesh(new THREE.SphereGeometry(0.08, 4, 4), new THREE.MeshStandardMaterial({ color: 0xffaa66 })); particle.position.copy(start); scene.add(particle); let t = 0; const animate = () => { t += 0.05; if (t >= 1) { scene.remove(particle); return; } particle.position.lerpVectors(start, end, t); requestAnimationFrame(animate); }; animate(); }
        function createHitEffect(unit) { const spark = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4, 4), new THREE.MeshStandardMaterial({ color: 0xff8866, emissive:0xff4422 })); spark.position.copy(unit.model.position); scene.add(spark); setTimeout(() => scene.remove(spark), 200); }

        function createHero(type, x, z) {
            const colors = { profit:0xffaa44, love:0xff88aa, tax:0x88aaff };
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.55, 0.9, 8), new THREE.MeshStandardMaterial({ color: colors[type], metalness:0.7 })); body.position.y = 0.45; group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({ color: 0xddbb99 })); head.position.y = 0.95; group.add(head);
            const crown = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.4, 4), new THREE.MeshStandardMaterial({ color: 0xffaa44 })); crown.position.y = 1.2; group.add(crown);
            const cape = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 0.1), new THREE.MeshStandardMaterial({ color: colors[type], emissive:0x442200 })); cape.position.set(0, 0.6, -0.45); group.add(cape);
            const weapon = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.7, 4), new THREE.MeshStandardMaterial({ color: 0xccccdd })); weapon.position.set(0.6, 0.7, 0.2); group.add(weapon);
            const y = getHeight(x, z) + 0.5; group.position.set(x, y, z); group.castShadow = true; scene.add(group);
            const barGeo = new THREE.BoxGeometry(0.8, 0.1, 0.1); const barMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
            const healthBar = new THREE.Mesh(barGeo, barMat); group.add(healthBar); healthBar.position.y = 1.0;
            const unit = new RTSUnit(Date.now(), type==='profit'?'Profit Prime':(type==='love'?'Love Weaver':'Tax Collector'), type, x, z, false, false, true);
            unit.model = group; unit.healthBar = healthBar; playerUnits.push(unit); return unit;
        }

        function spawnCreeps() { for (let i=0; i<5; i++) { const x = (Math.random() - 0.5) * 120; const z = (Math.random() - 0.5) * 120; const y = getHeight(x, z) + 0.5; const group = new THREE.Group(); const body = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshStandardMaterial({ color: 0xaa8866 })); body.position.y = 0.4; group.add(body); const head = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.4, 6), new THREE.MeshStandardMaterial({ color: 0xccaa88 })); head.position.y = 0.85; group.add(head); group.position.set(x, y, z); group.castShadow = true; scene.add(group); const creep = new RTSUnit(Date.now()+i, 'Wild Soul', 'neutral', x, z, true, false, false); creep.model = group; creep.health = 60; creep.maxHealth = 60; creep.damage = 8; const barGeo = new THREE.BoxGeometry(0.6, 0.1, 0.1); const barMat = new THREE.MeshStandardMaterial({ color: 0xff3333 }); const healthBar = new THREE.Mesh(barGeo, barMat); group.add(healthBar); healthBar.position.y = 0.9; creep.healthBar = healthBar; neutralCreeps.push(creep); } }

        function generateTerrain() { const preset = QUALITY[currentQuality]; const geometry = new THREE.PlaneGeometry(160, 160, preset.terrainSegments, preset.terrainSegments); geometry.rotateX(-Math.PI/2); const positions = geometry.attributes.position.array; for (let i = 0; i < positions.length/3; i++) { const x = positions[i*3]; const z = positions[i*3+2]; positions[i*3+1] = getHeight(x, z); } geometry.computeVertexNormals(); const material = new THREE.MeshStandardMaterial({ color: 0x7c9c5e, roughness: 0.7, metalness: 0.1 }); return new THREE.Mesh(geometry, material); }

            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = QUALITY[currentQuality].shadows;
            document.body.appendChild(renderer.domElement);
            controls = new OrbitControls(camera, renderer.domElement); controls.enableZoom = true; controls.enablePan = true; controls.enableRotate = true; controls.target.set(0,0,0);
            const ambient = new THREE.AmbientLight(0x404060, 0.6); scene.add(ambient);
            const sunLight = new THREE.DirectionalLight(0xffdd99, 0.8); sunLight.position.set(10, 15, 5); if (QUALITY[currentQuality].shadows) sunLight.castShadow = true; scene.add(sunLight);
            const fillLight = new THREE.PointLight(0xccaa88, 0.4); fillLight.position.set(0, 3, 0); scene.add(fillLight);
            terrain = generateTerrain(); scene.add(terrain); addVegetation(); addTrees(); addResources(); spawnCreeps();
            createUnit('profit', -2, -2, false, false); createUnit('love', 2, -1, false, false); createUnit('tax', -1, 2, false, true);
            createBuilding('townhall', 0, 0, false);
            createUnit('profit', 30, 30, true, false); createUnit('love', 32, 31, true, false); createUnit('tax', 31, 32, true, true);
            createBuilding('townhall', 30, 30, true); createBuilding('barracks', 32, 32, true);
            createVillage(playerUnits.slice(0,3), 0, 0);
            initFog(); minimapCtx = document.getElementById('minimapCanvas').getContext('2d');
            setInterval(updateMinimap, 200);
            setInterval(() => { for (let u of playerUnits) updateFog(u.x, u.z); for (let b of playerBuildings) updateFog(b.x, b.z); }, 500);
            renderer.domElement.addEventListener('mousedown', onMouseDown); renderer.domElement.addEventListener('mousemove', onMouseMove); renderer.domElement.addEventListener('mouseup', onMouseUp); renderer.domElement.addEventListener('contextmenu', onRightClick);
            window.addEventListener('keydown', (e) => { if (e.shiftKey) shiftPressed = true; });
            window.addEventListener('keyup', (e) => { if (e.key === 'Shift') shiftPressed = false; });
            document.getElementById('techTreeBtn').onclick = () => { let panel = document.getElementById('tech-tree-panel'); panel.style.display = panel.style.display === 'none' ? 'block' : 'none'; updateTechTreeUI(); };
            document.getElementById('closeTechTree').onclick = () => document.getElementById('tech-tree-panel').style.display = 'none';
            document.querySelectorAll('.build-btn').forEach(btn => btn.addEventListener('click', () => startBuilding(btn.dataset.building)));
            document.getElementById('villageBtn').onclick = () => { if (villages.length) showVillage(villages[0]); else alert("No villages yet."); };
            document.getElementById('pantheonBtn').onclick = showPantheon;
            document.getElementById('closePantheonModal').onclick = () => document.getElementById('pantheonModal').style.display = 'none';
            document.getElementById('closePantheon').onclick = () => document.getElementById('pantheonModal').style.display = 'none';
            document.getElementById('closeVillageModal').onclick = () => document.getElementById('villageModal').style.display = 'none';
            document.getElementById('closeVillage').onclick = () => document.getElementById('villageModal').style.display = 'none';
            updateUI();
            let lastFrame = performance.now();
            function animate() { let now = performance.now(); let delta = Math.min(0.033, (now - lastFrame) / 1000); lastFrame = now; for (let u of playerUnits) u.update(delta); for (let u of enemyUnits) u.update(delta); for (let u of neutralCreeps) u.update(delta); for (let b of playerBuildings) b.update(delta); for (let b of enemyBuildings) b.update(delta); updateEnemyAI(delta); renderer.render(scene, camera); requestAnimationFrame(animate); }
            animate();
        }
        init();
    </script>
</body>
</html>
