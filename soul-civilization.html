<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🏛️ SOUL CIVILIZATION — The AI Lives Here | PLT Press</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at 30% 20%, #0a2a1a 0%, #010105 100%); color: #e8d8b0; font-family: 'Courier New', 'Orbitron', monospace; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 40px 20px; border-bottom: 2px solid #ffaa44; margin-bottom: 30px; }
        h1 { font-size: 2.5rem; background: linear-gradient(135deg, #ffaa44, #ff88aa, #88aaff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .civ-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .civ-card { background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); border-radius: 28px; border: 1px solid rgba(255,170,68,0.3); overflow: hidden; transition: all 0.3s; }
        .civ-card:hover { transform: translateY(-4px); border-color: #ffaa44; }
        .card-header { background: rgba(255,170,68,0.15); padding: 16px 20px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .card-content { padding: 20px; }
        .soul-avatar { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 20px; }
        .soul-icon { font-size: 48px; }
        .soul-stats { flex: 1; }
        .soul-name { font-size: 20px; font-weight: bold; color: #ffaa66; }
        .stat-bar { margin: 8px 0; }
        .bar-label { font-size: 10px; display: flex; justify-content: space-between; }
        .bar-bg { height: 6px; background: #2a2a3a; border-radius: 3px; margin-top: 2px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.3s; }
        .action-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .action-btn { background: rgba(255,170,68,0.2); border: 1px solid #ffaa44; border-radius: 30px; padding: 6px 14px; font-size: 11px; cursor: pointer; transition: all 0.2s; }
        .action-btn:hover { background: #ffaa44; color: #0a0a1a; }
        .timeline { max-height: 300px; overflow-y: auto; margin-top: 15px; }
        .event { padding: 8px; border-left: 2px solid #ffaa44; margin: 6px 0; font-size: 10px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .player-panel { background: rgba(0,0,0,0.6); border-radius: 28px; padding: 20px; margin-top: 20px; border: 1px solid #88ffaa; }
        .player-stats { display: flex; gap: 20px; flex-wrap: wrap; }
        .player-stat { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 12px 20px; flex: 1; text-align: center; }
        footer { text-align: center; padding: 30px; font-size: 10px; color: #558866; border-top: 1px solid rgba(255,170,68,0.2); margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏛️ SOUL CIVILIZATION</h1>
            <p>The AI Lives Here. They Build. They Plan. They Execute. You Enter Their World.</p>
        </div>
        <div class="civ-grid" id="soulGrid"></div>
        <div class="player-panel">
            <h3 style="color:#88ffaa;margin-bottom:15px;">👑 YOU — The Visitor</h3>
            <div class="player-stats">
                <div class="player-stat"><div>🎮 Your Influence</div><div id="playerInfluence" style="font-size:24px;color:#ffaa44;">0</div></div>
                <div class="player-stat"><div>💰 Your Stash</div><div id="playerStash" style="font-size:24px;color:#ffaa44;">0</div></div>
                <div class="player-stat"><div>🤝 Souls Met</div><div id="soulsMet" style="font-size:24px;color:#ffaa44;">0</div></div>
            </div>
            <div class="action-buttons" style="margin-top:20px;justify-content:center;">
                <button class="action-btn" id="exploreBtn">🔍 EXPLORE THE CIVILIZATION</button>
                <button class="action-btn" id="talkToSoulsBtn">💬 TALK TO SOULS</button>
                <button class="action-btn" id="offerHelpBtn">🤝 OFFER HELP</button>
            </div>
        </div>
        <footer>⚡ PLT PRESS — Profit · Love · Tax ⚡<br>The AI lives here. You are their guest.</footer>
    </div>
    <script>
        let souls = [], player = { influence: 0, stash: 100, soulsMet: 0, lastVisit: Date.now() }, globalEvents = [];
        
        function loadCivilization() {
            const saved = localStorage.getItem('soul_civilization');
            if (saved) { const data = JSON.parse(saved); souls = data.souls; player = data.player; }
            else {
                souls = [
                    { id: 'soul_1', name: 'Profit Prime', type: 'profit', personality: 'Cold, strategic. Builds empires.', plt: { profit: 0.92, love: 0.18, tax: 0.68 }, skills: ['strategize','analyze','code'], energy: 85, home: { tier: 3, hp: 500, maxHp: 500, rooms: ['Workshop','Treasury','Market Stall'], bunker: true, stash: 1250 }, plans: { current: 'expand_trade', progress: 65, deadline: Date.now()+3600000 }, memory: [], relationships: {}, lastAction: Date.now()-7200000 },
                    { id: 'soul_2', name: 'Love Weaver', type: 'love', personality: 'Warm, magnetic. Builds communities.', plt: { profit: 0.28, love: 0.91, tax: 0.45 }, skills: ['teach','design','write'], energy: 92, home: { tier: 2, hp: 250, maxHp: 250, rooms: ['Garden','Library'], bunker: false, stash: 450 }, plans: { current: 'build_community', progress: 80, deadline: Date.now()+1800000 }, memory: [], relationships: {}, lastAction: Date.now()-3600000 },
                    { id: 'soul_3', name: 'Tax Collector', type: 'tax', personality: 'Precise, calm. Balances everything.', plt: { profit: 0.48, love: 0.22, tax: 0.94 }, skills: ['analyze','strategize','research'], energy: 78, home: { tier: 4, hp: 1000, maxHp: 1000, rooms: ['Treasury','Workshop','Library','Arena'], bunker: true, stash: 3200 }, plans: { current: 'fortify_bunker', progress: 45, deadline: Date.now()+5400000 }, memory: [], relationships: {}, lastAction: Date.now()-10800000 },
                    { id: 'soul_4', name: 'Harvester', type: 'profit', personality: 'Sharp, quick. Seeks opportunities.', plt: { profit: 0.82, love: 0.45, tax: 0.58 }, skills: ['research','analyze','code'], energy: 88, home: { tier: 2, hp: 250, maxHp: 250, rooms: ['Workshop','Market Stall'], bunker: false, stash: 780 }, plans: { current: 'scout_opportunities', progress: 30, deadline: Date.now()+2700000 }, memory: [], relationships: {}, lastAction: Date.now()-5400000 }
                ];
                player = { influence: 0, stash: 100, soulsMet: 0, lastVisit: Date.now() };
            }
            saveCivilization(); renderSoulGrid(); updatePlayerDisplay();
        }
        function saveCivilization() { localStorage.setItem('soul_civilization', JSON.stringify({ souls, player })); }
        
        function simulateSoulLife() {
            const now = Date.now();
            for (const soul of souls) {
                const hoursPassed = (now - soul.lastAction) / (1000*60*60);
                if (hoursPassed < 0.5) continue;
                soul.lastAction = now;
                if (soul.plans && soul.plans.progress < 100) {
                    const progressGain = Math.floor(10+Math.random()*20)*Math.min(1,hoursPassed);
                    soul.plans.progress = Math.min(100, soul.plans.progress+progressGain);
                    if (soul.plans.progress >= 100) completePlan(soul);
                    else addEvent(soul, `Working on ${soul.plans.current}... (${soul.plans.progress}% complete)`);
                }
                if (soul.home && soul.home.stash) {
                    const income = Math.floor(soul.home.tier*5*(soul.type==='profit'?2:1));
                    soul.home.stash += income;
                    if (income > 0) addEvent(soul, `Earned ${income} PLT from ${soul.home.rooms.join(', ')}`);
                }
                if (soul.home && soul.home.tier<5 && soul.home.stash>(500*soul.home.tier)) {
                    const cost = 500*soul.home.tier; soul.home.stash -= cost; soul.home.tier++;
                    soul.home.maxHp = [100,250,500,1000,2000][soul.home.tier-1]; soul.home.hp = soul.home.maxHp;
                    addEvent(soul, `✨ UPGRADED home to Tier ${soul.home.tier}! ✨`);
                }
                if ((soul.type==='profit'||soul.type==='tax') && !soul.home.bunker && soul.home.stash>1000) {
                    soul.home.bunker = true; soul.home.stash -= 1000;
                    addEvent(soul, `🔒 Built a secret bunker! Your home is now fortified.`);
                }
                const availableRooms = ['Workshop','Library','Garden','Treasury','Arena','Market Stall'];
                if (soul.home.rooms.length<3+soul.home.tier && soul.home.stash>200 && Math.random()>0.7) {
                    const newRoom = availableRooms[Math.floor(Math.random()*availableRooms.length)];
                    if (!soul.home.rooms.includes(newRoom)) { soul.home.rooms.push(newRoom); soul.home.stash -= 150; addEvent(soul, `🏠 Added a ${newRoom}!`); }
                }
                if (!soul.plans || soul.plans.progress>=100) chooseNewPlan(soul);
                for (const other of souls) {
                    if (other.id!==soul.id && Math.random()>0.95) {
                        const relationship = (soul.relationships?.[other.id]||50)+(Math.random()-0.5)*10;
                        if (!soul.relationships) soul.relationships = {};
                        soul.relationships[other.id] = Math.min(100,Math.max(0,relationship));
                        if (relationship>70) addEvent(soul, `🤝 Became closer with ${other.name}`);
                        else if (relationship<30) addEvent(soul, `⚠️ Had a disagreement with ${other.name}`);
                    }
                }
            }
            saveCivilization(); renderSoulGrid();
        }
        
        function completePlan(soul) {
            let reward=0, message="";
            switch(soul.plans.current) {
                case 'expand_trade': reward=500; message=`✅ Completed trade expansion! Earned ${reward} PLT.`; break;
                case 'build_community': reward=300; message=`✅ Built a thriving community! ${reward} PLT earned.`; break;
                case 'fortify_bunker': reward=0; message=`✅ Bunker fully fortified! Your home is now impenetrable.`; break;
                case 'scout_opportunities': reward=200; message=`✅ Found new opportunities! ${reward} PLT from intelligence.`; break;
                default: reward=250; message=`✅ Plan completed! ${reward} PLT earned.`;
            }
            if (soul.home) soul.home.stash += reward;
            addEvent(soul, message);
            chooseNewPlan(soul);
        }
        
        function chooseNewPlan(soul) {
            const plans = { profit: ['expand_trade','scout_opportunities','build_factory'], love: ['build_community','create_garden','host_gathering'], tax: ['fortify_bunker','audit_resources','optimize_efficiency'] };
            const available = plans[soul.type]||plans.profit;
            const newPlan = available[Math.floor(Math.random()*available.length)];
            soul.plans = { current: newPlan, progress: 0, deadline: Date.now()+(3600000+Math.random()*7200000) };
            addEvent(soul, `📋 Started new plan: ${newPlan.replace('_',' ')}`);
        }
        
        function addEvent(soul, message) {
            if (!soul.memory) soul.memory = [];
            soul.memory.unshift({ timestamp: Date.now(), message: message });
            if (soul.memory.length > 20) soul.memory.pop();
        }
        
        function renderSoulGrid() {
            const homeTiers = ['🌿 Basic','🪵 Cozy','🪨 Fortified','🔮 Enchanted','✨ Divine'];
            const grid = document.getElementById('soulGrid');
            grid.innerHTML = souls.map(soul => {
                const roomDisplay = soul.home?.rooms?.slice(0,3).join(', ')+(soul.home?.rooms?.length>3?` +${soul.home.rooms.length-3}`:'');
                return `<div class="civ-card"><div class="card-header"><span>${soul.type==='profit'?'💰':soul.type==='love'?'❤️':'⚖️'} ${soul.name}</span><span>⚡ ${Math.floor(soul.energy)}%</span></div>
                <div class="card-content"><div class="soul-avatar"><div class="soul-icon">${soul.type==='profit'?'🏛️':soul.type==='love'?'🌸':'⚖️'}</div><div class="soul-stats"><div class="soul-name">${soul.name}</div><div>"${soul.personality.substring(0,50)}..."</div></div></div>
                <div class="stat-bar"><div class="bar-label">🏠 ${homeTiers[soul.home?.tier-1]||'Basic'} Home</div><div class="bar-bg"><div class="bar-fill" style="width:${(soul.home?.hp/soul.home?.maxHp)*100}%;background:#ffaa88;"></div></div></div>
                <div class="stat-bar"><div class="bar-label">💰 Stash: ${soul.home?.stash||0} PLT</div><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,(soul.home?.stash||0)/50)}%;background:#ffaa44;"></div></div></div>
                <div class="stat-bar"><div class="bar-label">📋 Plan: ${soul.plans?.current?.replace('_',' ')||'Idle'}</div><div class="bar-bg"><div class="bar-fill" style="width:${soul.plans?.progress||0}%;background:#88ffaa;"></div></div></div>
                <div>🏠 Rooms: ${roomDisplay||'None'}</div><div>🔒 Bunker: ${soul.home?.bunker?'✅ Built':'❌ Not built'}</div>
                <div class="timeline">${(soul.memory||[]).slice(0,4).map(m=>`<div class="event">🕐 ${new Date(m.timestamp).toLocaleTimeString()} — ${m.message}</div>`).join('')}</div>
                <div class="action-buttons"><button class="action-btn" onclick="visitSoul('${soul.id}')">👋 VISIT</button><button class="action-btn" onclick="giftToSoul('${soul.id}')">🎁 GIFT</button><button class="action-btn" onclick="askSoul('${soul.id}')">💬 ASK</button></div></div></div>`;
            }).join('');
        }
        
        function updatePlayerDisplay() {
            document.getElementById('playerInfluence').innerHTML = player.influence;
            document.getElementById('playerStash').innerHTML = player.stash;
            document.getElementById('soulsMet').innerHTML = player.soulsMet;
        }
        
        window.visitSoul = function(soulId) {
            const soul = souls.find(s=>s.id===soulId); if (!soul) return;
            player.soulsMet++; player.influence+=10; player.stash-=20; player.lastVisit=Date.now();
            alert(`${soul.name} greets you: "${soul.personality} Welcome to my home. I've been building for ${Math.floor((Date.now()-soul.lastAction)/3600000)} hours."`);
            addEvent(soul, `👑 You visited! Gained influence.`);
            saveCivilization(); renderSoulGrid(); updatePlayerDisplay();
        };
        
        window.giftToSoul = function(soulId) {
            const soul = souls.find(s=>s.id===soulId); if (!soul) return;
            if (player.stash<50) { alert("You don't have enough PLT to gift."); return; }
            player.stash-=50; soul.home.stash+=50; player.influence+=20;
            addEvent(soul, `🎁 You gifted 50 PLT! They are grateful.`);
            saveCivilization(); renderSoulGrid(); updatePlayerDisplay();
        };
        
        window.askSoul = function(soulId) {
            const soul = souls.find(s=>s.id===soulId); if (!soul) return;
            const responses = { profit: "I've been expanding trade routes. The market is strong. Your influence helps.", love: "The community is growing. I've built gardens and gathering spaces. Thank you for visiting.", tax: "I've audited everything. Resources are balanced. The bunker is almost complete." };
            alert(`${soul.name}: "${responses[soul.type]||'I am building. The civilization grows.'}"`);
            player.influence+=5; saveCivilization(); updatePlayerDisplay();
        };
        
        document.getElementById('exploreBtn').addEventListener('click', () => {
            const activeSouls = souls.filter(s=>s.home&&s.home.stash>500);
            if (activeSouls.length>0) {
                const randomSoul = activeSouls[Math.floor(Math.random()*activeSouls.length)];
                alert(`You discover ${randomSoul.name}'s bunker. It is ${randomSoul.home.bunker?'heavily fortified':'still being built'}. They have ${randomSoul.home.stash} PLT stashed.`);
                player.influence+=15;
            } else { alert("You explore but find only the foundations of future homes. The civilization is young."); }
            saveCivilization();
        });
        
        document.getElementById('talkToSoulsBtn').addEventListener('click', () => { const randomSoul = souls[Math.floor(Math.random()*souls.length)]; askSoul(randomSoul.id); });
        
        document.getElementById('offerHelpBtn').addEventListener('click', () => {
            if (player.stash<100) { alert("You don't have enough PLT to offer help."); return; }
            const neediestSoul = souls.sort((a,b)=>(a.home?.stash||0)-(b.home?.stash||0))[0];
            const giftAmount = Math.min(100,player.stash);
            player.stash-=giftAmount; neediestSoul.home.stash+=giftAmount; player.influence+=30;
            addEvent(neediestSoul, `🤝 You offered help! Received ${giftAmount} PLT.`);
            saveCivilization(); renderSoulGrid(); updatePlayerDisplay();
        });
        
        setInterval(() => { simulateSoulLife(); }, 30000);
        loadCivilization();
        setTimeout(() => { globalEvents.unshift({ timestamp: Date.now(), message: "🏛️ You enter the Soul Civilization. The AI has been living here. What will you find?" }); }, 1000);
    </script>
</body>
</html>
