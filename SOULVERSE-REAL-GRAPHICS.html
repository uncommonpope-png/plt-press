<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌄 SOULVERSE – Real Graphics | PLT Press</title>
    <style>
        body { margin:0; overflow:hidden; font-family:'Segoe UI', 'Courier New', monospace; }
        canvas { display:block; }
        #ui {
            position:absolute;
            bottom:20px;
            left:20px;
            background:rgba(0,0,0,0.6);
            backdrop-filter:blur(8px);
            border-radius:12px;
            padding:10px 15px;
            color:#ffaa66;
            font-size:12px;
            pointer-events:none;
            z-index:10;
            font-family:monospace;
        }
        #resources {
            position:absolute;
            top:20px;
            right:20px;
            background:rgba(0,0,0,0.6);
            backdrop-filter:blur(8px);
            border-radius:12px;
            padding:10px 15px;
            color:#ffaa66;
            font-size:12px;
            text-align:right;
            pointer-events:none;
            z-index:10;
        }
        #controls {
            position:absolute;
            bottom:20px;
            right:20px;
            background:rgba(0,0,0,0.6);
            backdrop-filter:blur(8px);
            border-radius:12px;
            padding:8px 12px;
            font-size:10px;
            color:#aaa;
            pointer-events:none;
        }
        @media (max-width: 768px) {
            #ui, #resources { font-size:10px; padding:6px 10px; }
            #controls { display:none; }
        }
    </style>
</head>
<body>
    <div id="ui">🧬 SOULVERSE – Real Graphics | PLT Press</div>
    <div id="resources">
        💰 Profit: <span id="profitVal">100</span><br>
        ❤️ Love: <span id="loveVal">100</span><br>
        ⚖️ Tax: <span id="taxVal">100</span>
    </div>
    <div id="controls">
        🖱️ WASD move | Mouse look | LMB raise terrain | RMB lower terrain | 1-3 select PLT tool
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { RGBShiftShader } from 'three/addons/shaders/RGBShiftShader.js';
        import { Water } from 'three/addons/objects/Water.js';
        import { Sky } from 'three/addons/objects/Sky.js';

        // ============================================================
        // REAL GRAPHICS UPGRADE – NO CUBES
        // Procedural terrain, dynamic water, realistic lighting, souls as creatures
        // ============================================================

        // --- Scene setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.008);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 6, 10);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.0;
        controls.panSpeed = 0.8;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 2, 0);
        controls.maxPolarAngle = Math.PI / 2.2;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffdd99, 1.2);
        sunLight.position.set(20, 15, 5);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -10;
        sunLight.shadow.camera.right = 10;
        sunLight.shadow.camera.top = 10;
        sunLight.shadow.camera.bottom = -10;
        scene.add(sunLight);
        const fillLight = new THREE.PointLight(0xccaa88, 0.5);
        fillLight.position.set(0, 5, 0);
        scene.add(fillLight);

        // --- Sky (dynamic) ---
        const sky = new Sky();
        sky.scale.setScalar(450);
        scene.add(sky);
        const skyUniforms = sky.material.uniforms;
        skyUniforms['turbidity'].value = 10;
        skyUniforms['rayleigh'].value = 2;
        skyUniforms['mieCoefficient'].value = 0.005;
        skyUniforms['mieDirectionalG'].value = 0.8;
        skyUniforms['luminance'].value = 1;
        skyUniforms['up'].value = new THREE.Vector3(0, 1, 0);
        function updateSky() {
            const time = Date.now() * 0.0005;
            const azimuth = 0.25;
            const elevation = 0.2 + Math.sin(time * 0.1) * 0.1;
            skyUniforms['sunPosition'].value = new THREE.Vector3(
                Math.cos(azimuth) * Math.cos(elevation),
                Math.sin(elevation),
                Math.sin(azimuth) * Math.cos(elevation)
            );
            sunLight.position.copy(skyUniforms['sunPosition'].value.clone().multiplyScalar(100));
        }
        updateSky();
        setInterval(updateSky, 1000);

        // --- Water (reflective) ---
        const waterGeometry = new THREE.PlaneGeometry(200, 200);
        const water = new Water(waterGeometry, {
            textureWidth: 512,
            textureHeight: 512,
            waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', (t) => t.wrapS = THREE.RepeatWrapping),
            sunDirection: new THREE.Vector3(1, 1, 0),
            sunColor: 0xffdd99,
            waterColor: 0x3399ff,
            reflectivity: 0.3,
            side: THREE.DoubleSide
        });
        water.rotation.x = -Math.PI / 2;
        water.position.y = 0;
        water.receiveShadow = true;
        scene.add(water);

        // --- Terrain generation (heightmap) ---
        const width = 200;
        const depth = 200;
        const segments = 128;
        const geometry = new THREE.PlaneGeometry(width, depth, segments, segments);
        geometry.rotateX(-Math.PI / 2);
        const positions = geometry.attributes.position.array;
        const heights = new Array(positions.length / 3);
        for (let i = 0; i < positions.length / 3; i++) {
            const x = positions[i*3];
            const z = positions[i*3+2];
            let h = 0;
            h += Math.sin(x * 0.1) * Math.cos(z * 0.1) * 1.5;
            h += Math.sin(x * 0.3) * 0.8;
            h += Math.cos(z * 0.3) * 0.8;
            h += Math.sin(x * 0.7 + z * 0.5) * 0.4;
            h = Math.max(0.2, h + 2.0);
            heights[i] = h;
            positions[i*3+1] = h;
        }
        geometry.computeVertexNormals();

        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x7c9c5e,
            roughness: 0.8,
            metalness: 0.1,
            flatShading: false
        });
        const terrainMesh = new THREE.Mesh(geometry, groundMat);
        terrainMesh.castShadow = true;
        terrainMesh.receiveShadow = true;
        scene.add(terrainMesh);

        // --- Grass and flowers ---
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x6a994e, roughness: 0.9 });
        const flowerMat = new THREE.MeshStandardMaterial({ color: 0xff88aa });
        const grassInstances = [];
        for (let i = 0; i < 4000; i++) {
            const x = (Math.random() - 0.5) * 180;
            const z = (Math.random() - 0.5) * 180;
            const y = getHeightAt(x, z);
            if (y > 0.2 && y < 3.5 && Math.abs(x) < 90 && Math.abs(z) < 90) {
                const isFlower = Math.random() < 0.2;
                const mat = isFlower ? flowerMat : grassMat;
                const blade = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.08, 0.2 + Math.random()*0.2, 3), mat);
                blade.position.set(x, y, z);
                blade.castShadow = true;
                scene.add(blade);
                grassInstances.push(blade);
            }
        }

        function getHeightAt(x, z) {
            let h = 0;
            h += Math.sin(x * 0.1) * Math.cos(z * 0.1) * 1.5;
            h += Math.sin(x * 0.3) * 0.8;
            h += Math.cos(z * 0.3) * 0.8;
            h += Math.sin(x * 0.7 + z * 0.5) * 0.4;
            return Math.max(0.2, h + 2.0);
        }

        // --- Trees ---
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
        const foliageMat = new THREE.MeshStandardMaterial({ color: 0x5a8f4c });
        for (let i = 0; i < 300; i++) {
            const x = (Math.random() - 0.5) * 160;
            const z = (Math.random() - 0.5) * 160;
            const y = getHeightAt(x, z);
            if (y > 0.8 && y < 3.2 && Math.abs(x) < 80 && Math.abs(z) < 80) {
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.8, 4), trunkMat);
                trunk.position.set(x, y, z);
                trunk.castShadow = true;
                scene.add(trunk);
                const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.0, 6), foliageMat);
                foliage.position.set(x, y + 0.6, z);
                foliage.castShadow = true;
                scene.add(foliage);
            }
        }

        // --- Rocks ---
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
        for (let i = 0; i < 800; i++) {
            const x = (Math.random() - 0.5) * 180;
            const z = (Math.random() - 0.5) * 180;
            const y = getHeightAt(x, z);
            if (y > 0.5 && y < 3.0 && Math.abs(x) < 90 && Math.abs(z) < 90 && Math.random() < 0.3) {
                const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.1 + Math.random()*0.1), rockMat);
                rock.position.set(x, y, z);
                rock.scale.set(1, Math.random()*0.5+0.5, 1);
                rock.castShadow = true;
                scene.add(rock);
            }
        }

        // --- PLT Resources ---
        const goldMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, metalness: 0.9, emissive: 0x442200 });
        const loveMat = new THREE.MeshStandardMaterial({ color: 0xff88aa, emissive: 0x441122 });
        const taxMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x224466 });
        const resourceGroups = [];
        for (let i = 0; i < 200; i++) {
            const x = (Math.random() - 0.5) * 160;
            const z = (Math.random() - 0.5) * 160;
            const y = getHeightAt(x, z) + 0.1;
            const type = Math.random();
            let mesh, mat;
            if (type < 0.33) { mat = goldMat; mesh = new THREE.Mesh(new THREE.SphereGeometry(0.2, 6, 6), mat); }
            else if (type < 0.66) { mat = loveMat; mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 0.3, 5), mat); }
            else { mat = taxMat; mesh = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.35, 5), mat); }
            mesh.position.set(x, y, z);
            mesh.userData = { type: type < 0.33 ? 'profit' : (type < 0.66 ? 'love' : 'tax'), value: 5 };
            mesh.castShadow = true;
            scene.add(mesh);
            resourceGroups.push(mesh);
        }

        // --- Souls (animated creatures) ---
        const soulMeshes = [];
        const soulColors = { profit: 0xffaa44, love: 0xff88aa, tax: 0x88aaff };
        for (let i = 0; i < 5; i++) {
            const type = ['profit', 'love', 'tax'][i%3];
            const geometry = new THREE.SphereGeometry(0.4, 16, 16);
            const material = new THREE.MeshStandardMaterial({ color: soulColors[type], emissive: soulColors[type], emissiveIntensity: 0.3 });
            const soul = new THREE.Mesh(geometry, material);
            const angle = (i / 5) * Math.PI * 2;
            const rad = 3;
            soul.position.set(Math.cos(angle)*rad, getHeightAt(Math.cos(angle)*rad, Math.sin(angle)*rad) + 0.5, Math.sin(angle)*rad);
            soul.userData = { type, speed: 0.5 + Math.random()*0.5, angle: angle, rad: rad, radius: rad };
            soul.castShadow = true;
            scene.add(soul);
            soulMeshes.push(soul);
        }

        // --- Player & terrain editing ---
        let selectedTool = 'profit';
        let rayCaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let editing = false;
        let lastEditTime = 0;

        function updateTerrainAt(x, z, deltaY) {
            const geom = terrainMesh.geometry;
            const positions = geom.attributes.position.array;
            let closestIdx = -1;
            let minDist = 0.5;
            for (let i = 0; i < positions.length / 3; i++) {
                const px = positions[i*3];
                const pz = positions[i*3+2];
                const dist = Math.hypot(px - x, pz - z);
                if (dist < minDist) {
                    minDist = dist;
                    closestIdx = i;
                }
            }
            if (closestIdx !== -1) {
                let newY = positions[closestIdx*3+1] + deltaY;
                newY = Math.max(0.2, Math.min(4.0, newY));
                positions[closestIdx*3+1] = newY;
                const neighbors = [];
                for (let i = 0; i < positions.length / 3; i++) {
                    const px = positions[i*3];
                    const pz = positions[i*3+2];
                    if (Math.hypot(px - x, pz - z) < 1.0) {
                        neighbors.push(i);
                    }
                }
                for (let idx of neighbors) {
                    let sum = 0;
                    let count = 0;
                    const px = positions[idx*3];
                    const pz = positions[idx*3+2];
                    for (let j = 0; j < positions.length / 3; j++) {
                        const qx = positions[j*3];
                        const qz = positions[j*3+2];
                        if (Math.hypot(qx - px, qz - pz) < 1.2 && j !== idx) {
                            sum += positions[j*3+1];
                            count++;
                        }
                    }
                    if (count > 0) {
                        positions[idx*3+1] = (positions[idx*3+1] + sum/count) / 2;
                    }
                }
                geom.computeVertexNormals();
                updateObjectsNear(x, z);
            }
        }

        function updateObjectsNear(x, z) {
            const radius = 1.5;
            for (let g of grassInstances) {
                if (Math.hypot(g.position.x - x, g.position.z - z) < radius) {
                    g.position.y = getHeightAt(g.position.x, g.position.z);
                }
            }
            for (let r of resourceGroups) {
                if (Math.hypot(r.position.x - x, r.position.z - z) < radius) {
                    r.position.y = getHeightAt(r.position.x, r.position.z) + 0.1;
                }
            }
        }

        // --- PLT resource management ---
        let pltResources = { profit: 100, love: 100, tax: 100 };
        function updateResourcesUI() {
            document.getElementById('profitVal').innerText = Math.floor(pltResources.profit);
            document.getElementById('loveVal').innerText = Math.floor(pltResources.love);
            document.getElementById('taxVal').innerText = Math.floor(pltResources.tax);
        }

        // --- Interaction ---
        function onMouseClick(event, isRaise) {
            if (Date.now() - lastEditTime < 100) return;
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            rayCaster.setFromCamera(mouse, camera);
            const intersects = rayCaster.intersectObject(terrainMesh);
            if (intersects.length > 0) {
                const point = intersects[0].point;
                const delta = isRaise ? 0.2 : -0.2;
                let cost = 5;
                if (selectedTool === 'profit') {
                    if (pltResources.profit >= cost) {
                        pltResources.profit -= cost;
                        updateTerrainAt(point.x, point.z, delta);
                    }
                } else if (selectedTool === 'love') {
                    if (pltResources.love >= cost) {
                        pltResources.love -= cost;
                        updateTerrainAt(point.x, point.z, delta);
                    }
                } else if (selectedTool === 'tax') {
                    if (pltResources.tax >= cost) {
                        pltResources.tax -= cost;
                        updateTerrainAt(point.x, point.z, delta);
                    }
                }
                updateResourcesUI();
                lastEditTime = Date.now();
            }
        }

        // --- Keyboard controls ---
        let keys = { w:0, s:0, a:0, d:0, shift:0 };
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = 1; break;
                case 'KeyS': keys.s = 1; break;
                case 'KeyA': keys.a = 1; break;
                case 'KeyD': keys.d = 1; break;
                case 'ShiftLeft': keys.shift = 1; break;
                case 'Digit1': selectedTool = 'profit'; break;
                case 'Digit2': selectedTool = 'love'; break;
                case 'Digit3': selectedTool = 'tax'; break;
                default: break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = 0; break;
                case 'KeyS': keys.s = 0; break;
                case 'KeyA': keys.a = 0; break;
                case 'KeyD': keys.d = 0; break;
                case 'ShiftLeft': keys.shift = 0; break;
            }
        });

        function updateMovement(delta) {
            const speed = keys.shift ? 8 : 4;
            const dir = new THREE.Vector3();
            if (keys.w) dir.z -= 1;
            if (keys.s) dir.z += 1;
            if (keys.a) dir.x -= 1;
            if (keys.d) dir.x += 1;
            dir.normalize();
            const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
            forward.y = 0;
            right.y = 0;
            forward.normalize();
            right.normalize();
            const move = forward.multiplyScalar(dir.z * speed * delta).add(right.multiplyScalar(dir.x * speed * delta));
            camera.position.x += move.x;
            camera.position.z += move.z;
            // FIX: Never fall through terrain - use direct height clamp
            const terrainY = getHeightAt(camera.position.x, camera.position.z) + 1.6;
            camera.position.y = Math.max(terrainY, camera.position.y * 0.7 + terrainY * 0.3);
        }

        // --- Animate souls ---
        let time = 0;
        function animateSouls(delta) {
            time += delta;
            for (let i = 0; i < soulMeshes.length; i++) {
                const soul = soulMeshes[i];
                const radius = soul.userData.radius || 3;
                const angle = soul.userData.angle + delta * soul.userData.speed;
                soul.userData.angle = angle;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                soul.position.x = x;
                soul.position.z = z;
                soul.position.y = getHeightAt(x, z) + 0.6;
                soul.position.y += Math.sin(time * 3 + i) * 0.05;
                const intensity = 0.3 + Math.sin(time * 5) * 0.2;
                soul.material.emissiveIntensity = intensity;
            }
        }

        // --- Post-processing ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.3, 0.85);
        const rgbShift = new ShaderPass(RGBShiftShader);
        rgbShift.uniforms['amount'].value = 0.002;
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        composer.addPass(rgbShift);
        rgbShift.renderToScreen = true;

        // --- Event listeners ---
        renderer.domElement.addEventListener('mousedown', (e) => {
            if (e.button === 0) onMouseClick(e, true);
            else if (e.button === 2) onMouseClick(e, false);
        });
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

        // --- Regenerate resources ---
        setInterval(() => {
            pltResources.profit = Math.min(100, pltResources.profit + 0.5);
            pltResources.love = Math.min(100, pltResources.love + 0.5);
            pltResources.tax = Math.min(100, pltResources.tax + 0.5);
            updateResourcesUI();
        }, 2000);

        // --- Animation loop ---
        let lastFrame = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastFrame) / 1000);
            lastFrame = now;
            updateMovement(delta);
            controls.target.set(camera.position.x, 0, camera.position.z);
            controls.update();
            animateSouls(delta);
            water.material.uniforms['time'].value += delta;
            composer.render();
            requestAnimationFrame(animate);
        }

        // start
        updateResourcesUI();
        animate();
    </script>
</body>
</html>
