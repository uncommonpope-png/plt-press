<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌀 SOULVERSE EXPANDED — GTA + Sims + Mortal Kombat | PLT Press</title>
    <style>
        body { margin:0; overflow:hidden; font-family:'Courier New', monospace; }
        canvas { display:block; width:100%; height:100%; }
        
        /* HUD */
        #hud {
            position:absolute;
            top:0; left:0; right:0;
            padding:15px;
            display:flex;
            justify-content:space-between;
            pointer-events:none;
            z-index:100;
        }
        
        .stat-box {
            background:rgba(0,0,0,0.7);
            backdrop-filter:blur(8px);
            border-radius:12px;
            padding:10px 15px;
            color:#ffaa66;
            font-size:12px;
            border:2px solid rgba(255,170,68,0.5);
        }
        
        .stat-row { margin:5px 0; }
        .stat-label { color:#888; margin-right:8px; }
        .stat-value { color:#fff; font-weight:bold; }
        
        /* Minimap */
        #minimap {
            position:absolute;
            top:80px;
            right:20px;
            width:150px;
            height:150px;
            background:rgba(0,0,0,0.7);
            border:2px solid rgba(255,170,68,0.5);
            border-radius:50%;
            overflow:hidden;
            z-index:90;
        }
        
        /* Action bar */
        #action-bar {
            position:absolute;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            display:flex;
            gap:10px;
            z-index:100;
        }
        
        .action-btn {
            width:60px;
            height:60px;
            border-radius:30px;
            background:linear-gradient(135deg, #ffaa66, #ff8844);
            border:2px solid #fff;
            color:#000;
            font-weight:bold;
            font-size:24px;
            cursor:pointer;
            pointer-events:auto;
            box-shadow:0 0 20px rgba(255,170,68,0.5);
        }
        
        .action-btn:active {
            transform:scale(0.9);
            box-shadow:0 0 30px rgba(255,170,68,0.8);
        }
        
        /* Vehicle UI */
        #vehicle-ui {
            position:absolute;
            bottom:100px;
            left:20px;
            background:rgba(0,0,0,0.7);
            border-radius:12px;
            padding:10px;
            color:#ffaa66;
            font-size:11px;
            display:none;
            z-index:95;
        }
        
        /* Relationship display */
        #relationship-display {
            position:absolute;
            top:80px;
            left:20px;
            background:rgba(0,0,0,0.7);
            border-radius:12px;
            padding:10px;
            color:#ff88aa;
            font-size:11px;
            z-index:90;
        }
        
        /* Weather & Time */
        #world-info {
            position:absolute;
            top:80px;
            right:180px;
            background:rgba(0,0,0,0.7);
            border-radius:12px;
            padding:10px;
            color:#88ccff;
            font-size:11px;
            z-index:90;
        }
        
        /* Combo display */
        #combo-display {
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%);
            font-size:48px;
            color:#ff4444;
            text-shadow:0 0 30px #ff4444;
            opacity:0;
            pointer-events:none;
            z-index:200;
        }
        
        /* Damage number */
        .damage-number {
            position:absolute;
            font-size:24px;
            color:#ff4444;
            font-weight:bold;
            text-shadow:0 0 10px #ff0000;
            pointer-events:none;
            z-index:150;
            animation: floatUp 1s ease-out;
        }
        
        @keyframes floatUp {
            0% { opacity:1; transform:translateY(0); }
            100% { opacity:0; transform:translateY(-50px); }
        }
        
        /* Joystick */
        #joystick-area {
            position:absolute;
            bottom:80px;
            left:20px;
            width:120px;
            height:120px;
            background:rgba(255,255,255,0.1);
            border-radius:60px;
            border:2px solid rgba(255,170,68,0.3);
            touch-action:none;
            z-index:100;
        }
        
        #joystick-knob {
            position:absolute;
            width:50px;
            height:50px;
            background:linear-gradient(135deg, #ffaa66, #ff8844);
            border-radius:25px;
            left:35px;
            top:35px;
            pointer-events:none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <!-- HUD -->
    <div id="hud">
        <div class="stat-box">
            <div class="stat-row"><span class="stat-label">💰</span><span class="stat-value" id="money">$1000</span></div>
            <div class="stat-row"><span class="stat-label">❤️</span><span class="stat-value" id="health">100</span></div>
            <div class="stat-row"><span class="stat-label">⚡</span><span class="stat-value" id="stamina">100</span></div>
        </div>
        <div class="stat-box" style="text-align:right;">
            <div class="stat-row"><span class="stat-label">🕐</span><span class="stat-value" id="time">12:00</span></div>
            <div class="stat-row"><span class="stat-label">🌤️</span><span class="stat-value" id="weather">SUNNY</span></div>
            <div class="stat-row"><span class="stat-label">📍</span><span class="stat-value" id="location">DOWNTOWN</span></div>
        </div>
    </div>
    
    <!-- Minimap -->
    <div id="minimap">
        <canvas id="minimap-canvas" width="150" height="150"></canvas>
    </div>
    
    <!-- World Info -->
    <div id="world-info">
        <div>Day: <span id="day-num">1</span></div>
        <div>Temp: <span id="temp">25</span>°C</div>
    </div>
    
    <!-- Relationship Display -->
    <div id="relationship-display">
        <div>💕 Relationships</div>
        <div id="rel-list"></div>
    </div>
    
    <!-- Vehicle UI -->
    <div id="vehicle-ui">
        <div>🚗 <span id="vehicle-name">Car</span></div>
        <div>Speed: <span id="vehicle-speed">0</span> mph</div>
        <div>Health: <span id="vehicle-health">100</span>%</div>
    </div>
    
    <!-- Combo Display -->
    <div id="combo-display">COMBO x0</div>
    
    <!-- Action Bar -->
    <div id="action-bar">
        <button class="action-btn" id="btn-fight">👊</button>
        <button class="action-btn" id="btn-interact">💬</button>
        <button class="action-btn" id="btn-work">💼</button>
        <button class="action-btn" id="btn-buy">🛒</button>
        <button class="action-btn" id="btn-vehicle">🚗</button>
    </div>
    
    <!-- Joystick -->
    <div id="joystick-area">
        <div id="joystick-knob"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // ============================================================
        // SOULVERSE EXPANDED — Connected to THE WEAVE
        // Dashboard ↔ Game ↔ Pantheon ↔ Bots
        // All systems merged into ONE experience
        // ============================================================
        
        // --- WEAVE Connection ---
        const WEAVE_CONFIG = {
            syncInterval: 5000, // Sync every 5 seconds
            stateEndpoint: '/fix-us/weave-state.json',
            dashboardEndpoint: '/.openclaw/workspace/profit_state.json'
        };
        
        let weaveState = {
            souls: [],
            buildings: [],
            vehicles: [],
            relationships: {},
            dashboard: {
                commands: 0,
                revenue: 0
            },
            game: {
                money: 1000,
                health: 100
            }
        };
        
        // Load WEAVE state
        async function loadWeaveState() {
            try {
                const response = await fetch(WEAVE_CONFIG.stateEndpoint);
                if (response.ok) {
                    const data = await response.json();
                    weaveState = {
                        ...weaveState,
                        souls: data.soulverse?.souls || [],
                        buildings: data.soulverse?.buildings || [],
                        vehicles: data.soulverse?.vehicles || [],
                        relationships: data.soulverse?.relationships || {},
                        dashboard: data.dashboard || {},
                        game: data.game || {}
                    };
                    
                    // Sync game state from WEAVE
                    if (weaveState.game.money) {
                        gameState.money = weaveState.game.money;
                    }
                    
                    console.log('[WEAVE] State loaded:', weaveState);
                }
            } catch (e) {
                console.log('[WEAVE] Using local state (offline mode)');
            }
        }
        
        // Sync dashboard action to WEAVE
        async function syncDashboardAction(action) {
            try {
                // Add to dashboard pending actions
                const dashboardFile = WEAVE_CONFIG.dashboardEndpoint;
                // In production, this would POST to a server
                // For now, log the action
                console.log('[WEAVE] Dashboard action:', action);
                
                // Send to server to sync
                fetch('/api/weave/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'dashboard_action',
                        action: action,
                        timestamp: Date.now()
                    })
                });
            } catch (e) {
                console.log('[WEAVE] Sync failed (offline):', e);
            }
        }
        
        // Sync game action to WEAVE
        async function syncGameAction(action) {
            try {
                console.log('[WEAVE] Game action:', action);
                
                fetch('/api/weave/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'game_action',
                        action: action,
                        timestamp: Date.now()
                    })
                });
            } catch (e) {
                console.log('[WEAVE] Sync failed (offline):', e);
            }
        }
        
        // Start WEAVE sync loop
        function startWeaveSync() {
            loadWeaveState();
            setInterval(() => {
                loadWeaveState();
            }, WEAVE_CONFIG.syncInterval);

            console.log('[WEAVE] Sync started — Dashboard ↔ Game ↔ Pantheon ↔ Bots');
        }

        // ============================================================
        // COMBAT SYSTEM - Mortal Kombat Style
        // ============================================================
        const COMBAT_MOVES = {
            punch: { damage: 10, speed: 0.3, stamina: 5 },
            kick: { damage: 15, speed: 0.5, stamina: 10 },
            special: { damage: 30, speed: 0.8, stamina: 25 }
        };
        
        const PLT_SPECIALS = {
            profit: { name: "Multiply Strike", damage: 40, stamina: 30 },
            love: { name: "Embrace Drain", damage: 20, stamina: 25, heal: true },
            tax: { name: "Audit Debuff", damage: 15, stamina: 20, debuff: true }
        };
        
        let combatState = {
            inFight: false,
            opponent: null,
            combo: 0,
            comboTimer: 0
        };
        
        function performAttack(moveName, target) {
            const move = COMBAT_MOVES[moveName];
            if (!move || gameState.stamina < move.stamina) return false;
            
            gameState.stamina -= move.stamina;
            const distance = Math.hypot(player.x - target.x, player.z - target.z);
            
            if (distance < 3) {
                const damage = move.damage;
                target.health = (target.health || 100) - damage;
                combatState.combo++;
                
                showDamageNumber(damage, target.x, target.z);
                createHitEffect(target.x, target.z);
                
                if (combatState.combo >= 3) showCombo(combatState.combo);
                
                if (target.health <= 0) {
                    gameState.money += 50;
                    showNotification("VICTORY! +$50");
                    syncGameAction({ type: 'combat_victory', reward: 50 });
                    if (target.mesh) scene.remove(target.mesh);
                }
            }
            return true;
        }
        
        function showDamageNumber(amount, x, z) {
            const div = document.createElement('div');
            div.className = 'damage-number';
            div.innerText = '-' + amount;
            
            const vec = new THREE.Vector3(x, 2, z);
            vec.project(camera);
            
            div.style.left = ((vec.x * 0.5 + 0.5) * window.innerWidth) + 'px';
            div.style.top = ((-(vec.y * 0.5) + 0.5) * window.innerHeight) + 'px';
            
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1000);
        }
        
        function showCombo(count) {
            const comboEl = document.getElementById('combo-display');
            comboEl.innerText = 'COMBO x' + count;
            comboEl.style.opacity = 1;
            setTimeout(() => { comboEl.style.opacity = 0; }, 2000);
        }
        
        function createHitEffect(x, z) {
            for (let i = 0; i < 10; i++) {
                const geo = new THREE.SphereGeometry(0.1, 8, 8);
                const mat = new THREE.MeshBasicMaterial({ color: 0xffaa44 });
                const particle = new THREE.Mesh(geo, mat);
                particle.position.set(x, 1.5, z);
                particle.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 10,
                        Math.random() * 5,
                        (Math.random() - 0.5) * 10
                    ),
                    lifetime: 1.0
                };
                scene.add(particle);
                animateParticle(particle);
            }
        }
        
        function animateParticle(particle) {
            if (!particle.userData.lifetime || particle.userData.lifetime <= 0) {
                scene.remove(particle);
                return;
            }
            particle.userData.lifetime -= 0.016;
            particle.position.add(particle.userData.velocity.clone().multiplyScalar(0.016));
            particle.userData.velocity.y -= 9.8 * 0.016;
            if (particle.position.y < 0) particle.position.y = 0;
            requestAnimationFrame(() => animateParticle(particle));
        }
        
        function startFight() {
            let nearest = null, minDist = 5;
            npcs.forEach(npc => {
                const dist = Math.hypot(player.x - npc.x, player.z - npc.z);
                if (dist < minDist) { nearest = npc; minDist = dist; }
            });
            
            if (nearest) {
                combatState.inFight = true;
                combatState.opponent = nearest;
                combatState.opponent.health = 100;
                showNotification(`FIGHT vs ${nearest.name}!`);
                showFightUI();
            }
        }
        
        function showFightUI() {
            if (!document.getElementById('fight-health-enemy')) {
                const enemyBar = document.createElement('div');
                enemyBar.id = 'fight-health-enemy';
                enemyBar.className = 'stat-box';
                enemyBar.style.position = 'absolute';
                enemyBar.style.bottom = '100px';
                enemyBar.style.right = '20px';
                enemyBar.innerHTML = `
                    <div style="color:#ff88aa; font-weight:bold;" id="enemy-fight-name">ENEMY</div>
                    <div style="width:200px; height:20px; background:#333; border:2px solid #fff; border-radius:10px; overflow:hidden;">
                        <div id="enemy-fight-health" style="width:100%; height:100%; background:linear-gradient(90deg, #ff4444, #ffaa44);"></div>
                    </div>
                `;
                document.body.appendChild(enemyBar);
            }
        }
        
        function updateFightUI() {
            if (combatState.inFight && combatState.opponent) {
                const enemyHealthPct = (combatState.opponent.health / 100) * 100;
                const enemyBar = document.getElementById('enemy-fight-health');
                const enemyNameEl = document.getElementById('enemy-fight-name');
                if (enemyBar) enemyBar.style.width = enemyHealthPct + '%';
                if (enemyNameEl) enemyNameEl.innerText = combatState.opponent.name.toUpperCase();
                
                if (combatState.opponent.health <= 0) {
                    combatState.inFight = false;
                    const enemyBar = document.getElementById('fight-health-enemy');
                    if (enemyBar) enemyBar.remove();
                }
            }
        }

        // --- Game State ---
        const gameState = {
            money: 1000,
            health: 100,
            stamina: 100,
            time: 12,
            day: 1,
            weather: 'sunny',
            temperature: 25,
            location: 'DOWNTOWN',
            inVehicle: false,
            currentVehicle: null,
            fighting: false,
            combo: 0
        };

        // ============================================================
        // POKEMON-STYLE SOUL COLLECTION SYSTEM
        // Different images per soul type/rarity
        // ============================================================
        const SOUL_IMAGES = {
            profit: { common: '💰', rare: '💎', legendary: '👑', color: 0xffaa44 },
            love: { common: '❤️', rare: '💖', legendary: '💕', color: 0xff88aa },
            tax: { common: '⚖️', rare: '📊', legendary: '💼', color: 0x88aaff }
        };
        
        function getSoulRarity() {
            const rand = Math.random();
            if (rand < 0.05) return 'legendary';
            if (rand < 0.30) return 'rare';
            return 'common';
        }
        
        function createSoulMesh(type, rarity = 'common') {
            const soulData = SOUL_IMAGES[type] || SOUL_IMAGES.profit;
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            // Glow based on rarity
            const glowColors = { common: 'rgba(255,255,255,0.3)', rare: 'rgba(100,200,255,0.5)', legendary: 'rgba(255,200,100,0.7)' };
            ctx.fillStyle = glowColors[rarity];
            ctx.beginPath();
            ctx.arc(64, 64, 60, 0, Math.PI * 2);
            ctx.fill();
            
            // Emoji
            ctx.font = '80px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#fff';
            ctx.fillText(soulData[rarity], 64, 64);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, color: soulData.color });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(1.2, 1.2, 1);
            return sprite;
        }
        
        function collectSoul(npc) {
            const rarity = getSoulRarity();
            const soulMesh = createSoulMesh(npc.type, rarity);
            soulMesh.position.set(npc.x, npc.y + 1, npc.z);
            scene.add(soulMesh);
            
            const collectedSoul = {
                id: npc.id || Date.now(),
                name: npc.name,
                type: npc.type,
                rarity: rarity,
                level: rarity === 'legendary' ? 10 : rarity === 'rare' ? 5 : 1,
                collectedAt: Date.now()
            };
            
            souls.push(collectedSoul);
            showCollectionUI(collectedSoul);
            syncGameAction({ type: 'soul_collected', soul: collectedSoul });
            
            if (npc.mesh) scene.remove(npc.mesh);
            npcs = npcs.filter(n => n !== npc);
            return collectedSoul;
        }
        
        function showCollectionUI(soul) {
            const div = document.createElement('div');
            div.style.position = 'absolute';
            div.style.top = '50%';
            div.style.left = '50%';
            div.style.transform = 'translate(-50%, -50%)';
            div.style.background = 'linear-gradient(135deg, rgba(0,0,0,0.9), rgba(20,20,40,0.95))';
            div.style.border = '3px solid #ffaa66';
            div.style.borderRadius = '20px';
            div.style.padding = '30px';
            div.style.textAlign = 'center';
            div.style.color = '#ffaa66';
            div.style.zIndex = '1000';
            div.style.pointerEvents = 'none';
            
            const rarityStars = { common: '⭐', rare: '⭐⭐⭐', legendary: '⭐⭐⭐⭐⭐' };
            div.innerHTML = `
                <div style="font-size:72px; margin-bottom:10px;">${SOUL_IMAGES[soul.type][soul.rarity]}</div>
                <div style="font-size:24px; font-weight:bold;">${soul.name}</div>
                <div style="font-size:14px; color:#888;">${soul.type.toUpperCase()} | ${rarityStars[soul.rarity]}</div>
                <div style="font-size:12px; color:#aaa; margin-top:15px;">SOUL COLLECTED!</div>
            `;
            
            document.body.appendChild(div);
            setTimeout(() => { div.style.opacity = '0'; div.style.transition = 'opacity 0.5s'; setTimeout(() => div.remove(), 500); }, 2000);
        }
        
        // Add collect button
        function addCollectButton() {
            const collectBtn = document.createElement('button');
            collectBtn.className = 'action-btn';
            collectBtn.id = 'btn-collect';
            collectBtn.innerHTML = '🔮';
            collectBtn.title = 'Collect Soul';
            collectBtn.addEventListener('click', () => {
                let nearest = null, minDist = 5;
                npcs.forEach(npc => {
                    const dist = Math.hypot(player.x - npc.x, player.z - npc.z);
                    if (dist < minDist) { nearest = npc; minDist = dist; }
                });
                if (nearest) {
                    const soul = collectSoul(nearest);
                    showNotification(`Collected ${soul.name} (${soul.rarity})!`);
                } else {
                    showNotification("No soul nearby!");
                }
            });
            document.getElementById('action-bar').appendChild(collectBtn);
        }
        setTimeout(() => addCollectButton(), 1000);

        // --- Quality Settings ---
        const QUALITY = {
            0: { name:'Performance', segments:24, souls:3, buildings:5, vehicles:2 },
            1: { name:'Balanced', segments:48, souls:5, buildings:10, vehicles:5 },
            2: { name:'Beautiful', segments:96, souls:8, buildings:20, vehicles:10 }
        };
        let currentQuality = 1;
        
        // --- Three.js Globals ---
        let scene, camera, renderer;
        let terrain, water;
        let player = { x:0, z:0, y:0, rotation:0 };
        let souls = [], buildings = [], vehicles = [], npcs = [];
        let clock = new THREE.Clock();
        
        // --- Height Function ---
        function getHeight(x, z) {
            let h = 0;
            h += Math.sin(x * 0.12) * Math.cos(z * 0.12) * 1.0;
            h += Math.sin(x * 0.3) * 0.5;
            h += Math.cos(z * 0.3) * 0.5;
            return Math.max(0.2, h + 1.6);
        }
        
        // ============================================================
        // VEHICLE SYSTEM
        // ============================================================
        class Vehicle {
            constructor(type, x, z, rotation) {
                this.type = type;
                this.stats = {
                    car: { speed: 15, health: 100, seats: 4 },
                    bike: { speed: 20, health: 50, seats: 2 },
                    helicopter: { speed: 25, health: 150, seats: 4 }
                }[type];
                this.position = { x, z };
                this.rotation = rotation;
                this.velocity = 0;
                this.health = this.stats.health;
                this.driver = null;
            }
            
            update(delta) {
                if (this.velocity !== 0) {
                    this.position.x += Math.sin(this.rotation) * this.velocity * delta;
                    this.position.z += Math.cos(this.rotation) * this.velocity * delta;
                    if (this.mesh) {
                        this.mesh.position.x = this.position.x;
                        this.mesh.position.z = this.position.z;
                        this.mesh.position.y = getHeight(this.position.x, this.position.z) + 0.5;
                    }
                }
            }
        }
        
        function createVehicle(type, x, z) {
            const vehicle = new Vehicle(type, x, z, 0);
            
            // Create 3D mesh
            let geometry;
            if (type === 'car') {
                geometry = new THREE.BoxGeometry(2, 1, 4);
            } else if (type === 'bike') {
                geometry = new THREE.BoxGeometry(0.8, 1.2, 2.5);
            } else {
                geometry = new THREE.BoxGeometry(3, 1.5, 5);
            }
            
            const material = new THREE.MeshStandardMaterial({ 
                color: Math.random() * 0xffffff,
                metalness: 0.6,
                roughness: 0.4
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, getHeight(x, z) + 0.5, z);
            mesh.castShadow = true;
            scene.add(mesh);
            
            vehicle.mesh = mesh;
            vehicles.push(vehicle);
            return vehicle;
        }
        
        // ============================================================
        // BUILDING SYSTEM
        // ============================================================
        class Building {
            constructor(type, x, z, rotation) {
                this.type = type;
                this.stats = {
                    house: { floors: 2, price: 50000, enterable: true },
                    shop: { floors: 1, price: 100000, enterable: true },
                    apartment: { floors: 5, price: 200000, enterable: true }
                }[type];
                this.position = { x, z };
                this.rotation = rotation;
                this.owner = null;
            }
        }
        
        function createBuilding(type, x, z, rotation = 0) {
            const building = new Building(type, x, z, rotation);
            const stats = building.stats;
            
            // Create 3D building
            const width = 8 + Math.random() * 4;
            const depth = 8 + Math.random() * 4;
            const height = stats.floors * 4;
            
            const geometry = new THREE.BoxGeometry(width, height, depth);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x888888,
                roughness: 0.7
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, height/2, z);
            mesh.rotation.y = rotation;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            building.mesh = mesh;
            buildings.push(building);
            return building;
        }
        
        // ============================================================
        // COMBAT SYSTEM
        // ============================================================
        const COMBAT_MOVES = {
            punch: { damage: 10, speed: 0.3, stamina: 5 },
            kick: { damage: 15, speed: 0.5, stamina: 10 },
            special: { damage: 30, speed: 0.8, stamina: 25 }
        };
        
        function performAttack(move, target) {
            if (gameState.stamina < COMBAT_MOVES[move].stamina) return false;
            
            gameState.stamina -= COMBAT_MOVES[move].stamina;
            gameState.fighting = true;
            
            const distance = Math.hypot(player.x - target.x, player.z - target.z);
            if (distance < 3) {
                // Hit!
                const damage = COMBAT_MOVES[move].damage;
                target.health -= damage;
                gameState.combo++;
                
                // Show damage number
                showDamageNumber(damage, target.x, target.z);
                
                // Update combo
                updateCombo();
                
                // Check defeat
                if (target.health <= 0) {
                    onEnemyDefeated(target);
                }
                
                setTimeout(() => { gameState.fighting = false; }, COMBAT_MOVES[move].speed * 1000);
                return true;
            }
            
            gameState.fighting = false;
            return false;
        }
        
        function showDamageNumber(amount, x, z) {
            const div = document.createElement('div');
            div.className = 'damage-number';
            div.innerText = '-' + amount;
            
            // Project 3D position to 2D screen
            const vec = new THREE.Vector3(x, 2, z);
            vec.project(camera);
            
            const sx = (vec.x * 0.5 + 0.5) * window.innerWidth;
            const sy = (-(vec.y * 0.5) + 0.5) * window.innerHeight;
            
            div.style.left = sx + 'px';
            div.style.top = sy + 'px';
            
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1000);
        }
        
        function updateCombo() {
            const comboEl = document.getElementById('combo-display');
            if (gameState.combo >= 3) {
                comboEl.innerText = 'COMBO x' + gameState.combo;
                comboEl.style.opacity = 1;
                setTimeout(() => { comboEl.style.opacity = 0; }, 2000);
            }
        }
        
        function onEnemyDefeated(enemy) {
            // Reward
            const reward = Math.floor(Math.random() * 100) + 50;
            gameState.money += reward;
            
            // Remove enemy
            if (enemy.mesh) {
                scene.remove(enemy.mesh);
            }
            
            // Notification
            showNotification(`Enemy defeated! +$${reward}`);
        }
        
        // ============================================================
        // NPC / SOUL SYSTEM
        // ============================================================
        class NPC {
            constructor(name, type, x, z) {
                this.name = name;
                this.type = type;
                this.x = x;
                this.z = z;
                this.health = 100;
                this.relationship = 50;
                this.job = 'unemployed';
                this.money = Math.random() * 100;
            }
            
            wander(delta) {
                this.x += (Math.random() - 0.5) * 2 * delta;
                this.z += (Math.random() - 0.5) * 2 * delta;
                this.x = Math.max(-60, Math.min(60, this.x));
                this.z = Math.max(-60, Math.min(60, this.z));
                if (this.mesh) {
                    this.mesh.position.x = this.x;
                    this.mesh.position.z = this.z;
                    this.mesh.position.y = getHeight(this.x, this.z) + 0.5;
                }
            }
            
            interact(action) {
                const effects = {
                    greet: { relationship: 2, mood: 1 },
                    compliment: { relationship: 5, mood: 3 },
                    insult: { relationship: -10, mood: -5 },
                    fight: { relationship: -20, health: -10 }
                };
                
                const effect = effects[action];
                if (effect) {
                    if (effect.relationship) this.relationship += effect.relationship;
                    if (effect.health && this.health) this.health += effect.health;
                    return effect;
                }
                return null;
            }
        }
        
        function createNPC(name, type, x, z) {
            const npc = new NPC(name, type, x, z);
            
            // Create 3D mesh
            const geometry = new THREE.SphereGeometry(0.4, 16, 16);
            const colors = {
                profit: 0xffaa44,
                love: 0xff88aa,
                tax: 0x88aaff,
                neutral: 0x888888
            };
            const material = new THREE.MeshStandardMaterial({ 
                color: colors[type] || 0x888888,
                emissive: colors[type] || 0x444444,
                emissiveIntensity: 0.3
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, getHeight(x, z) + 0.5, z);
            mesh.castShadow = true;
            scene.add(mesh);
            
            npc.mesh = mesh;
            npcs.push(npc);
            return npc;
        }
        
        // ============================================================
        // WEATHER & TIME SYSTEM
        // ============================================================
        function updateWeatherAndTime(delta) {
            // Time
            gameState.time += delta * 0.1; // Fast time
            if (gameState.time >= 24) {
                gameState.time = 0;
                gameState.day++;
                document.getElementById('day-num').innerText = gameState.day;
            }
            
            const hours = Math.floor(gameState.time);
            const minutes = Math.floor((gameState.time - hours) * 60);
            document.getElementById('time').innerText = 
                `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}`;
            
            // Weather changes
            if (Math.random() < 0.001) {
                const weathers = ['sunny', 'cloudy', 'rainy'];
                gameState.weather = weathers[Math.floor(Math.random() * weathers.length)];
                document.getElementById('weather').innerText = gameState.weather.toUpperCase();
                applyWeather();
            }
        }
        
        function applyWeather() {
            if (gameState.weather === 'sunny') {
                scene.background = new THREE.Color(0x87CEEB);
            } else if (gameState.weather === 'rainy') {
                scene.background = new THREE.Color(0x4a4a4a);
            } else if (gameState.weather === 'cloudy') {
                scene.background = new THREE.Color(0x888888);
            }
        }
        
        // ============================================================
        // INITIALIZATION
        // ============================================================
        function init() {
            // Detect quality
            const isMobile = /Mobi|Android/i.test(navigator.userAgent);
            currentQuality = isMobile ? 0 : 1;
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.01);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 5);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            
            // Lighting
            const ambient = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambient);
            
            const sun = new THREE.DirectionalLight(0xffdd99, 0.8);
            sun.position.set(10, 15, 5);
            sun.castShadow = true;
            scene.add(sun);
            
            // Terrain
            const preset = QUALITY[currentQuality];
            const terrainGeo = new THREE.PlaneGeometry(140, 140, preset.segments, preset.segments);
            terrainGeo.rotateX(-Math.PI/2);
            const positions = terrainGeo.attributes.position.array;
            for (let i = 0; i < positions.length/3; i++) {
                const x = positions[i*3];
                const z = positions[i*3+2];
                positions[i*3+1] = getHeight(x, z);
            }
            terrainGeo.computeVertexNormals();
            
            const terrainMat = new THREE.MeshStandardMaterial({ color: 0x7c9c5e });
            terrain = new THREE.Mesh(terrainGeo, terrainMat);
            terrain.receiveShadow = true;
            scene.add(terrain);
            
            // Water
            const waterGeo = new THREE.PlaneGeometry(150, 150);
            const waterMat = new THREE.MeshStandardMaterial({ 
                color: 0x3399ff, 
                transparent: true, 
                opacity: 0.7 
            });
            water = new THREE.Mesh(waterGeo, waterMat);
            water.rotation.x = -Math.PI/2;
            water.position.y = 0;
            scene.add(water);
            
            // Create content
            createWorldContent();
            
            // Player start
            player.x = 0;
            player.z = 0;
            player.y = getHeight(0, 0) + 1.6;
            camera.position.set(player.x, player.y, player.z + 3);
            
            // Setup controls
            setupControls();
            
            // Start animation
            animate();
        }
        
        function createWorldContent() {
            const preset = QUALITY[currentQuality];
            
            // Create souls/NPCs
            for (let i = 0; i < preset.souls; i++) {
                const type = ['profit', 'love', 'tax'][i % 3];
                const x = (Math.random() - 0.5) * 50;
                const z = (Math.random() - 0.5) * 50;
                createNPC(`Soul ${i}`, type, x, z);
            }
            
            // Create buildings
            for (let i = 0; i < preset.buildings; i++) {
                const type = ['house', 'shop', 'apartment'][Math.floor(Math.random() * 3)];
                const x = (Math.random() - 0.5) * 80;
                const z = (Math.random() - 0.5) * 80;
                createBuilding(type, x, z);
            }
            
            // Create vehicles
            for (let i = 0; i < preset.vehicles; i++) {
                const type = ['car', 'bike'][Math.floor(Math.random() * 2)];
                const x = (Math.random() - 0.5) * 60;
                const z = (Math.random() - 0.5) * 60;
                createVehicle(type, x, z);
            }
        }
        
        // ============================================================
        // CONTROLS
        // ============================================================
        let moveVec = { x: 0, z: 0 };
        let isSprinting = false;
        
        function setupControls() {
            // Joystick
            const joystickArea = document.getElementById('joystick-area');
            const knob = document.getElementById('joystick-knob');
            let joystickActive = false;
            let centerX = 60, centerY = 60;
            
            joystickArea.addEventListener('touchstart', (e) => {
                joystickActive = true;
                const touch = e.touches[0];
                const rect = joystickArea.getBoundingClientRect();
                centerX = rect.left + rect.width/2;
                centerY = rect.top + rect.height/2;
                updateJoystick(touch.clientX, touch.clientY);
            });
            
            joystickArea.addEventListener('touchmove', (e) => {
                if (joystickActive) {
                    e.preventDefault();
                    updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
                }
            });
            
            joystickArea.addEventListener('touchend', () => {
                joystickActive = false;
                moveVec.x = 0;
                moveVec.z = 0;
                knob.style.left = '35px';
                knob.style.top = '35px';
            });
            
            function updateJoystick(clientX, clientY) {
                const dx = clientX - centerX;
                const dy = clientY - centerY;
                const dist = Math.min(35, Math.hypot(dx, dy));
                const angle = Math.atan2(dy, dx);
                
                knob.style.left = (35 + Math.cos(angle) * dist) + 'px';
                knob.style.top = (35 + Math.sin(angle) * dist) + 'px';
                
                moveVec.x = (Math.cos(angle) * dist) / 35;
                moveVec.z = (Math.sin(angle) * dist) / 35;
            }
            
            // Action buttons
            document.getElementById('btn-fight').addEventListener('click', () => {
                startFight();
            });
            
            document.getElementById('btn-interact').addEventListener('click', () => {
                // Find nearest NPC
                let nearest = null;
                let minDist = 5;
                npcs.forEach(npc => {
                    const dist = Math.hypot(player.x - npc.x, player.z - npc.z);
                    if (dist < minDist) {
                        nearest = npc;
                        minDist = dist;
                    }
                });
                if (nearest) {
                    performAttack('punch', nearest);
                }
            });
            
            document.getElementById('btn-interact').addEventListener('click', () => {
                // Find nearest NPC
                let nearest = null;
                let minDist = 3;
                npcs.forEach(npc => {
                    const dist = Math.hypot(player.x - npc.x, player.z - npc.z);
                    if (dist < minDist) {
                        nearest = npc;
                        minDist = dist;
                    }
                });
                if (nearest) {
                    nearest.interact('greet');
                    showNotification(`+Relationship with ${nearest.name}`);
                }
            });
            
            document.getElementById('btn-vehicle').addEventListener('click', () => {
                // Find nearest vehicle
                let nearest = null;
                let minDist = 5;
                vehicles.forEach(v => {
                    const dist = Math.hypot(player.x - v.position.x, player.z - v.position.z);
                    if (dist < minDist) {
                        nearest = v;
                        minDist = dist;
                    }
                });
                if (nearest) {
                    gameState.inVehicle = !gameState.inVehicle;
                    gameState.currentVehicle = nearest;
                    document.getElementById('vehicle-ui').style.display = 
                        gameState.inVehicle ? 'block' : 'none';
                }
            });
            
            // Keyboard
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') isSprinting = true;
                if (e.code === 'KeyF') startFight();
                if (e.code === 'KeyP') {
                    // Punch attack during fight
                    if (combatState.inFight && combatState.opponent) {
                        performAttack('punch', combatState.opponent);
                    }
                }
                if (e.code === 'KeyK') {
                    // Kick attack during fight
                    if (combatState.inFight && combatState.opponent) {
                        performAttack('kick', combatState.opponent);
                    }
                }
            });
            
            window.addEventListener('keyup', (e) => {
                if (e.code === 'Space') isSprinting = false;
            });
        }
        
        // ============================================================
        // GAME LOOP
        // ============================================================
        function updatePlayer(delta) {
            if (gameState.inVehicle && gameState.currentVehicle) {
                // Driving
                const vehicle = gameState.currentVehicle;
                if (Math.abs(moveVec.z) > 0.1) {
                    vehicle.velocity += moveVec.z * 0.5;
                    vehicle.velocity = Math.max(-vehicle.stats.speed, 
                        Math.min(vehicle.stats.speed, vehicle.velocity));
                }
                if (Math.abs(moveVec.x) > 0.1) {
                    vehicle.rotation += moveVec.x * 0.05;
                }
                vehicle.update(delta);
                
                // Update camera to follow vehicle
                camera.position.x = vehicle.position.x;
                camera.position.z = vehicle.position.z - 8;
                camera.position.y = vehicle.position.y + 5;
                
                // Update UI
                document.getElementById('vehicle-speed').innerText = 
                    Math.abs(Math.round(vehicle.velocity * 3));
                document.getElementById('vehicle-health').innerText = 
                    Math.round(vehicle.health);
                
                player.x = vehicle.position.x;
                player.z = vehicle.position.z;
                return;
            }
            
            // Walking
            const speed = isSprinting ? 8 : 4;
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            right.y = 0; right.normalize();
            
            const move = forward.multiplyScalar(moveVec.z * speed * delta)
                .add(right.multiplyScalar(moveVec.x * speed * delta));
            
            player.x += move.x;
            player.z += move.z;
            
            // Keep in bounds
            player.x = Math.max(-65, Math.min(65, player.x));
            player.z = Math.max(-65, Math.min(65, player.z));
            
            // Update camera
            camera.position.x = player.x;
            camera.position.z = player.z + 3;
            camera.position.y = player.y;
        }
        
        function updateUI() {
            document.getElementById('money').innerText = '$' + gameState.money;
            document.getElementById('health').innerText = Math.round(gameState.health);
            document.getElementById('stamina').innerText = Math.round(gameState.stamina);
            
            // Regenerate
            gameState.health = Math.min(100, gameState.health + 0.1 * delta);
            gameState.stamina = Math.min(100, gameState.stamina + 0.5 * delta);
        }
        
        function updateMinimap() {
            const canvas = document.getElementById('minimap-canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(0, 0, 150, 150);
            
            // Draw player
            const cx = 75, cy = 75;
            ctx.fillStyle = '#ffaa66';
            ctx.beginPath();
            ctx.arc(cx, cy, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw NPCs
            ctx.fillStyle = '#ff88aa';
            npcs.forEach(npc => {
                const dx = (npc.x - player.x) * 2;
                const dz = (npc.z - player.z) * 2;
                if (Math.abs(dx) < 70 && Math.abs(dz) < 70) {
                    ctx.beginPath();
                    ctx.arc(cx + dx, cy + dz, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
        
        function showNotification(text) {
            // Simple notification
            console.log(text);
        }
        
        let delta = 0;
        function animate() {
            requestAnimationFrame(animate);
            delta = clock.getDelta();

            updatePlayer(delta);
            updateWeatherAndTime(delta);
            updateUI();
            updateMinimap();
            updateFightUI(); // Update combat UI

            // Update NPCs
            npcs.forEach(npc => npc.wander(delta));

            renderer.render(scene, camera);
        }
        
        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Start
        init();
        startWeaveSync();

        // 1. SAVE SYSTEM (AAA games have save/load)
        const SAVE_SYSTEM = {
            save: function() {
                const saveData = {
                    gameState: gameState,
                    souls: souls,
                    npcs: npcs,
                    buildings: buildings,
                    vehicles: vehicles,
                    timestamp: Date.now()
                };
                localStorage.setItem('soulverse_save', JSON.stringify(saveData));
                showNotification("Game Saved!");

                const saveData = localStorage.getItem('soulverse_save');
                if (saveData) {
                    const data = JSON.parse(saveData);
                    gameState = { ...gameState, ...data.gameState };
                    souls = data.souls || [];
                    npcs = data.npcs || [];
                    buildings = data.buildings || [];
                    vehicles = data.vehicles || [];
                    showNotification("Game Loaded!");
                } else {
                    showNotification("No save found!");
                }
            },
            autoSave: function() {
                setInterval(() => {
                    this.save();
                }, 300000); // Auto-save every 5 minutes

        // 2. SOUND SYSTEM (AAA games have sound/music)
        const SOUND_SYSTEM = {
            enabled: true,
            audioContext: null,
            init: function() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            },
            playTone: function(frequency, duration, type = 'sine') {
                if (!this.enabled || !this.audioContext) return;
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                oscillator.type = type;
                oscillator.frequency.value = frequency;
                gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                oscillator.start();
                oscillator.stop(this.audioContext.currentTime + duration);
            },
            playCollect: function() {
                this.playTone(523.25, 0.1); // C5
                setTimeout(() => this.playTone(659.25, 0.1), 100); // E5
                setTimeout(() => this.playTone(783.99, 0.2), 200); // G5
            },
            playFight: function() {
                this.playTone(150, 0.2, 'square');
                setTimeout(() => this.playTone(100, 0.3, 'square'), 150);
            },
            playVictory: function() {
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    setTimeout(() => this.playTone(freq, 0.3), i * 150);
                });
            },
            playDamage: function() {
                this.playTone(200, 0.1, 'sawtooth');
                setTimeout(() => this.playTone(150, 0.2, 'sawtooth'), 100);

            ],
            addQuest: function(quest) {
                this.activeQuests.push(quest);
                showNotification(`New Quest: ${quest.name}`);
            },
            updateQuest: function(objective, amount = 1) {
                this.activeQuests.forEach(quest => {
                    if (quest.objective === objective && !quest.completed) {
                        quest.progress += amount;
                        if (quest.progress >= quest.target) {
                            this.completeQuest(quest);
                        }
                        showQuestUpdate(quest);
                    }
                });
            },
            completeQuest: function(quest) {
                quest.completed = true;
                this.activeQuests = this.activeQuests.filter(q => q !== quest);
                this.completedQuests.push(quest);
                gameState.money += quest.reward.money;
                showNotification(`Quest Complete: ${quest.name}! +$${quest.reward.money}`);
                SOUND_SYSTEM.playVictory();
            },
            getActiveQuests: function() {
                return this.activeQuests;
            }
        };
        
        function showQuestUpdate(quest) {
            const div = document.createElement('div');
            div.style.position = 'absolute';
            div.style.top = '80px';
            div.style.left = '50%';
            div.style.transform = 'translateX(-50%)';
            div.style.background = 'rgba(0,0,0,0.8)';
            div.style.border = '2px solid #ffaa66';
            div.style.borderRadius = '10px';
            div.style.padding = '10px 20px';
            div.style.color = '#ffaa66';
            div.style.zIndex = '1000';
            div.style.pointerEvents = 'none';
            div.innerHTML = `
                <div style="font-weight:bold;">${quest.name}</div>
                <div style="font-size:12px;">Progress: ${quest.progress}/${quest.target}</div>
            `;
            document.body.appendChild(div);
            setTimeout(() => { div.style.opacity = '0'; div.style.transition = 'opacity 0.5s'; setTimeout(() => div.remove(), 500); }, 2000);
        }
        
        // Add quest log button
        function addQuestButton() {
            const questBtn = document.createElement('button');
            questBtn.className = 'action-btn';
            questBtn.id = 'btn-quest';
            questBtn.innerHTML = '📜';
            questBtn.title = 'Quest Log';
            questBtn.addEventListener('click', () => {
                const quests = QUEST_SYSTEM.getActiveQuests();
                if (quests.length > 0) {
                    const questList = quests.map(q => `${q.name}: ${q.progress}/${q.target}`).join('\n');
                    showNotification(`Active Quests:\n${questList}`);
                } else {
                    showNotification("No active quests!");
                }
            });
            document.getElementById('action-bar').appendChild(questBtn);
        }
        setTimeout(() => addQuestButton(), 2000);
        
        // Start with first quest
        QUEST_SYSTEM.addQuest(QUEST_SYSTEM.quests[0]);
        
        // Hook into game actions
        const originalCollectSoul = collectSoul;
        collectSoul = function(npc) {
            const soul = originalCollectSoul(npc);
            QUEST_SYSTEM.updateQuest('collect_soul', 1);
            if (soul.rarity === 'legendary') {
                QUEST_SYSTEM.updateQuest('collect_legendary', 1);
            }
            return soul;
        };
        
        // 4. TUTORIAL SYSTEM (AAA games have tutorials)
        const TUTORIAL_SYSTEM = {
            shown: false,
            steps: [
                { text: "Welcome to Soulverse! Use WASD or Joystick to move.", duration: 5000 },
                { text: "Walk up to souls (pink spheres) and press 🔮 to collect them!", duration: 5000 },
                { text: "Press 👊 to fight NPCs. Build combos for bonus damage!", duration: 5000 },
                { text: "Press 💬 to interact with souls. Build relationships!", duration: 5000 },
                { text: "Check your quest log with 📜 to see your objectives!", duration: 5000 },
                { text: "Game auto-saves every 5 minutes. You can also save manually with 💾!", duration: 5000 },
                { text: "Have fun exploring Soulverse! 🎮", duration: 3000 }
            ],
            currentStep: 0,
            show: function() {
                if (this.shown) return;
                this.shown = true;
                this.showStep();
            },
            showStep: function() {
                if (this.currentStep >= this.steps.length) return;
                const step = this.steps[this.currentStep];
                const div = document.createElement('div');
                div.style.position = 'absolute';
                div.style.top = '50%';
                div.style.left = '50%';
                div.style.transform = 'translate(-50%, -50%)';
                div.style.background = 'linear-gradient(135deg, rgba(0,0,0,0.95), rgba(20,20,40,0.95))';
                div.style.border = '3px solid #ffaa66';
                div.style.borderRadius = '20px';
                div.style.padding = '30px';
                div.style.textAlign = 'center';
                div.style.color = '#fff';
                div.style.zIndex = '2000';
                div.style.pointerEvents = 'none';
                div.style.fontSize = '18px';
                div.innerHTML = step.text;
                document.body.appendChild(div);
                setTimeout(() => {
                    div.style.opacity = '0';
                    div.style.transition = 'opacity 0.5s';
                    setTimeout(() => {
                        div.remove();
                        this.currentStep++;
                        this.showStep();
                    }, 500);
                }, step.duration);
            }
        };
        
        // Show tutorial after 3 seconds
        setTimeout(() => TUTORIAL_SYSTEM.show(), 3000);
        
        // 5. ACHIEVEMENT SYSTEM (AAA games have achievements)
        const ACHIEVEMENT_SYSTEM = {
            achievements: [
                { id: 1, name: "First Soul", description: "Collect your first soul", unlocked: false },
                { id: 2, name: "Collector", description: "Collect 10 souls", unlocked: false },
                { id: 3, name: "Legendary Hunter", description: "Collect a legendary soul", unlocked: false },
                { id: 4, name: "First Blood", description: "Win your first fight", unlocked: false },
                { id: 5, name: "Warrior", description: "Win 10 fights", unlocked: false },
                { id: 6, name: "Rich", description: "Earn $5000", unlocked: false },
                { id: 7, name: "Explorer", description: "Visit all locations", unlocked: false }
            ],
            unlocked: [],
            unlock: function(id) {
                const achievement = this.achievements.find(a => a.id === id);
                if (achievement && !achievement.unlocked) {
                    achievement.unlocked = true;
                    this.unlocked.push(achievement);
                    showAchievement(achievement);
                    SOUND_SYSTEM.playVictory();
                }
            },
            check: function() {
                if (souls.length >= 1) this.unlock(1);
                if (souls.length >= 10) this.unlock(2);
                if (souls.some(s => s.rarity === 'legendary')) this.unlock(3);
                if (gameState.money >= 5000) this.unlock(6);
            }
        };
        
        function showAchievement(achievement) {
            const div = document.createElement('div');
            div.style.position = 'absolute';
            div.style.bottom = '20px';
            div.style.left = '50%';
            div.style.transform = 'translateX(-50%)';
            div.style.background = 'linear-gradient(135deg, rgba(255,170,68,0.9), rgba(255,136,68,0.9))';
            div.style.border = '3px solid #fff';
            div.style.borderRadius = '15px';
            div.style.padding = '15px 30px';
            div.style.textAlign = 'center';
            div.style.color = '#000';
            div.style.zIndex = '1000';
            div.style.pointerEvents = 'none';
            div.innerHTML = `
                <div style="font-size:24px; font-weight:bold;">🏆 ACHIEVEMENT UNLOCKED!</div>
                <div style="font-size:16px; font-weight:bold; margin-top:5px;">${achievement.name}</div>
                <div style="font-size:12px; margin-top:5px;">${achievement.description}</div>
            `;
            document.body.appendChild(div);
            setTimeout(() => { div.style.opacity = '0'; div.style.transition = 'opacity 0.5s'; setTimeout(() => div.remove(), 500); }, 3000);
        }
        
        // Hook into game actions for achievements
        const originalCollectSoul2 = collectSoul;
        collectSoul = function(npc) {
            const soul = originalCollectSoul2(npc);
            ACHIEVEMENT_SYSTEM.check();
            return soul;
        };
    </script>
</body>
</html>
